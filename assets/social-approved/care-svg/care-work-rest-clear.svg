    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#3b2b16" flood-opacity="0.22"/>
    </filter>
    <pattern id="grain" width="36" height="36" patternUnits="userSpaceOnUse">
