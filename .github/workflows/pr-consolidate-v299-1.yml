name: PR consolidate LINE OA v299.1

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - RUN_LINE_CONSOLIDATE.txt

permissions:
  contents: write

jobs:
  consolidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Consolidate source
        run: python tools/consolidate_line.py
      - name: Install dependencies
        run: npm install
      - name: Unit and syntax smoke tests
        run: |
          node --check server.js
          npm test
      - name: HTTP smoke test
        run: |
          PORT=3100 node server.js >/tmp/xjw-line.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl --fail --silent --show-error http://127.0.0.1:3100/ | grep '"ok":true'
          curl --fail --silent --show-error http://127.0.0.1:3100/healthz | grep '"version":"v299.1"'
          test "$(curl -s -o /tmp/webhook.json -w '%{http_code}' -X POST -H 'content-type: application/json' -d '{"events":[]}' http://127.0.0.1:3100/webhook)" = "503"
      - name: Commit tested files to PR branch
        run: |
          rm -f tools/consolidate_line.py RUN_LINE_CONSOLIDATE.txt CONSOLIDATE_LINE_V299_1.txt
          rm -f .github/workflows/consolidate-v299-1.yml .github/workflows/pr-consolidate-v299-1.yml
          find .github/workflows -type f \( -name 'v*.yml' -o -name 'v*.yaml' \) -delete 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v299.1: consolidate LINE OA and pass smoke tests"
          git push origin HEAD:${{ github.head_ref }}
