name: v294 LINE OA product images

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync product image paths and wording
        shell: python
        run: |
          from pathlib import Path
          import json

          image_map = {
              'guilu-gao': ('images/products-v3/guilu-gao.jpg','images/dm-v3/guilu-gao.jpg'),
              'guilu-drink-30': ('images/products-v3/guilu-drink-30.jpg','images/dm-v3/guilu-drink-30.jpg'),
              'guilu-drink-180': ('images/products-v3/guilu-drink-180.jpg','images/dm-v3/guilu-drink-180.jpg'),
              'guilu-tangkuai': ('images/products-v3/guilu-tangkuai.jpg','images/dm-v3/guilu-tangkuai.jpg'),
              'guilu-jiao': ('images/products-v3/guilu-jiao.jpg','images/dm-v3/guilu-jiao.jpg'),
              'luerong-fen': ('images/products-v3/luerong-fen.jpg','images/dm-v3/luerong-fen.jpg'),
          }

          data_path=Path('data.json')
          data=json.loads(data_path.read_text(encoding='utf-8'))
          data['version']='294.0'
          data['siteUrl']='https://ts15825868.github.io/xianjiawei/'
          for p in data.get('products',[]):
              pid=p.get('id')
              if pid in image_map:
                  image,dm=image_map[pid]
                  p['image']=image
                  p['dmImage']=dm
                  p['detailImages']=[dm]
              if pid in ('guilu-tangkuai','guilu-jiao'):
                  p['ingredients']=['鹿角萃取物','龜板萃取物']
          data_path.write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')

          server_path=Path('server.js')
          server=server_path.read_text(encoding='utf-8')
          server=server.replace('仙加味 LINE OA Bot v288','仙加味 LINE OA Bot v294')
          server=server.replace('const VERSION = "v288";','const VERSION = "v294";')
          server=server.replace(
              'const ORDER_NOTICE = "目前全系列已開放詢問與下單；產品盒裝到貨後，將依訂單順序確認並安排出貨。";',
              'const ORDER_NOTICE = "全系列已開放詢問與下單；實際庫存與出貨時間由客服確認。";'
          )
          server=server.replace(
              'shippingNotice: "盒裝到貨後依訂單順序確認並安排出貨。",',
              'shippingNotice: "實際庫存與出貨時間由客服確認。",'
          )
          server=server.replace(
              'hero: { type: "image", url: absoluteUrl(p.image || "images/logo.png"), size: "full", aspectRatio: "1:1", aspectMode: "cover" },',
              'hero: { type: "image", url: absoluteUrl(p.image || "images/logo.png"), size: "full", aspectRatio: "4:5", aspectMode: "contain", backgroundColor: "#F7F2E8" },'
          )
          server_path.write_text(server,encoding='utf-8')

          package_path=Path('package.json')
          package=json.loads(package_path.read_text(encoding='utf-8'))
          package['name']='xianjiawei-lineoa-v294'
          package['version']='2.9.4'
          package['description']='仙加味 LINE OA v294｜同步官網真實產品圖、產品DM、成分與商品卡比例'
          package_path.write_text(json.dumps(package,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')

      - name: Commit LINE OA v294
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json server.js package.json
          git commit -m "v294: sync website product cards and DMs to LINE OA"
          git push origin main
