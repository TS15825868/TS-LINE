name: 統一 LINE OA 小老闆圖片清晰度

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/normalize-lineoa-mascot-assets.yml"
      - "public/mascot/*.jpg"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: normalize-lineoa-mascot-assets
  cancel-in-progress: false

jobs:
  normalize:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Normalize mascot images
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageFilter

          names = ("welcome", "recommend", "combo", "usage", "faq", "service", "brand")
          target_size = (1200, 1200)

          for name in names:
              path = Path(f"public/mascot/{name}.jpg")
              if not path.exists():
                  raise SystemExit(f"Missing mascot asset: {path}")

              with Image.open(path) as source:
                  source.load()
                  if source.format != "JPEG":
                      raise SystemExit(f"{path}: expected JPEG, got {source.format}")
                  image = source.convert("RGB")

              if image.size != target_size:
                  image = image.resize(target_size, Image.Resampling.LANCZOS)
                  image = image.filter(ImageFilter.UnsharpMask(radius=1.2, percent=115, threshold=3))
                  image.save(path, "JPEG", quality=95, subsampling=0, optimize=True, progressive=True)
                  print(f"normalized {path}: {source.size} -> {target_size}")
              else:
                  print(f"verified {path}: {image.size}")

              with Image.open(path) as check:
                  check.verify()
              with Image.open(path) as check:
                  if check.size != target_size:
                      raise SystemExit(f"{path}: expected {target_size}, got {check.size}")
          PY

      - name: Commit normalized assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "仙加味圖片清晰度自動整理"
          git config user.email "actions@users.noreply.github.com"
          git add public/mascot/*.jpg
          if git diff --cached --quiet; then
            echo "All mascot images are already normalized"
            exit 0
          fi
          git commit -m "fix: normalize LINE OA mascot images to 1200x1200 [skip ci]"
          git pull --rebase origin main
          git push origin main
