name: Audit JS JSON files

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  audit:
    if: github.event.issue.title == 'AUDIT_JS_JSON_FILES'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Audit
        run: |
          set -euo pipefail
          {
            echo 'JS_JSON_AUDIT'
            echo '```text'
            find . -type f \( -name '*.js' -o -name '*.json' \) \
              ! -path './node_modules/*' ! -path './.git/*' \
              -printf '%p | %s bytes\n' | sort
            echo
            echo 'Top-level require references:'
            grep -Rho "require(.*)" --include='*.js' . \
              --exclude-dir=node_modules --exclude-dir=.git | sort -u || true
            echo '```'
          } > /tmp/comment.md
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file /tmp/comment.md
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed
        env:
          GH_TOKEN: ${{ github.token }}
