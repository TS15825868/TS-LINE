name: Keep Render warm

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/keep-render-warm.yml"
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Wake and verify LINE OA
        run: |
          set -e
          for attempt in 1 2 3; do
            if curl --fail --silent --show-error --max-time 55 \
              "https://ts-line.onrender.com/healthz?keepalive=$(date +%s)"; then
              echo
              exit 0
            fi
            sleep 10
          done
          exit 1
