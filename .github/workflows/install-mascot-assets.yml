name: Install LINE OA mascot assets once

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches: [main]
    paths:
      - ".asset-install-trigger"

permissions:
  contents: write

concurrency:
  group: install-line-oa-mascot-assets
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Download and install LINE OA mascot assets
        run: |
          set -euo pipefail
          curl -L --fail --retry 4 --retry-delay 3 \
            "https://drive.usercontent.google.com/download?id=1vxk3606XBayOrLTKeRHeLJS1Ne0rgy2N&export=download&confirm=t" \
            -o /tmp/ts-line-mascot-payload.zip
          unzip -t /tmp/ts-line-mascot-payload.zip
          unzip -o /tmp/ts-line-mascot-payload.zip -d .
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path("server.js")
          text = path.read_text(encoding="utf-8")
          text = re.sub(r'const VERSION = "v[^"]+";', 'const VERSION = "v400.3";', text, count=1)
          text = re.sub(r'const MASCOT_VERSION = "[^"]+";', 'const MASCOT_VERSION = "400.3";', text, count=1)
          text = text.replace('aspectRatio: "4:3",', 'aspectRatio: "1:1",')
          path.write_text(text, encoding="utf-8")
          PY
          rm -f .asset-install-trigger
          rm -f .github/workflows/install-mascot-assets.yml
      - name: Verify installed images
        run: |
          set -euo pipefail
          test "$(find public/mascot -maxdepth 1 -name '*.jpg' | wc -l)" -eq 9
          for f in public/mascot/*.jpg; do
            test -s "$f"
            test "$(stat -c%s "$f")" -gt 100000
          done
          test -s public/mascot/manifest.json
      - name: Commit final LINE OA assets to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "更新 LINE OA 專用仙加味小老闆九張高清圖"
          git push origin main
