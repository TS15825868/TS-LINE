name: Keep LINE OA awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Wake and verify Render
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --retry 4 --retry-delay 5 --max-time 45 https://ts-line.onrender.com/healthz
