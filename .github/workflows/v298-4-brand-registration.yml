name: v298.4 brand registration sync

on:
  push:
    paths:
      - DEPLOY_TRIGGER_v298_4.txt

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add 2008 brand registration milestone
        shell: python
        run: |
          from pathlib import Path
          import json, re

          server_path = Path('server.js')
          text = server_path.read_text(encoding='utf-8')
          text = re.sub(r'仙加味 LINE OA Bot v[^\n*]+', '仙加味 LINE OA Bot v298.4', text)
          text = re.sub(r'const VERSION = "[^"]+";', 'const VERSION = "v298.4";', text)

          old = "第四代以仙加味為品牌，將家族累積的原料、工序與使用經驗，整理成更清楚的產品資訊與日常使用方式。"
          new = "2008年，『仙加味』品牌完成註冊，成為面向消費者的正式品牌名稱。第四代延續這個品牌，將家族累積的原料、工序與使用經驗，整理成更清楚的產品資訊與日常使用方式。"
          text = text.replace(old, new)

          old_timeline = "・1978年完成公司化經營\\n\\n第四代以仙加味為品牌"
          new_timeline = "・1978年完成公司化經營\\n・2008年『仙加味』品牌完成註冊\\n\\n第四代延續仙加味品牌"
          text = text.replace(old_timeline, new_timeline)
          server_path.write_text(text, encoding='utf-8')

          data_path = Path('data.json')
          data = json.loads(data_path.read_text(encoding='utf-8'))
          data['version'] = '298.4'
          story = data.setdefault('brandStory', {})
          story['brandRegisteredYear'] = 2008
          story['brandRegistrationText'] = '2008年「仙加味」品牌完成註冊，成為面向消費者的正式品牌名稱。'
          timeline = story.setdefault('timeline', [])
          if not any(str(item.get('period')) == '2008年' for item in timeline if isinstance(item, dict)):
              insert_at = len(timeline)
              for i, item in enumerate(timeline):
                  if isinstance(item, dict) and item.get('period') == '第四代':
                      insert_at = i
                      break
              timeline.insert(insert_at, {
                  'period': '2008年',
                  'text': '「仙加味」品牌完成註冊，成為面向消費者的正式品牌名稱。'
              })
          data_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          package_path = Path('package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          package['name'] = 'xianjiawei-lineoa-v298-4'
          package['version'] = '2.10.0'
          package['description'] = '仙加味 LINE OA v298.4｜同步2008年品牌註冊與四代傳承'
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

      - name: Commit and clean temporary files
        run: |
          rm -f DEPLOY_TRIGGER_v298_4.txt
          rm -f .github/workflows/v298-4-brand-registration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v298.4: add 2008 仙加味 brand registration to LINE OA"
          git push origin main
