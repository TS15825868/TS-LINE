name: Apply combo cart fix v300.6

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: startsWith(github.head_ref, 'combo-cart-v300-6')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Prepare updater
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('tools/apply_combo_cart_fix_v300_6.js')
          text = path.read_text(encoding='utf-8')

          def escape_interpolation(match):
              block = match.group(0)
              block = re.sub(r'(?<!\\)\$\{', r'\\${', block)
              return block

          text = re.sub(r'const helpers = `.*?`;\nserver = replaceBlock', escape_interpolation, text, count=1, flags=re.S)
          text = re.sub(r'const comboMenu = `.*?`;\nserver = replaceBlock', escape_interpolation, text, count=1, flags=re.S)
          path.write_text(text, encoding='utf-8')
          PY
          node --check tools/apply_combo_cart_fix_v300_6.js
      - name: Apply combo cart update
        run: |
          node tools/apply_combo_cart_fix_v300_6.js
          npm install --package-lock-only --ignore-scripts
      - name: Verify all functions
        run: |
          npm ci
          npm run check:catalog
          npm test
          node --check server.js
          node --check test.js
          node --check catalog.test.js
          node --check security.test.js
          node --check function.test.js
          grep -F 'const VERSION = "v300.6";' server.js >/dev/null
          grep -F '加入組合' server.js >/dev/null
          grep -F '每組售價' server.js >/dev/null
          grep -F '可選組數' server.js >/dev/null
      - name: HTTP smoke test
        run: |
          node server.js >/tmp/lineoa-v300-6.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl --fail --silent http://127.0.0.1:3000/ | grep '"version":"v300.6"' >/dev/null
          curl --fail --silent http://127.0.0.1:3000/healthz | grep '"crmConfigured":true' >/dev/null
      - name: Commit verified result
        run: |
          git checkout -- .github/workflows/verify-line-and-website-catalog.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js data.json test.js catalog.test.js security.test.js function.test.js package.json package-lock.json README.md
          git commit -m "v300.6: add combo prices, set quantities and cart support"
          git pull --rebase origin ${{ github.head_ref }}
          git push origin HEAD:${{ github.head_ref }}
