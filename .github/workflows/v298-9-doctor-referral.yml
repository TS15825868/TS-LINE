name: v298.9 doctor referral and security cleanup

on:
  push:
    paths:
      - TRIGGER_V298_9.txt

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply doctor referral and remove credential fallbacks
        run: |
          node <<'NODE'
          const fs = require('fs');
          let source = fs.readFileSync('server.js', 'utf8');

          source = source
            .replace(/仙加味 LINE OA Bot v[^\n*]+/, '仙加味 LINE OA Bot v298.9')
            .replace(/const VERSION = "[^"]+";/, 'const VERSION = "v298.9";')
            .replace(/const CRM_URL = process\.env\.CRM_URL \|\| "[^"]*";/, 'const CRM_URL = process.env.CRM_URL || "";')
            .replace(/channelAccessToken:\s*process\.env\.CHANNEL_ACCESS_TOKEN\s*\|\|\s*"[^"]*",/, 'channelAccessToken: process.env.CHANNEL_ACCESS_TOKEN || "",')
            .replace(/channelSecret:\s*process\.env\.CHANNEL_SECRET\s*\|\|\s*"[^"]*",/, 'channelSecret: process.env.CHANNEL_SECRET || "",');

          const referralFunction = `
function doctorReferralReply() {
  return flexCard(
    "個人狀況｜轉介中醫師諮詢",
    "這部分會因每個人的身體狀況不同，為了讓您得到更準確的說明與建議，建議先由合作的中醫師了解您的情況🙂\\n\\n✔ 專人一對一說明\\n✔ 可詢問適不適合食用\\n✔ 可詢問個人狀況與疑問\\n\\nLINE ID：@changwuchi\\n章無忌中醫師",
    [
      { label: "前往中醫師諮詢", uri: "https://lin.ee/1MK4NR9" },
      { label: "查看產品資訊", data: pb("products") },
      { label: "人工客服", text: "我要人工客服" },
    ]
  );
}
`;

          if (!source.includes('function doctorReferralReply()')) {
            source = source.replace('\nfunction detectProduct(text) {', `${referralFunction}\nfunction detectProduct(text) {`);
          }

          source = source.replace(
            /  if \(\/功效\|效果\|改善\|治療\|預防\|疾病\|服藥\|孕婦\|懷孕\|哺乳\|兒童\|小孩\|慢性病\/\.test\(text\)\) \{[\s\S]*?\n  \}\n/,
            ''
          );

          const route = '  if (/功效|效果|有效|有沒有用|多久有效|改善|治療|預防|疾病|症狀|不舒服|疼痛|腰痠|腰酸|膝蓋|關節|睡眠|失眠|血糖|血壓|膽固醇|免疫|明目|補血|補氣|壯陽|腎虛|肝腎|眼睛|服藥|用藥|藥物|孕婦|懷孕|哺乳|兒童|小孩|慢性病|過敏|手術|化療|洗腎|適不適合吃|適不適合食用|能不能吃|可以吃嗎|我能吃嗎|體質|燥熱|上火|副作用|禁忌/.test(text)) return reply(event.replyToken, doctorReferralReply());\n';
          const recommend = '  if (/不知道|怎麼選|推薦|適合哪個/.test(text)) return reply(event.replyToken, recommendReply());\n';
          if (!source.includes('doctorReferralReply());')) {
            source = source.replace(recommend, route + recommend);
          }

          fs.writeFileSync('server.js', source);
          NODE

      - name: Commit and clean temporary files
        run: |
          rm -f TRIGGER_V298_9.txt
          rm -f .github/workflows/v298-9-doctor-referral.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v298.9: route sensitive questions to doctor and remove credential fallbacks"
          git push origin main
