name: LINE OA v311 main apply

on:
  pull_request:
    branches: [main]
    paths:
      - LINEOA_V311_MAIN_TRIGGER.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Finalize LINE OA production
        run: python tools/lineoa_v311_finalize.py

      - name: Install dependencies
        run: npm ci

      - name: Capture tests and validation
        run: |
          set +e
          {
            node --check server.js
            npm test
            python - <<'PY'
          from pathlib import Path
          import json
          server = Path('server.js').read_text(encoding='utf-8')
          data = json.loads(Path('data.json').read_text(encoding='utf-8'))
          assert not Path('server-core.js').exists()
          assert 'const VERSION = "v311.0";' in server
          assert 'runtimeModule._compile' not in server
          assert 'aspectMode: "contain"' in server
          assert 'images/line-mascot/xianjiawei-mascot-line-welcome.jpg?v=311.0' in server
          assert [p['id'] for p in data['products']] == ['guilu-gao','guilu-drink-30','guilu-drink-180','guilu-tangkuai','guilu-jiao','luerong-fen']
          assert data['store']['hours'] == '週一至週六 09:30–18:30'
          print('LINE OA v311 production validation passed')
          PY
          } > V311_TEST_OUTPUT.txt 2>&1
          status=$?
          echo "$status" > V311_TEST_STATUS.txt
          cat V311_TEST_OUTPUT.txt
          exit 0

      - name: Commit diagnostic production candidate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "LINE OA v311：套用正式候選版並保存測試結果" || exit 0
          git push origin main
