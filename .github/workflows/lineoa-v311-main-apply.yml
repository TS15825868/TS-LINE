name: LINE OA v311 main apply

on:
  pull_request:
    branches: [main]
    paths:
      - LINEOA_V311_MAIN_TRIGGER.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Finalize LINE OA production
        run: |
          python tools/lineoa_v311_finalize.py
          python tools/fix_brand_flex_v311.py

      - name: Install dependencies
        run: npm ci

      - name: Capture full validation output
        run: |
          set +e
          {
            node --check server.js
            npm test
            python -c "from pathlib import Path; import json; s=Path('server.js').read_text(encoding='utf-8'); d=json.loads(Path('data.json').read_text(encoding='utf-8')); assert not Path('server-core.js').exists(); assert 'const VERSION = \"v311.0\";' in s; assert 'runtimeModule._compile' not in s; assert 'aspectMode: \"contain\"' in s; assert 'images/line-mascot/xianjiawei-mascot-line-welcome.jpg?v=311.0' in s; assert [p['id'] for p in d['products']] == ['guilu-gao','guilu-drink-30','guilu-drink-180','guilu-tangkuai','guilu-jiao','luerong-fen']; assert d['store']['hours'] == '週一至週六 09:30–18:30'; assert d['store']['holidayNote'] == '假日如未外出，可提前透過官方 LINE 預約。'; assert any('龜鹿飲180cc 5 包' in item for c in d['offers']['comboOffers'] for item in c['items']); print('LINE OA v311 production validation passed')"
            for file in welcome products recommend combo usage faq service brand; do
              curl --fail --silent --show-error --location --output /dev/null "https://ts15825868.github.io/xianjiawei/images/line-mascot/xianjiawei-mascot-line-$file.jpg"
            done
            curl --fail --silent --show-error --location --output /dev/null "https://ts15825868.github.io/xianjiawei/images/line/xianjiawei-rich-menu-2500x1686-v309.jpg"
          } > V311_TEST_OUTPUT.txt 2>&1
          status=$?
          echo "$status" > V311_TEST_STATUS.txt
          cat V311_TEST_OUTPUT.txt
          exit 0

      - name: Publish diagnostic branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B lineoa-v311-diagnostic-final
          git add -A
          git commit -m "LINE OA v311：保存完整測試診斷結果"
          git push --force origin HEAD:lineoa-v311-diagnostic-final
