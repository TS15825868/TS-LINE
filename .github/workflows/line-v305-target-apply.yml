name: Apply LINE OA v305 after PR event

on:
  pull_request_target:
    branches: [main]
    paths:
      - LINE_V305_TARGET_TRIGGER.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply LINE OA v305 to main
        run: python tools/line_v305_restore.py
      - name: Validate
        run: |
          node --check server.js
          python - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path('data.json').read_text(encoding='utf-8'))
          assert any(p.get('id')=='guilu-drink-180' for p in data['products'])
          assert '週一至週六 09:30–18:30' in Path('server.js').read_text(encoding='utf-8')
          print('validated')
          PY
      - name: Commit to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json server.js
          git commit -m "LINE OA v305：套用180cc、營業時間與完整角色圖" || exit 0
          git push origin HEAD:main
