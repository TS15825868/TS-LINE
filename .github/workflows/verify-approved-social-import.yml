name: 驗證正式社群圖文匯入狀態

on:
  push:
    branches: [main]
    paths:
      - "approved-social-one-time-import.js"
      - "package.json"
      - ".github/workflows/verify-approved-social-import.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-import:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      # Final read-only verification: no upload route or temporary file is used.
      - name: Verify Render restored the completed import
        shell: bash
        run: |
          set -euo pipefail
          endpoint="https://ts-line.onrender.com/internal/approved-social-one-time-healthz"
          for attempt in $(seq 1 40); do
            body="$(curl --location --silent --show-error --max-time 30 "$endpoint" || true)"
            echo "Attempt ${attempt}: ${body}"
            if printf '%s' "$body" | jq -e '
              .ok == true and
              .state == "already-imported" and
              .uploaded == 20 and
              .pendingReview == 20 and
              .preservedPublished >= 1 and
              .uploadReceiverClosed == true
            ' >/dev/null 2>&1; then
              mkdir -p deploy-status
              printf '%s\n' "$body" | jq '.' > deploy-status/approved-social-import.json
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Record verified result on main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy-status/approved-social-import.json
          if git diff --cached --quiet; then
            echo "Verification result already recorded."
            exit 0
          fi
          git commit -m "chore: record closed approved social import verification"
          git push origin HEAD:main
