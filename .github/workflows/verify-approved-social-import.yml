name: 驗證正式社群圖文自動匯入

on:
  push:
    branches: [main]
    paths:
      - "approved-social-one-time-import.js"
      - "package.json"
      - ".github/workflows/verify-approved-social-import.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-import:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ZIP_SHA256: "5d5826a47fee6c3d2af08d4d1926b2b9280b8e8d7a2d2be94c10d0984030b557"
      ZIP_URL: "https://oaisdmntprseasia.blob.core.windows.net/files/00000000-210c-7207-a770-8af8248559f4/raw?se=2026-07-17T12%3A44%3A04Z&sp=r&sv=2026-02-06&sr=b&scid=019f6ff1-c7d3-74d3-b90d-99a4504b8d6e&skoid=6980ab1e-b994-4668-84de-ad0444c9d08b&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-07-17T00%3A29%3A19Z&ske=2026-07-19T00%3A29%3A19Z&sks=b&skv=2026-02-06&sig=%2BxigVqTafT24Bhiy3fYTaixTS84oKaAD185zYRwNOiE%3D"
      HEALTH_ENDPOINT: "https://ts-line.onrender.com/internal/approved-social-one-time-healthz"
      IMAGE_ENDPOINT: "https://ts-line.onrender.com/internal/api/v2/social/import-approved-image-5d5826a47fee6c3d"

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download and lock the exact approved ZIP
        shell: bash
        run: |
          set -euo pipefail
          curl --location --fail --show-error --retry 4 --retry-delay 2 --max-time 180 "$ZIP_URL" --output /tmp/approved-social.zip
          printf '%s  %s\n' "$ZIP_SHA256" /tmp/approved-social.zip | sha256sum --check --strict
          test "$(stat -c '%s' /tmp/approved-social.zip)" = "66586139"
          mkdir -p /tmp/approved-social
          unzip -q /tmp/approved-social.zip -d /tmp/approved-social

      - name: Wait for verified image receiver
        shell: bash
        run: |
          set -uo pipefail
          for attempt in $(seq 1 48); do
            body="$(curl --location --silent --show-error --max-time 25 "$HEALTH_ENDPOINT" || true)"
            echo "Receiver attempt ${attempt}: ${body}"
            if printf '%s' "$body" | jq -e '.version == "1.3.0" or (.ok == true and .uploaded == 20)' >/dev/null 2>&1; then
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Resume all exact original PNG files with retries
        shell: bash
        run: |
          set -euo pipefail
          node -e 'for (const topic of require("./social-official-rebuild").TOPICS) console.log(topic.file)' > /tmp/approved-files.txt
          count=0
          while IFS= read -r file; do
            image="$(find /tmp/approved-social -type f -iname "$file" -print -quit)"
            test -n "$image"
            hash="$(sha256sum "$image" | awk '{print $1}')"
            delivered=false
            for retry in $(seq 1 5); do
              set +e
              http_code="$(curl --location --silent --show-error --max-time 240 \
                --request POST \
                --header "Content-Type: image/png" \
                --header "X-XJW-Image-Name: $file" \
                --header "X-XJW-Image-SHA256: $hash" \
                --data-binary "@$image" \
                --output /tmp/image-response.json \
                --write-out '%{http_code}' \
                "$IMAGE_ENDPOINT")"
              curl_status=$?
              set -e
              body="$(cat /tmp/image-response.json 2>/dev/null || true)"
              echo "${file} retry ${retry}: curl=${curl_status} http=${http_code} body=${body}"
              if test "$curl_status" = "0" && [[ "$http_code" =~ ^2 ]]; then
                delivered=true
                break
              fi
              sleep $((retry * 3))
            done
            test "$delivered" = "true"
            count=$((count + 1))
            echo "Delivered ${count}/20 ${file}"
          done < /tmp/approved-files.txt
          test "$count" = "20"

      - name: Verify final App state
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            curl --location --fail --show-error --max-time 30 "$HEALTH_ENDPOINT" --output /tmp/import-result.json
            cat /tmp/import-result.json
            if jq -e '
              .ok == true and
              (.state == "complete" or .state == "already-imported") and
              .uploaded == 20 and
              .pendingReview == 20 and
              .preservedPublished >= 1
            ' /tmp/import-result.json >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Record verified result on main
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deploy-status
          jq '.' /tmp/import-result.json > deploy-status/approved-social-import.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy-status/approved-social-import.json
          if git diff --cached --quiet; then
            echo "Verification result already recorded."
            exit 0
          fi
          git commit -m "chore: record approved social import verification"
          git push origin HEAD:main
