name: Decode LINE OA images

on:
  push:
    branches: [main]
    paths:
      - "assets/lineoa-src/*.b64"
      - ".github/workflows/decode-lineoa-images.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode approved LINE OA images
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public/mascot
          shopt -s nullglob
          files=(assets/lineoa-src/*.b64)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No source files to decode."
            exit 0
          fi
          for src in "${files[@]}"; do
            name="$(basename "$src" .b64)"
            base64 --decode "$src" > "public/mascot/${name}.jpg"
            file "public/mascot/${name}.jpg"
          done
          rm -f assets/lineoa-src/*.b64

      - name: Commit decoded images
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/mascot assets/lineoa-src || true
          if git diff --cached --quiet; then
            echo "No decoded image changes."
            exit 0
          fi
          git commit -m "assets: publish approved LINE OA mascot images"
          git push
