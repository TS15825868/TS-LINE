name: Publish tested LINE OA v300.4 branch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  actions: read

jobs:
  publish:
    if: github.head_ref == 'trigger-v3004-publish2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download tested artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/v3004
          curl --fail --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/8205934338/zip" \
            -o /tmp/v3004.zip
          unzip -q /tmp/v3004.zip -d /tmp/v3004

      - name: Apply tested runtime files
        run: |
          set -euo pipefail
          cp /tmp/v3004/server.js server.js
          cp /tmp/v3004/data.json data.json
          cp /tmp/v3004/test.js test.js
          cp /tmp/v3004/security.test.js security.test.js
          cp /tmp/v3004/function.test.js function.test.js
          cp /tmp/v3004/package.json package.json
          cp /tmp/v3004/package-lock.json package-lock.json
          cp /tmp/v3004/README.md README.md
          cp /tmp/v3004/tools/sync_website_catalog.js tools/sync_website_catalog.js

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Run complete verification
        run: |
          set -euo pipefail
          npm ci
          npm run check:catalog
          npm test
          node --check server.js
          node --check function.test.js
          node --check tools/sync_website_catalog.js
          grep -F 'const VERSION = "v300.4";' server.js >/dev/null
          grep -F 'quantityOptions' data.json >/dev/null
          grep -F '買10送2（12瓶）' data.json >/dev/null
          grep -F '買10送2（12包）' data.json >/dev/null

      - name: Publish ready branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B lineoa-v3004-ready
          git add server.js data.json test.js security.test.js function.test.js package.json package-lock.json README.md tools/sync_website_catalog.js
          git commit -m "v300.4: complete quantity choices and promotion verification"
          git push --force origin lineoa-v3004-ready
