name: 仙加味 App 審核後自動發布驗收

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "social-review-only-mode.js"
      - "social-review-only-mode.test.js"
      - "internal-app-review-only.js"
      - "internal-app-client-fix.js"
      - "tools/release_check.js"
      - ".github/workflows/review-only-verification.yml"

permissions:
  contents: write

concurrency:
  group: xjw-review-gate-verification
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - name: Wait for Render review gate
        shell: bash
        run: |
          set -euo pipefail
          ok=""
          for i in $(seq 1 40); do
            code=$(curl -L -sS -o /tmp/review.json -w '%{http_code}' "https://ts-line.onrender.com/social/review-gate-status?t=$(date +%s)" || true)
            if [ "$code" = "200" ] && node -e '
              const fs=require("fs");
              const d=JSON.parse(fs.readFileSync("/tmp/review.json","utf8"));
              const valid = d.ok===true
                && d.reviewGateMode===true
                && d.reviewRequiredBeforePublish===true
                && d.automaticSchedulingEnabled===true
                && d.automaticSchedulingRequiresReview===true
                && d.automaticRetryEnabled===false
                && d.canonicalCount===10
                && d.unreviewedActiveCount===0
                && Array.isArray(d.posts)
                && d.posts.every(p => !["approved","paused","publishing","published","partial","failed"].includes(p.status) || Boolean(p.reviewApprovedAt));
              if (!valid) process.exit(1);
            '; then
              ok="1"
              break
            fi
            sleep 15
          done
          test "$ok" = "1"
      - name: Verify App approval controls
        run: |
          curl -L -fsS "https://ts-line.onrender.com/internal/app-review-only.js?t=$(date +%s)" -o /tmp/app-review.js
          grep -q "人工審核閘門已開啟" /tmp/app-review.js
          grep -q "審核通過・啟用自動發布" /tmp/app-review.js
          grep -q "未審核內容不會發布" /tmp/app-review.js
          grep -q "等待萬華實際氣候" /tmp/app-review.js
      - name: Record verified state
        shell: bash
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const live=JSON.parse(fs.readFileSync('/tmp/review.json','utf8'));
          const result={
            ok:true,
            verifiedAt:new Date().toISOString(),
            commit:process.env.GITHUB_SHA,
            mode:'App review gate',
            reviewRequiredBeforePublish:true,
            automaticSchedulingEnabled:true,
            automaticSchedulingRequiresReview:true,
            automaticRetryEnabled:false,
            canonicalCount:live.canonicalCount,
            draftCount:live.draftCount,
            reviewedCount:live.reviewedCount,
            automaticQueueCount:live.automaticQueueCount,
            unreviewedActiveCount:live.unreviewedActiveCount,
            posts:live.posts,
            approvalButton:'審核通過・啟用自動發布'
          };
          fs.writeFileSync('review-only-verification.json',JSON.stringify(result,null,2)+'\n');
          NODE
          git config user.name actions
          git config user.email actions@github.com
          git add review-only-verification.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: record App review-gate verification"
            git push
          fi