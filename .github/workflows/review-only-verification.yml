name: 仙加味 App 人工確認模式驗收

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "social-review-only-mode.js"
      - "social-review-only-mode.test.js"
      - "internal-app-review-only.js"
      - "internal-app-client-fix.js"
      - "tools/release_check.js"
      - ".github/workflows/review-only-verification.yml"

permissions:
  contents: write

concurrency:
  group: xjw-review-only-verification
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - name: Wait for Render review-only mode
        shell: bash
        run: |
          set -euo pipefail
          ok=""
          for i in $(seq 1 40); do
            code=$(curl -L -sS -o /tmp/review.json -w '%{http_code}' "https://ts-line.onrender.com/social/review-only-status?t=$(date +%s)" || true)
            if [ "$code" = "200" ] && node -e '
              const fs=require("fs");
              const d=JSON.parse(fs.readFileSync("/tmp/review.json","utf8"));
              if (!(d.ok===true && d.reviewOnlyMode===true && d.automaticSchedulingEnabled===false && d.automaticRetryEnabled===false && d.canonicalCount===10 && d.draftCount===10)) process.exit(1);
            '; then
              ok="1"
              break
            fi
            sleep 15
          done
          test "$ok" = "1"
      - name: Verify App review notice script
        run: |
          curl -L -fsS "https://ts-line.onrender.com/internal/app-review-only.js?t=$(date +%s)" -o /tmp/app-review.js
          grep -q "人工審核模式已開啟" /tmp/app-review.js
          grep -q "我已確認，手動發布" /tmp/app-review.js
          grep -q "不會自動排程、不會自動發布，也不會自動補發" /tmp/app-review.js
      - name: Record verified state
        shell: bash
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const live=JSON.parse(fs.readFileSync('/tmp/review.json','utf8'));
          const result={
            ok:true,
            verifiedAt:new Date().toISOString(),
            commit:process.env.GITHUB_SHA,
            mode:'App review only',
            automaticSchedulingEnabled:false,
            automaticRetryEnabled:false,
            canonicalCount:live.canonicalCount,
            draftCount:live.draftCount,
            posts:live.posts,
            confirmationButton:'我已確認，手動發布'
          };
          fs.writeFileSync('review-only-verification.json',JSON.stringify(result,null,2)+'\n');
          NODE
          git config user.name actions
          git config user.email actions@github.com
          git add review-only-verification.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: record App review-only verification"
            git push
          fi
