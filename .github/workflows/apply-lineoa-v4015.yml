name: Apply LINE OA v401.5

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: github.event.issue.title == 'APPLY_LINEOA_V4015'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Apply fix
        run: python3 tools/fix_redelivery_v4015.py
      - name: Add redelivery regression test
        run: |
          cat >> function.test.js <<'JS'

// v401.5：LINE 重送事件不可在尚未成功處理前直接略過。
{
  const { beginWebhookEvent, finishWebhookEvent } = require('./server');
  const event = { webhookEventId: 'redelivery-test-4015', deliveryContext: { isRedelivery: true } };
  assert.strictEqual(beginWebhookEvent(event), true);
  finishWebhookEvent(event, false);
  assert.strictEqual(beginWebhookEvent(event), true, '失敗事件的重送必須可以再次處理');
  finishWebhookEvent(event, true);
  assert.strictEqual(beginWebhookEvent(event), false, '成功處理後的同一事件才可略過');
}
JS
      - name: Test
        run: |
          set -euo pipefail
          npm ci
          npm test
          grep -q 'const VERSION = "v401.5"' server.js
          grep -q 'processingWebhookEvents' server.js
          grep -q 'beginWebhookEvent' server.js
      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add server.js data.json package.json package-lock.json test.js catalog.test.js security.test.js function.test.js image-policy.test.js tools/release_check.js
          git commit -m '修正 LINE OA 重送事件被直接略過 v401.5'
          git push origin HEAD:main
      - name: Wait for Render
        run: sleep 60
      - name: Verify Render
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error https://ts-line.onrender.com/healthz > /tmp/health.json; then
              if python3 - <<'PY'
          import json, sys
          h=json.load(open('/tmp/health.json'))
          ok=(h.get('ok') is True and h.get('version')=='v401.5' and h.get('productCount')==6 and h.get('credentialsConfigured') is True and h.get('crmConfigured') is True)
          print(json.dumps(h,ensure_ascii=False,indent=2))
          sys.exit(0 if ok else 1)
          PY
              then exit 0; fi
            fi
            sleep 15
          done
          exit 1
      - name: Report success
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'LINEOA_V4015_SUCCESS｜已修正重送事件在回覆失敗前就被永久略過的問題；完整測試與 Render v401.5 驗收通過。'
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed
      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'LINEOA_V4015_FAILED｜修正或線上驗收未通過，未宣告完成。'
