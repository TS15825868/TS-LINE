name: LINE OA v311 final check

on:
  pull_request:
    branches: [main]
    paths:
      - FINAL_LINEOA_V311_CHECK.txt

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture complete validation
        run: |
          set +e
          {
            node --check server.js
            npm test
            python -c "from pathlib import Path; import json; s=Path('server.js').read_text(encoding='utf-8'); d=json.loads(Path('data.json').read_text(encoding='utf-8')); assert not Path('server-core.js').exists(); assert 'const VERSION = \"v311.0\";' in s; assert 'runtimeModule._compile' not in s; assert 'aspectMode: \"contain\"' in s; assert 'altText: \"仙加味品牌故事\"' in s; assert [p['id'] for p in d['products']] == ['guilu-gao','guilu-drink-30','guilu-drink-180','guilu-tangkuai','guilu-jiao','luerong-fen']; assert d['store']['hours'] == '週一至週六 09:30–18:30'; assert d['store']['holidayNote'] == '假日如未外出，可提前透過官方 LINE 預約。'; assert any('龜鹿飲180cc 5 包' in item for c in d['offers']['comboOffers'] for item in c['items']); print('LINE OA v311 final data check passed')"
            for file in welcome products recommend combo usage faq service brand; do
              curl --fail --silent --show-error --location --output /dev/null "https://ts15825868.github.io/xianjiawei/images/line-mascot/xianjiawei-mascot-line-$file.jpg"
            done
            curl --fail --silent --show-error --location --output /dev/null "https://ts15825868.github.io/xianjiawei/images/line/xianjiawei-rich-menu-2500x1686-v309.jpg"
          } > final-lineoa-v311-check.log 2>&1
          status=$?
          echo "$status" > final-lineoa-v311-status.txt
          cat final-lineoa-v311-check.log
          exit 0

      - name: Upload validation log
        uses: actions/upload-artifact@v4
        with:
          name: lineoa-v311-final-check
          path: |
            final-lineoa-v311-check.log
            final-lineoa-v311-status.txt
          retention-days: 3
