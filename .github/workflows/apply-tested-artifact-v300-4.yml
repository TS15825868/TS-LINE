name: Apply tested LINE OA v300.4 artifact

on:
  push:
    branches: [main]
    paths:
      - APPLY_TESTED_V3004.txt

permissions:
  contents: write
  actions: read

jobs:
  apply-tested-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download tested artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/v3004
          curl --fail --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/8205934338/zip" \
            -o /tmp/v3004.zip
          unzip -q /tmp/v3004.zip -d /tmp/v3004

      - name: Apply tested runtime files
        run: |
          set -euo pipefail
          cp /tmp/v3004/server.js server.js
          cp /tmp/v3004/data.json data.json
          cp /tmp/v3004/test.js test.js
          cp /tmp/v3004/security.test.js security.test.js
          cp /tmp/v3004/function.test.js function.test.js
          cp /tmp/v3004/package.json package.json
          cp /tmp/v3004/package-lock.json package-lock.json
          cp /tmp/v3004/README.md README.md
          cp /tmp/v3004/tools/sync_website_catalog.js tools/sync_website_catalog.js
          cp /tmp/v3004/.github/workflows/verify-line-and-website-catalog.yml .github/workflows/verify-line-and-website-catalog.yml

      - name: Verify tested build again
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Run complete verification
        run: |
          set -euo pipefail
          npm ci
          npm run check:catalog
          npm test
          node --check server.js
          node --check test.js
          node --check catalog.test.js
          node --check security.test.js
          node --check function.test.js
          node --check tools/sync_website_catalog.js
          grep -F 'const VERSION = "v300.4";' server.js >/dev/null
          grep -F 'quantityOptions' data.json >/dev/null
          grep -F '買10送2（12瓶）' data.json >/dev/null
          grep -F '買10送2（12包）' data.json >/dev/null

      - name: HTTP smoke test
        run: |
          set -euo pipefail
          node server.js >/tmp/lineoa-v3004.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl --fail --silent http://127.0.0.1:3000/ | grep '"version":"v300.4"' >/dev/null
          curl --fail --silent http://127.0.0.1:3000/healthz | grep '"crmConfigured":true' >/dev/null

      - name: Clean temporary update files
        run: |
          rm -f APPLY_TESTED_V3004.txt
          rm -f QUANTITY_OFFERS_TRIGGER.txt QUANTITY_PR_PREP.txt QUANTITY_PR_TRIGGER.txt
          rm -f RUN_QUANTITY_OFFERS_PR.txt RUN_QUANTITY_OFFERS_V300_4_FIX.txt RUN_QUANTITY_OFFERS_SYNC.txt RUN_QUANTITY_OFFERS_FINAL.txt RUN_QUANTITY_OFFERS_FINAL2.txt RUN_QUANTITY_OFFERS_FINAL3.txt
          rm -f tools/apply_quantity_offers_v300_4.js
          rm -f .github/workflows/apply-quantity-offers-v300-4.yml
          rm -f .github/workflows/apply-quantity-offers-pr-v300-4.yml
          rm -f .github/workflows/apply-tested-artifact-v300-4.yml

      - name: Commit verified v300.4
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v300.4: complete quantity choices and promotion verification"
          git push origin main
