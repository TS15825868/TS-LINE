name: security env only

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  secure:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Remove credential fallbacks
        shell: python
        run: |
          from pathlib import Path
          p=Path('server.js')
          text=p.read_text(encoding='utf-8')
          lines=[]
          for line in text.splitlines():
              if 'channelAccessToken:' in line:
                  lines.append('  channelAccessToken: process.env.CHANNEL_ACCESS_TOKEN || "",')
              elif 'channelSecret:' in line:
                  lines.append('  channelSecret: process.env.CHANNEL_SECRET || "",')
              elif '全系列開放詢問與下單；產品盒裝到貨後依訂單順序安排出貨。' in line:
                  lines.append(' * 全系列開放詢問與下單；實際庫存與出貨時間由客服確認。')
              else:
                  lines.append(line)
          p.write_text('\n'.join(lines)+'\n',encoding='utf-8')
      - name: Commit security fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js
          git commit -m "security: use LINE credentials from environment only"
          git push origin main
