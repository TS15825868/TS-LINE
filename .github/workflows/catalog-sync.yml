name: 仙加味資料同步與驗收

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"
  push:
    branches: [main]
    paths:
      - "data.json"
      - "server.js"
      - "social-server.js"
      - "social-approved-originals.js"
      - "social-final-reconcile.js"
      - "internal-app.js"
      - "internal-entry.js"
      - "tools/**"
      - "package.json"
      - "package-lock.json"
      - "catalog.test.js"
      - ".github/workflows/catalog-sync.yml"

permissions:
  contents: write

concurrency:
  group: xianjiawei-main-sync
  cancel-in-progress: false

jobs:
  validate-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and repair dependency lock
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Sync website catalog
        run: npm run sync:catalog

      - name: Commit synchronized files immediately
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- data.json package-lock.json; then
            echo "Catalog and dependency lock already synchronized"
            exit 0
          fi
          git config user.name "仙加味自動同步"
          git config user.email "actions@users.noreply.github.com"
          git add data.json package-lock.json
          git commit -m "chore: auto-sync catalog and dependency lock"
          git pull --rebase origin main
          git push origin main

      - name: Run complete release checks and retain failure details
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee /tmp/xjw-test.log
          status=${PIPESTATUS[0]}
          set -e

          git config user.name "仙加味自動驗收"
          git config user.email "actions@users.noreply.github.com"

          if [ "$status" -ne 0 ]; then
            {
              echo "commit=$(git rev-parse HEAD)"
              echo "recorded_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo
              tail -n 160 /tmp/xjw-test.log
            } > ci-last-error.txt
            git add ci-last-error.txt
            git commit -m "chore: record latest CI failure" || true
            git pull --rebase origin main
            git push origin main
            exit "$status"
          fi

          if [ -f ci-last-error.txt ]; then
            git rm ci-last-error.txt
            git commit -m "chore: clear resolved CI failure"
            git pull --rebase origin main
            git push origin main
          fi
