name: Apply LINE OA full function fix PR v300.3b

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-and-verify:
    if: github.head_ref == 'lineoa-full-check-v300-3b'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply update
        run: |
          if grep -F 'const VERSION = "v300.3";' server.js >/dev/null; then
            echo "v300.3 already applied"
          else
            node tools/apply_full_function_fix_v300_3b.js
          fi
          npm install --package-lock-only --ignore-scripts
      - name: Install and verify
        run: |
          npm ci
          npm run check:catalog
          npm test
          node --check server.js
          node --check test.js
          node --check catalog.test.js
          node --check security.test.js
          node --check function.test.js
          grep -F 'channelAccessToken: process.env.CHANNEL_ACCESS_TOKEN || ""' server.js >/dev/null
          grep -F 'channelSecret: process.env.CHANNEL_SECRET || ""' server.js >/dev/null
          grep -F 'return productCarousel();' server.js >/dev/null
      - name: HTTP smoke test
        run: |
          node server.js >/tmp/lineoa-v300-3.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl --fail --silent http://127.0.0.1:3000/ | grep '"version":"v300.3"' >/dev/null
          curl --fail --silent http://127.0.0.1:3000/healthz | grep '"crmConfigured":true' >/dev/null
      - name: Commit verified result
        run: |
          rm -f FULL_FUNCTION_FIX_TRIGGER.txt PR_FIX_PREP.txt PR_FIX_TRIGGER.txt
          git checkout -- .github/workflows/verify-line-and-website-catalog.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js test.js security.test.js function.test.js package.json package-lock.json README.md
          git add -u FULL_FUNCTION_FIX_TRIGGER.txt PR_FIX_PREP.txt PR_FIX_TRIGGER.txt 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "v300.3: fix product and direct-order cards, verify all LINE functions"
            git pull --rebase origin ${{ github.head_ref }}
            git push origin HEAD:${{ github.head_ref }}
          else
            echo "No runtime changes to commit."
          fi
