name: Apply LINE OA v401.5 simple

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: github.event.issue.title == 'APPLY_LINEOA_V4015_SIMPLE'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Apply fix
        run: python3 tools/fix_redelivery_v4015.py
      - name: Test
        run: |
          npm ci
          npm test
          grep -q 'const VERSION = "v401.5"' server.js
          grep -q 'processingWebhookEvents' server.js
      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add server.js data.json package.json package-lock.json test.js catalog.test.js security.test.js function.test.js image-policy.test.js tools/release_check.js
          git commit -m '修正 LINE OA 重送事件被直接略過 v401.5'
          git push origin HEAD:main
      - name: Report success
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'LINEOA_V4015_CODE_APPLIED｜重送事件修正已提交 main，請等待 Render 自動部署。'
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed
      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'LINEOA_V4015_CODE_FAILED｜程式修正未通過。'
