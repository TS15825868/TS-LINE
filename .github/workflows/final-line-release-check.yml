name: Final LINE OA release check

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/final-line-release-check.yml

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full LINE OA tests
        run: npm test

      - name: Verify website catalog synchronization
        run: npm run check:catalog

      - name: Verify dedicated local mascot assets
        run: |
          node - <<'JS'
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('mascot-manifest.json', 'utf8'));
          const names = ['welcome','products','recommend','combo','usage','faq','service','brand','cart'];
          if (manifest.version !== '400.2') throw new Error('小老闆 manifest 版本錯誤');
          if (Object.keys(manifest.images).length !== names.length) throw new Error('小老闆圖片數量錯誤');
          for (const name of names) {
            const item = manifest.images[name];
            if (!item || item.width !== 1448 || item.height !== 1086 || item.bytes < 100000 || item.edgeMean < 2) {
              throw new Error(`小老闆圖片品質錯誤：${name}`);
            }
            if (!fs.existsSync(item.file)) throw new Error(`小老闆圖片缺少：${item.file}`);
          }
          const server = fs.readFileSync('server.js', 'utf8');
          if (!server.includes('express.static(path.join(__dirname, "public", "mascot")')) throw new Error('未使用 LINE OA 本地圖片');
          if (server.includes('ts15825868.github.io/xianjiawei/images/line-mascot')) throw new Error('仍混用官網小老闆圖片');
          if (!server.includes('const VERSION = "v400.2"')) throw new Error('LINE OA 版本錯誤');
          console.log('LINE OA 九張專用小老闆圖片與本地引用檢查通過');
          JS
