name: Apply LINE OA v401.4

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: github.event.issue.title == 'APPLY_LINEOA_V4014'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Apply and test
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          : > /tmp/apply.log
          python3 tools/upgrade_lineoa_v4014.py >> /tmp/apply.log 2>&1
          code=$?
          if [ $code -eq 0 ]; then npm ci >> /tmp/apply.log 2>&1; code=$?; fi
          if [ $code -eq 0 ]; then npm test >> /tmp/apply.log 2>&1; code=$?; fi
          if [ $code -ne 0 ]; then
            { echo '```text'; tail -n 120 /tmp/apply.log; echo '```'; } > /tmp/failure.md
            gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file /tmp/failure.md
            exit $code
          fi
          cat /tmp/apply.log
      - name: Commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add server.js data.json package.json package-lock.json test.js catalog.test.js security.test.js function.test.js image-policy.test.js tools/release_check.js .github/workflows/keep-render-awake.yml
          git commit -m '修正 LINE OA 無回覆與 Render 冷啟動 v401.4'
          git push origin HEAD:main
      - name: Wait for Render
        run: sleep 45
      - name: Verify Render
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error https://ts-line.onrender.com/healthz > /tmp/health.json; then
              if python3 - <<'PY'
          import json, sys
          h=json.load(open('/tmp/health.json'))
          ok=(h.get('ok') is True and h.get('version')=='v401.4' and h.get('productCount')==6 and h.get('credentialsConfigured') is True and h.get('crmConfigured') is True and h.get('replyClient')=='MessagingApiClient')
          print(json.dumps(h,ensure_ascii=False,indent=2))
          sys.exit(0 if ok else 1)
          PY
              then exit 0; fi
            fi
            sleep 15
          done
          exit 1
      - name: Report success
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'LINEOA_V4014_SUCCESS｜已改用 MessagingApiClient、Webhook快速回200、Flex失敗文字備援、健康診斷與Render每10分鐘保活；完整測試與線上驗收通過。'
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed
      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'LINEOA_V4014_FAILED｜修正或線上驗收未通過，未宣告完成。'
