name: Apply LINE OA hotfix

on:
  push:
    branches: [main]
    paths:
      - "tools/apply_lineoa_hotfix.py"
      - ".github/workflows/apply-lineoa-hotfix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply deterministic hotfix
        run: python3 tools/apply_lineoa_hotfix.py
      - name: Validate JavaScript
        run: |
          node --check server.js
          node --check line-image-safety.js
      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js line-image-safety.js package.json
          git commit -m "fix: force LINE image safety and faster asset delivery"
          git push
