name: Package LINE OA v289

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build LINE OA ZIP
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p export/TS-LINE-v289
          rsync -a \
            --exclude='.git' \
            --exclude='export' \
            --exclude='.github/workflows/package-export.yml' \
            ./ export/TS-LINE-v289/
          cd export
          zip -r TS-LINE-v289.zip TS-LINE-v289

      - name: Upload LINE OA ZIP
        uses: actions/upload-artifact@v4
        with:
          name: TS-LINE-v289-package
          path: export/TS-LINE-v289.zip
          retention-days: 1
          if-no-files-found: error
