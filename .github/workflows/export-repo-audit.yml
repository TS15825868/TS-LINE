name: Export LINE OA source audit

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  export:
    if: github.event.issue.title == 'EXPORT_LINEOA_SOURCE_AUDIT'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Archive source
        run: |
          zip -r /tmp/lineoa-source.zip . -x '.git/*' 'node_modules/*'
      - uses: actions/upload-artifact@v4
        with:
          name: lineoa-source-audit
          path: /tmp/lineoa-source.zip
      - name: Report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "SOURCE_AUDIT_READY run_id=${{ github.run_id }}"
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed
