name: LINE OA v312 final clean

on:
  push:
    branches: [lineoa-v312-final-clean]
    paths:
      - LINEOA_V312_FINALIZE.txt

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: lineoa-v312-final-clean
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Import verified single-program candidate
        run: |
          git fetch origin lineoa-v311-candidate-debug
          for file in server.js data.json test.js function.test.js catalog.test.js security.test.js package.json package-lock.json README.md RICH_MENU_SETUP.md rich-menu-actions.json; do
            if git cat-file -e origin/lineoa-v311-candidate-debug:"$file" 2>/dev/null; then
              git show origin/lineoa-v311-candidate-debug:"$file" > "$file"
            fi
          done

      - name: Consolidate runtime and remove obsolete files
        run: |
          rm -f server-core.js V311_TEST_OUTPUT.txt CANDIDATE_TEST_TRIGGER.txt LINEOA_V311_MAIN_TRIGGER.txt
          find . -maxdepth 1 -type f \( -name '*_TRIGGER.txt' -o -name 'V*_TEST_OUTPUT.txt' \) -delete
          if [ -d tools ]; then
            find tools -type f ! -name 'sync_website_catalog.js' -delete
            find tools -type d -empty -delete
          fi
          if [ -d .github/workflows ]; then
            find .github/workflows -type f \
              ! -name 'lineoa-v312-finalize.yml' \
              ! -name 'verify-line-and-website-catalog.yml' \
              -delete
          fi
          node - <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = '3.1.2';
          pkg.main = 'server.js';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          let server = fs.readFileSync('server.js', 'utf8');
          server = server.replace(/const VERSION = "v[0-9.]+";/, 'const VERSION = "v312.0";');
          server = server.replace(/仙加味 LINE OA Bot v[0-9.]+/, '仙加味 LINE OA Bot v312.0');
          server = server.replace(/\?v=311\.0/g, '?v=312.0');
          fs.writeFileSync('server.js', server);
          for (const file of ['test.js', 'function.test.js']) {
            if (!fs.existsSync(file)) continue;
            let text = fs.readFileSync(file, 'utf8').replace(/v311\.0/g, 'v312.0');
            fs.writeFileSync(file, text);
          }
          NODE
          npm install --package-lock-only --ignore-scripts

      - name: Verify syntax, data and functions
        run: |
          npm ci
          node --check server.js
          node --check test.js
          node --check function.test.js
          npm test
          node - <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('data.json', 'utf8'));
          const server = fs.readFileSync('server.js', 'utf8');
          if (fs.existsSync('server-core.js')) throw new Error('server-core.js must be removed');
          if (!server.includes('const VERSION = "v312.0";')) throw new Error('wrong version');
          for (const pose of ['welcome','products','recommend','combo','usage','faq','service','brand']) {
            if (!server.includes(`${pose}: "images/line-mascot/`)) throw new Error('missing mascot pose: ' + pose);
          }
          if (!server.includes('aspectMode: "contain"')) throw new Error('mascot image must use contain');
          if (!Array.isArray(data.products) || data.products.length !== 6) throw new Error('product data invalid');
          console.log('PASS LINE OA v312 consolidated runtime and data');
          NODE

      - name: HTTP smoke test
        env:
          CHANNEL_ACCESS_TOKEN: test-token
          CHANNEL_SECRET: test-secret
        run: |
          node server.js >/tmp/lineoa-v312.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 3
          curl --fail --silent http://127.0.0.1:3000/ | grep 'v312.0' >/dev/null
          curl --fail --silent http://127.0.0.1:3000/healthz | grep '"ok":true' >/dev/null

      - name: Commit final clean result
        run: |
          rm -f LINEOA_V312_FINALIZE.txt
          rm -f .github/workflows/lineoa-v312-finalize.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'LINE OA v312：整合 server.js 與 data.json、加入小老闆卡片並清除舊檔'
          git push origin HEAD:lineoa-v312-final-clean
