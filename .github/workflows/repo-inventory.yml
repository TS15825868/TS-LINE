name: Repository inventory

on:
  push:
    branches: [main]
    paths:
      - INVENTORY_TRIGGER.txt

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build inventory
        run: |
          find . -path './.git' -prune -o -type f -print | sed 's#^./##' | sort > REPO_FILE_MANIFEST.txt
      - name: Commit inventory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add REPO_FILE_MANIFEST.txt
          git commit -m "chore: generate temporary repository inventory"
          git push
