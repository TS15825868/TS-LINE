name: Apply LINE OA full function fix v300.3

on:
  push:
    branches: [main]
    paths:
      - FULL_FUNCTION_FIX_TRIGGER.txt

permissions:
  contents: write

jobs:
  fix-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply full function fix
        run: |
          set -euo pipefail
          node tools/apply_full_function_fix_v300_3.js
          npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci

      - name: Verify catalog
        run: npm run check:catalog

      - name: Run complete tests
        run: npm test

      - name: Syntax checks
        run: |
          node --check server.js
          node --check test.js
          node --check catalog.test.js
          node --check security.test.js
          node --check function.test.js
          node --check tools/sync_website_catalog.js

      - name: HTTP smoke tests
        shell: bash
        run: |
          set -euo pipefail
          node server.js >/tmp/lineoa-v300-3.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl --fail --silent http://127.0.0.1:3000/ | grep '"version":"v300.3"' >/dev/null
          curl --fail --silent http://127.0.0.1:3000/healthz | grep '"crmConfigured":true' >/dev/null
          curl --fail --silent http://127.0.0.1:3000/healthz | grep '"credentialsConfigured":false' >/dev/null
          STATUS=$(curl --silent --output /tmp/webhook.json --write-out '%{http_code}' -X POST -H 'content-type: application/json' -d '{"events":[]}' http://127.0.0.1:3000/webhook)
          test "$STATUS" = "503"

      - name: Commit verified update
        run: |
          set -euo pipefail
          rm -f FULL_FUNCTION_FIX_TRIGGER.txt
          rm -f tools/apply_full_function_fix_v300_3.js
          rm -f .github/workflows/apply-full-function-fix-v300-3.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v300.3: fix product/direct-order cards and verify all LINE functions"
          git push origin main
