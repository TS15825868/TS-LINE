name: 仙加味最終完整驗收

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "internal-app-client-fix.js"
      - "internal-social-site.js"
      - "internal-social-site/**"
      - "social-static-asset-bridge.js"
      - "social-final-posts.js"
      - "social-final-release-20260724.js"
      - "social-final-release-remote-assets.js"
      - "social-review-only-mode.js"
      - "social-schedule-policy.js"
      - "social-publish-guard.js"
      - "tools/release_check.js"
      - ".github/workflows/final-verification.yml"

permissions:
  contents: write

concurrency:
  group: xianjiawei-final-verification
  cancel-in-progress: true

jobs:
  final-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 26
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Run complete test suite
        id: tests
        run: |
          set -euo pipefail
          npm ci
          npm test 2>&1 | tee /tmp/final-tests.log

      - name: Wait for Render deployment and verify production
        id: production
        shell: bash
        env:
          BASE_URL: https://ts-line.onrender.com
        run: |
          set -euo pipefail
          mkdir -p /tmp/xjw-final
          success=0
          for attempt in $(seq 1 80); do
            echo "Final split-system verification $attempt/80" | tee -a /tmp/final-production.log
            release_ok=0
            social_site_ok=0
            raster_ok=0
            internal_ok=0
            database_ok=0
            social_ok=0

            if curl --connect-timeout 10 --max-time 65 --fail --silent --show-error \
              "$BASE_URL/social/final-release-healthz?t=$(date +%s)" -o /tmp/xjw-final/release.json; then
              node - <<'NODE' && release_ok=1 || true
          const r = require('/tmp/xjw-final/release.json');
          if (r.ok !== true) throw new Error('release not ok');
          if (r.version !== '2026-07-24-final-v1') throw new Error('release version mismatch');
          if (Number(r.totalPosts) !== 10 || Number(r.fixedPosts) !== 7 || Number(r.weatherStandbyPosts) !== 3) throw new Error('post counts mismatch');
          if (r.duplicateTitleCount !== 0 || r.duplicateCaptionCount !== 0 || r.duplicateImageCount !== 0) throw new Error('duplicates found');
          if (!Array.isArray(r.assets) || r.assets.length !== 10) throw new Error('asset count mismatch');
          if (r.assets.some((a) => a.ok !== true || Number(a.width) !== 1254 || Number(a.height) !== 1254)) throw new Error('asset quality mismatch');
          NODE
            fi

            if curl --connect-timeout 10 --max-time 45 --fail --silent --show-error \
              "$BASE_URL/internal/social-center-healthz?t=$(date +%s)" -o /tmp/xjw-final/social-site.json; then
              node - <<'NODE' && social_site_ok=1 || true
          const h = require('/tmp/xjw-final/social-site.json');
          if (h.ok !== true || h.mode !== 'independent-website') throw new Error('social website not independent');
          if (h.reviewRequiredBeforePublish !== true || h.automaticRetryEnabled !== false) throw new Error('social safety rules mismatch');
          if (h.inventoryApp !== '/internal/app' || h.socialWebsite !== '/internal/social-center') throw new Error('internal routes mismatch');
          NODE
            fi

            if curl --connect-timeout 10 --max-time 90 --fail --silent --show-error \
              "$BASE_URL/social/raster-healthz?t=$(date +%s)" -o /tmp/xjw-final/raster.json; then
              node - <<'NODE' && raster_ok=1 || true
          const h = require('/tmp/xjw-final/raster.json');
          if (h.ok !== true || h.rasterText !== true || h.preventsGibberish !== true) throw new Error('Traditional Chinese raster health failed');
          if (h.contentVersion !== 'social-raster-tc-v1' || h.targetSize !== '1254x1254') throw new Error('raster version or size mismatch');
          if (!String(h.sampleText || '').includes('繁體中文測試')) throw new Error('Traditional Chinese sample missing');
          if (Number(h.fontBytes || 0) < 1000000 || Number(h.sampleBytes || 0) < 1000) throw new Error('font or raster sample invalid');
          NODE
            fi

            curl --connect-timeout 10 --max-time 35 --fail --silent --show-error "$BASE_URL/internal/healthz?t=$(date +%s)" -o /tmp/xjw-final/internal.json 2>/dev/null && \
              node -e "const h=require('/tmp/xjw-final/internal.json');if(h.ok!==true||h.app!=='仙加味內部管理 App')process.exit(1)" && internal_ok=1 || true
            curl --connect-timeout 10 --max-time 35 --fail --silent --show-error "$BASE_URL/internal/db-healthz?t=$(date +%s)" -o /tmp/xjw-final/database.json 2>/dev/null && \
              node -e "const h=require('/tmp/xjw-final/database.json');if(h.ok!==true||h.storage!=='supabase')process.exit(1)" && database_ok=1 || true
            curl --connect-timeout 10 --max-time 35 --fail --silent --show-error "$BASE_URL/social/healthz?t=$(date +%s)" -o /tmp/xjw-final/social.json 2>/dev/null && \
              node -e "const h=require('/tmp/xjw-final/social.json');if(h.ok!==true||h.instagramConfigured!==true||h.facebookConfigured!==true||Number(h.postCount)<10)process.exit(1)" && social_ok=1 || true

            if [ "$release_ok" -eq 1 ] && [ "$social_site_ok" -eq 1 ] && [ "$raster_ok" -eq 1 ] && \
               [ "$internal_ok" -eq 1 ] && [ "$database_ok" -eq 1 ] && [ "$social_ok" -eq 1 ]; then
              success=1
              break
            fi
            sleep 15
          done

          if [ "$success" -ne 1 ]; then
            echo "Final split-system production verification did not pass" | tee -a /tmp/final-production.log
            for file in release social-site raster internal database social; do
              echo "--- $file ---" | tee -a /tmp/final-production.log
              cat "/tmp/xjw-final/$file.json" 2>/dev/null | tee -a /tmp/final-production.log || true
            done
            exit 1
          fi

          status=$(curl --connect-timeout 10 --max-time 30 --silent --output /tmp/xjw-final/login-body \
            --dump-header /tmp/xjw-final/login-headers --write-out '%{http_code}' \
            "$BASE_URL/internal/social-center?t=$(date +%s)")
          test "$status" = "302"
          tr -d '\r' < /tmp/xjw-final/login-headers | grep -qi '^location: /internal/login'

          curl --connect-timeout 10 --max-time 120 --fail --silent --show-error \
            "$BASE_URL/social-approved-assets/care-work-rest-v7.jpg?v=social-raster-tc-v1&t=$(date +%s)" \
            -o /tmp/xjw-final/sample.jpg
          node - <<'NODE'
          const sharp = require('sharp');
          (async () => {
            const m = await sharp('/tmp/xjw-final/sample.jpg').metadata();
            if (m.format !== 'jpeg' || m.width !== 1254 || m.height !== 1254) throw new Error('final image is not 1254x1254 JPEG');
          })();
          NODE

      - name: Write verification result
        if: always()
        shell: bash
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
          PRODUCTION_OUTCOME: ${{ steps.production.outcome }}
        run: |
          set -euo pipefail
          ok=false
          if [ "$TEST_OUTCOME" = "success" ] && [ "$PRODUCTION_OUTCOME" = "success" ]; then ok=true; fi
          node - <<'NODE'
          const fs = require('fs');
          const load = (name) => { try { return JSON.parse(fs.readFileSync(`/tmp/xjw-final/${name}.json`, 'utf8')); } catch { return {}; } };
          const release = load('release');
          const social = load('social');
          const internal = load('internal');
          const database = load('database');
          const socialSite = load('social-site');
          const raster = load('raster');
          const ok = process.env.TEST_OUTCOME === 'success' && process.env.PRODUCTION_OUTCOME === 'success';
          const result = {
            ok,
            verifiedAt: new Date().toISOString(),
            commit: process.env.GITHUB_SHA,
            testOutcome: process.env.TEST_OUTCOME,
            productionOutcome: process.env.PRODUCTION_OUTCOME,
            releaseVersion: release.version || '',
            assetVersion: release.assetVersion || '',
            totalPosts: Number(release.totalPosts || 0),
            fixedPosts: Number(release.fixedPosts || 0),
            weatherStandbyPosts: Number(release.weatherStandbyPosts || 0),
            duplicateTitleCount: Number(release.duplicateTitleCount || 0),
            duplicateCaptionCount: Number(release.duplicateCaptionCount || 0),
            duplicateImageCount: Number(release.duplicateImageCount || 0),
            assetCount: Array.isArray(release.assets) ? release.assets.length : 0,
            assetQualityOk: Array.isArray(release.assets) && release.assets.length === 10 && release.assets.every((a) => a.ok === true && Number(a.width) === 1254 && Number(a.height) === 1254),
            socialPostCount: Number(social.postCount || 0),
            instagramConfigured: social.instagramConfigured === true,
            facebookConfigured: social.facebookConfigured === true,
            inventoryApp: '/internal/app',
            internalApp: internal.app || '',
            inventoryAppHealthy: internal.ok === true,
            socialWebsite: '/internal/social-center',
            socialSiteVersion: socialSite.version || '',
            socialWebsiteHealthy: socialSite.ok === true,
            independentWebsite: socialSite.mode === 'independent-website',
            reviewRequiredBeforePublish: socialSite.reviewRequiredBeforePublish === true,
            automaticRetryEnabled: socialSite.automaticRetryEnabled,
            rasterVersion: raster.contentVersion || '',
            rasterHealthy: raster.ok === true,
            TraditionalChineseFont: raster.fontFamily || '',
            preventsGibberish: raster.preventsGibberish === true,
            targetImageSize: raster.targetSize || '',
            storage: database.storage || '',
            fixedSchedule: '週三、週五 10:00',
            weatherPosts: '依萬華實際氣候，非固定日加發',
            unreviewedPublishingBlocked: true
          };
          fs.writeFileSync('final-verification.json', JSON.stringify(result, null, 2) + '\n');
          NODE

          if [ "$ok" != "true" ]; then
            {
              echo "commit=$GITHUB_SHA"
              echo "testOutcome=$TEST_OUTCOME"
              echo "productionOutcome=$PRODUCTION_OUTCOME"
              echo
              echo "--- tests ---"
              cat /tmp/final-tests.log 2>/dev/null || true
              echo
              echo "--- production ---"
              cat /tmp/final-production.log 2>/dev/null || true
            } > final-verification-error.txt
          else
            rm -f final-verification-error.txt
          fi

          git config user.name "仙加味最終驗收"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main
          git add final-verification.json
          if [ -f final-verification-error.txt ]; then git add final-verification-error.txt; else git rm -f --ignore-unmatch final-verification-error.txt; fi
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore: record final App and social verification"
          git push origin HEAD:main

      - name: Fail workflow when verification failed
        if: always()
        shell: bash
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
          PRODUCTION_OUTCOME: ${{ steps.production.outcome }}
        run: |
          test "$TEST_OUTCOME" = "success"
          test "$PRODUCTION_OUTCOME" = "success"
