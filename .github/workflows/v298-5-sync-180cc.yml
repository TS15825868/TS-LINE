name: v298.5 sync 180cc images

on:
  push:
    paths:
      - TRIGGER_V298_5.txt

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update LINE OA product image and DM URLs
        run: |
          node <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('data.json', 'utf8'));
          data.version = '298.5';
          const product = data.products.find(item => item.id === 'guilu-drink-180');
          if (!product) throw new Error('guilu-drink-180 not found');
          product.image = 'images/products-v3/guilu-drink-180.webp?v=298.5';
          product.dmImage = 'images/dm-v3/guilu-drink-180.webp?v=298.5';
          product.detailImages = ['images/dm-v3/guilu-drink-180.webp?v=298.5'];
          product.description = '180cc鋁袋包裝，把龜鹿膏的成分方向整理成較大容量的即飲型態。開封即可飲用，也可隔水加熱，或倒入杯中後加熱飲用。';
          product.usage = ['打開即可飲用。','可隔水加熱後飲用。','亦可倒入杯中後加熱飲用。','開封後請儘速飲用完畢。'];
          product.purpose = '較大容量即飲食補';
          product.purposeDirection = '適合偏好較大容量即飲、居家安排或溫熱後飲用的人。';
          fs.writeFileSync('data.json', JSON.stringify(data, null, 2) + '\n');

          let server = fs.readFileSync('server.js', 'utf8');
          server = server.replace(/仙加味 LINE OA Bot v[^\n*]+/, '仙加味 LINE OA Bot v298.5');
          server = server.replace(/const VERSION = "[^"]+";/, 'const VERSION = "v298.5";');
          fs.writeFileSync('server.js', server);

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.name = 'xianjiawei-lineoa-v298-5';
          pkg.version = '2.10.1';
          pkg.description = '仙加味 LINE OA v298.5｜同步龜鹿飲180cc產品圖、DM與2008品牌註冊故事';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          NODE

      - name: Commit and clean workflow
        run: |
          rm -f TRIGGER_V298_5.txt
          rm -f .github/workflows/v298-5-sync-180cc.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v298.5: sync 180cc product image and DM to LINE OA"
          git push origin main
