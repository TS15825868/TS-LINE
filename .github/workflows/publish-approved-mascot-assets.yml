name: 發布 LINE OA 正式小老闆圖片

on:
  push:
    branches: [main]
    paths:
      - ".asset-upload/**"
      - ".github/workflows/publish-approved-mascot-assets.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-approved-line-mascot-assets
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Decode approved assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public/mascot
          base64 --decode .asset-upload/usage-approved.b64 > public/mascot/usage.jpg
          base64 --decode .asset-upload/faq-approved.b64 > public/mascot/faq.jpg
          base64 --decode .asset-upload/brand-approved.b64 > public/mascot/brand.jpg
          file public/mascot/usage.jpg public/mascot/faq.jpg public/mascot/brand.jpg
          test -s public/mascot/usage.jpg
          test -s public/mascot/faq.jpg
          test -s public/mascot/brand.jpg

      - name: Validate image dimensions
        shell: bash
        run: |
          python - <<'PY'
          from PIL import Image
          for name in ('usage', 'faq', 'brand'):
              path = f'public/mascot/{name}.jpg'
              with Image.open(path) as image:
                  if image.size != (800, 600):
                      raise SystemExit(f'{path}: expected 800x600, got {image.size}')
                  if image.format != 'JPEG':
                      raise SystemExit(f'{path}: expected JPEG, got {image.format}')
                  print(path, image.size, image.format)
          PY

      - name: Commit approved assets and clean staging
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "仙加味正式素材發布"
          git config user.email "actions@users.noreply.github.com"
          git add public/mascot/usage.jpg public/mascot/faq.jpg public/mascot/brand.jpg
          git rm -f .asset-upload/usage-approved.b64 .asset-upload/faq-approved.b64 .asset-upload/brand-approved.b64
          if git diff --cached --quiet; then
            echo "No asset changes"
            exit 0
          fi
          git commit -m "feat: publish approved LINE OA usage FAQ and brand images"
          git pull --rebase origin main
          git push origin main
