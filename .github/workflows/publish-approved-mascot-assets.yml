name: 發布 LINE OA 正式小老闆圖片

on:
  push:
    branches: [main]
    paths:
      - ".asset-upload/**"
      - ".github/workflows/publish-approved-mascot-assets.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-approved-line-mascot-assets
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install image validator
        run: python -m pip install --disable-pip-version-check pillow

      - name: Decode and validate approved assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public/mascot
          python - <<'PY'
          import base64
          from pathlib import Path
          from PIL import Image

          for name in ('usage', 'faq', 'brand'):
              source = Path(f'.asset-upload/{name}-approved.b64')
              target = Path(f'public/mascot/{name}.jpg')
              text = ''.join(source.read_text(encoding='utf-8').split())
              padding = '=' * (-len(text) % 4)
              data = base64.b64decode(text + padding, validate=False)
              if not data.startswith(b'\xff\xd8') or not data.endswith(b'\xff\xd9'):
                  raise SystemExit(f'{source}: invalid or incomplete JPEG data ({len(data)} bytes)')
              target.write_bytes(data)
              with Image.open(target) as image:
                  image.verify()
              with Image.open(target) as image:
                  if image.size != (800, 600):
                      raise SystemExit(f'{target}: expected 800x600, got {image.size}')
                  if image.format != 'JPEG':
                      raise SystemExit(f'{target}: expected JPEG, got {image.format}')
                  print(source, len(text), 'chars ->', target, len(data), 'bytes', image.size, image.format)
          PY

      - name: Commit approved assets and clean staging
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "仙加味正式素材發布"
          git config user.email "actions@users.noreply.github.com"
          git add public/mascot/usage.jpg public/mascot/faq.jpg public/mascot/brand.jpg
          git rm -f .asset-upload/usage-approved.b64 .asset-upload/faq-approved.b64 .asset-upload/brand-approved.b64
          if git diff --cached --quiet; then
            echo "No asset changes"
            exit 0
          fi
          git commit -m "feat: publish approved LINE OA usage FAQ and brand images"
          git pull --rebase origin main
          git push origin main
