name: Finalize v312 run

on:
  push:
    branches: [main]
    paths:
      - FINALIZE_V312_RUN.txt

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply final patch
        run: |
          node tools/finalize_v312.js
          npm install --package-lock-only --ignore-scripts
      - name: Test
        run: |
          npm ci
          node --check server.js
          npm test
      - name: Commit
        run: |
          rm -f FINALIZE_V312_RUN.txt
          rm -f tools/finalize_v312.js
          rm -f .github/workflows/finalize-v312-run.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'LINE OA v312：完成 FAQ、小老闆服務卡與最終清理'
          git pull --rebase origin main
          git push origin main
