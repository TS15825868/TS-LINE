name: Apply LINE OA v401.1 no collage

on:
  push:
    branches: [main]
    paths: ['.trigger-v4011-no-collage']
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: github.event_name == 'push' || github.event.issue.title == 'APPLY_LINEOA_V4011_NO_COLLAGE'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remove collage-style cards and update version
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json

          server_path=Path('server.js')
          s=server_path.read_text(encoding='utf-8')
          s=s.replace('仙加味 LINE OA Bot v401.0','仙加味 LINE OA Bot v401.1',1)
          s=s.replace('const VERSION = "v401.0";','const VERSION = "v401.1";',1)

          old='''      contents: [
        mascotBubble(
          "小老闆介紹產品",
          "先看五大產品型態與六項正式規格，再進入各產品卡查看真實產品圖、價格、使用方式、正式DM與購買按鈕。",
          [
            { label: "幫我推薦", text: "幫我推薦" },
            { label: "搭配組合", text: "搭配組合" },
            { label: "人工客服", text: "我要人工客服" },
          ],
          "products"
        ),
        ...DATA.products.map(productBubble),
      ],'''
          new='''      // 產品列表直接顯示六張真實產品卡，不先放多產品拼湊圖。
      contents: DATA.products.map(productBubble),'''
          if old in s:
              s=s.replace(old,new,1)
          elif 'contents: DATA.products.map(productBubble)' not in s:
              raise SystemExit('找不到產品卡片區塊')

          marker='''    message.contents.hero = {
      type: "image",
      url: absoluteUrl(MASCOT_PATHS.cart),
      size: "full",
      aspectRatio: "1:1",
      aspectMode: "fit",
      backgroundColor: "#EFE4D2",
      action: { type: "uri", uri: absoluteUrl("products.html") },
    };
    return message;'''
          replacement='''    // 購物車缺少符合標準的獨立情境圖時，不使用產品或舊圖拼湊。
    // 保留清楚的文字、金額與按鈕，待獨立專用圖完成後再單張替換。
    return message;'''
          if marker in s:
              s=s.replace(marker,replacement,1)
          server_path.write_text(s,encoding='utf-8')

          data_path=Path('data.json')
          data=json.loads(data_path.read_text(encoding='utf-8'))
          data['version']='401.1'
          data['lineBotVersion']='v401.1'
          data['updatedAt']='2026-07-13'
          data['lineImagePolicy']={
            'productCards':'real-product-images-only',
            'generalCards':'one-purpose-one-image',
            'noCollage':True,
            'missingImage':'create-new-single-scene-image',
            'noRedrawnPackaging':True
          }
          data_path.write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')

          package_path=Path('package.json')
          package=json.loads(package_path.read_text(encoding='utf-8'))
          package['version']='4.1.1'
          package['description']='仙加味 LINE OA 正式版｜六項真實產品卡、不使用拼湊產品圖、價格、購物車、結帳、CRM、FAQ與獨立小老闆情境卡'
          package_path.write_text(json.dumps(package,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')

          replacements={
            'test.js':[
              ('assert.strictEqual(VERSION, "v401.0");','assert.strictEqual(VERSION, "v401.1");'),
              ('DATA.products.length + 1','DATA.products.length'),
            ],
            'security.test.js':[
              ('assert.strictEqual(VERSION, "v401.0");','assert.strictEqual(VERSION, "v401.1");'),
              ('PASS security and UX v400.2','PASS security and UX v401.1'),
            ],
            'function.test.js':[
              ('assert.strictEqual(VERSION, "v401.0");','assert.strictEqual(VERSION, "v401.1");'),
              ('DATA.products.length + 1','DATA.products.length'),
              ('PASS full LINE function matrix v400.2','PASS full LINE function matrix v401.1'),
              ('PASS quantity options and promotions v400.2','PASS quantity options and promotions v401.1'),
              ('PASS website message routing v400.2','PASS website message routing v401.1'),
              ('PASS combo prices, quantities, promotions and cart v400.2','PASS combo prices, quantities, promotions and cart v401.1'),
              ('PASS LINE product images and final DM buttons v400.2','PASS LINE product images and final DM buttons v401.1'),
              ('PASS LINE OA dedicated local mascot cards v400.2','PASS LINE OA dedicated local mascot cards v401.1'),
            ],
          }
          for filename, reps in replacements.items():
              p=Path(filename); text=p.read_text(encoding='utf-8')
              for a,b in reps: text=text.replace(a,b)
              if filename=='function.test.js' and '購物車不應使用拼湊圖' not in text:
                  text += '\nassert.ok(!cartFlex({ cart: [], checkout: null }).contents.hero, "購物車不應使用拼湊圖");\n'
              p.write_text(text,encoding='utf-8')

          release=Path('tools/release_check.js')
          release.write_text(release.read_text(encoding='utf-8').replace('v401.0','v401.1'),encoding='utf-8')

          readme=Path('README.md').read_text(encoding='utf-8').replace('v4.1.0','v4.1.1')
          if '不拼湊圖片規則' not in readme:
              readme += '''\n## 不拼湊圖片規則\n\n- 產品卡只使用真實產品原圖。\n- 功能卡一個用途只使用一張獨立情境圖。\n- 沒有符合標準的圖片時先不顯示圖片，改為製作新的單一場景圖。\n- 不把產品、人物、背景與舊海報截圖拼成一張；不重畫產品包裝。\n'''
          Path('README.md').write_text(readme,encoding='utf-8')
          PY

      - name: Test
        run: |
          set -euo pipefail
          npm ci
          npm test
          grep -q 'const VERSION = "v401.1";' server.js
          grep -q 'contents: DATA.products.map(productBubble)' server.js
          ! grep -q '"小老闆介紹產品"' server.js
          grep -q '"noCollage": true' data.json

      - name: Commit main
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f .trigger-v4011-no-collage
          git add -A
          git commit -m '依品牌標準移除LINE OA拼湊圖 v401.1'
          git push origin HEAD:main
