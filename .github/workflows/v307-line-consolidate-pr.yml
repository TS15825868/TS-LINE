name: LINE OA v307.1 consolidate

on:
  pull_request:
    branches: [main]
    paths:
      - V307_LINE_PR_TRIGGER_2.txt

permissions:
  contents: write

jobs:
  consolidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Consolidate one runtime and one catalog
        run: python tools/v307_consolidate.py

      - name: Install and validate core runtime
        run: |
          npm ci
          node --check server.js
          node - <<'NODE'
          const bot = require('./server');
          if (bot.VERSION !== 'v307.1') throw new Error(`unexpected version: ${bot.VERSION}`);
          const p180 = bot.getProduct('guilu-drink-180');
          if (!p180 || p180.price !== 200) throw new Error('180cc product missing or invalid');
          const carousel = bot.productCarousel();
          if (carousel.type !== 'flex' || carousel.contents.type !== 'carousel') throw new Error('product carousel invalid');
          const usage = bot.usageReply(p180);
          if (!usage || usage.type !== 'flex') throw new Error('usage reply invalid');
          console.log('LINE OA JavaScript smoke test passed');
          NODE
          python - <<'PY'
          from pathlib import Path
          import json
          data=json.loads(Path('data.json').read_text(encoding='utf-8'))
          assert not Path('server-core.js').exists()
          assert any(p.get('id')=='guilu-drink-180' for p in data['products'])
          assert data['store']['hours']=='週一至週六 09:30–18:30'
          server=Path('server.js').read_text(encoding='utf-8')
          assert 'runtime wrapper' not in server
          assert 'const VERSION = "v307.1";' in server
          assert 'aspectMode: "contain"' in server
          print('LINE OA v307.1 validated')
          PY

      - name: Remove one-time files
        run: |
          rm -f V307_LINE_PR_TRIGGER_2.txt
          rm -f tools/v307_consolidate.py
          rm -f .github/workflows/v307-line-consolidate-pr.yml

      - name: Commit LINE OA v307.1 to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "LINE OA v307.1：整合單一主程式與原生產品資料" || exit 0
          git push origin HEAD:${{ github.head_ref }}
