name: Report LINE mascot workflow

on:
  issues:
    types: [opened]

permissions:
  actions: read
  issues: write

jobs:
  report:
    if: github.event.issue.title == 'REPORT LINE MASCOT RUN'
    runs-on: ubuntu-latest
    steps:
      - name: Report latest bootstrap run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          result=$(gh api "repos/${{ github.repository }}/actions/workflows/bootstrap-line-mascot.yml/runs?per_page=1" --jq '.workflow_runs[0] | {id,status,conclusion,html_url,head_sha,created_at,updated_at}')
          printf '```json\n%s\n```\n' "$result" > /tmp/report.md
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body-file /tmp/report.md
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}
