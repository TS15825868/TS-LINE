name: Deploy LINE contextual mascot cards

on:
  push:
    paths:
      - LINE_MASCOT_CONTEXT_TRIGGER.txt

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply contextual mascot cards
        run: python tools/deploy_contextual_mascots.py

      - name: Validate LINE OA server
        run: node --check server.js

      - name: Remove one-time deployment files
        run: |
          rm -f LINE_MASCOT_CONTEXT_TRIGGER.txt
          rm -f .github/workflows/line-mascot-context-deploy.yml

      - name: Commit LINE OA contextual mascot update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v301.0：LINE OA 依功能配置小老闆不同動作與文案" || exit 0
          git push origin HEAD:main
