name: 仙加味正式站與 App 驗收

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "social-final-release-20260724.js"
      - "social-final-release-remote-assets.js"
      - "disable-official-social-rebuild.js"
      - "internal-app-social-filter.js"
      - "internal-app-social-retry.js"
      - "internal-app-facebook-health.js"
      - "internal-social-review-safety.js"
      - ".github/workflows/production-health.yml"

permissions:
  contents: read

concurrency:
  group: xianjiawei-production-health
  cancel-in-progress: true

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 22
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and test
        run: |
          npm ci
          npm test
          node -r ./social-final-approved-batch.js -r ./social-final-release-20260724.js -r ./social-final-release-remote-assets.js - <<'NODE'
          const release = require('./social-final-release-20260724');
          const assets = require('./social-final-release-remote-assets');
          if (!release.validateDefinitions()) process.exit(1);
          if (release.POSTS.length !== 10) process.exit(1);
          if (release.POSTS.filter((post) => !post.conditionalWeather).length !== 7) process.exit(1);
          if (release.POSTS.filter((post) => post.conditionalWeather).length !== 3) process.exit(1);
          if (Object.keys(assets.ALIASES).length !== 10) process.exit(1);
          console.log('final social definitions ok', release.POSTS.length);
          NODE
          grep -q 'button.disabled = false' internal-app-facebook-health.js
          grep -q '立即發布仍可使用' internal-app-facebook-health.js
          grep -q '立即發布可隨時使用' internal-app-social-filter.js
          ! grep -q 'button.disabled = expired' internal-app-facebook-health.js

      - name: Wait for Render and verify all live functions
        shell: bash
        env:
          BASE_URL: https://ts-line.onrender.com
        run: |
          set -euo pipefail
          mkdir -p /tmp/xjw-production
          success=0
          for attempt in $(seq 1 72); do
            echo "Production check $attempt/72"
            if curl --connect-timeout 10 --max-time 45 --fail --silent --show-error \
              "$BASE_URL/social/final-release-healthz?t=$(date +%s)" -o /tmp/xjw-production/release.json; then
              if node - <<'NODE'
          const r = require('/tmp/xjw-production/release.json');
          if (r.ok !== true || r.version !== '2026-07-24-final-v1') process.exit(1);
          if (r.assetVersion !== '2026-07-24-remote-assets-v1') process.exit(1);
          if (Number(r.totalPosts) !== 10 || Number(r.fixedPosts) !== 7 || Number(r.weatherStandbyPosts) !== 3) process.exit(1);
          if (r.immediatePublishUnlocked !== true) process.exit(1);
          if (!Array.isArray(r.assets) || r.assets.length !== 10 || r.assets.some((a) => a.ok !== true || Number(a.width) !== 1254 || Number(a.height) !== 1254)) process.exit(1);
          NODE
              then success=1; break; fi
            fi
            sleep 15
          done
          if [ "$success" -ne 1 ]; then
            echo "Render did not reach final social release health" >&2
            cat /tmp/xjw-production/release.json 2>/dev/null || true
            exit 1
          fi

          curl --connect-timeout 10 --max-time 30 --fail --silent --show-error "$BASE_URL/healthz" -o /tmp/xjw-production/health.json
          curl --connect-timeout 10 --max-time 30 --fail --silent --show-error "$BASE_URL/social/healthz" -o /tmp/xjw-production/social.json
          curl --connect-timeout 10 --max-time 30 --fail --silent --show-error "$BASE_URL/internal/healthz" -o /tmp/xjw-production/internal.json
          curl --connect-timeout 10 --max-time 30 --fail --silent --show-error "$BASE_URL/internal/db-healthz" -o /tmp/xjw-production/database.json
          curl --connect-timeout 10 --max-time 30 --fail --silent --show-error "$BASE_URL/internal/app-runtime.js?t=$(date +%s)" -o /tmp/xjw-production/app-runtime.js
          curl --connect-timeout 10 --max-time 30 --fail --silent --show-error "$BASE_URL/internal/app-social-retry.js?t=$(date +%s)" -o /tmp/xjw-production/social-retry.js
          curl --connect-timeout 10 --max-time 30 --fail --silent --show-error "$BASE_URL/internal/app-social-filter.js?t=$(date +%s)" -o /tmp/xjw-production/social-filter.js
          curl --connect-timeout 10 --max-time 30 --fail --silent --show-error "$BASE_URL/internal/app-facebook-health.js?t=$(date +%s)" -o /tmp/xjw-production/facebook-health.js

          node - <<'NODE'
          const fs = require('fs');
          const read = (name) => JSON.parse(fs.readFileSync(`/tmp/xjw-production/${name}.json`, 'utf8'));
          const health = read('health');
          const social = read('social');
          const internal = read('internal');
          const database = read('database');
          const runtime = fs.readFileSync('/tmp/xjw-production/app-runtime.js', 'utf8');
          const retry = fs.readFileSync('/tmp/xjw-production/social-retry.js', 'utf8');
          const filter = fs.readFileSync('/tmp/xjw-production/social-filter.js', 'utf8');
          const fb = fs.readFileSync('/tmp/xjw-production/facebook-health.js', 'utf8');
          if (health.ok !== true) throw new Error('LINE OA health failed');
          if (social.ok !== true || social.instagramConfigured !== true || social.facebookConfigured !== true) throw new Error('social health failed');
          if (Number(social.postCount) < 10) throw new Error('social schedule missing');
          if (internal.ok !== true || internal.app !== '仙加味內部管理 App') throw new Error('internal app failed');
          if (database.ok !== true || database.storage !== 'supabase') throw new Error('database failed');
          if (!runtime.includes('data-social-action')) throw new Error('app action runtime missing');
          if (!retry.includes('ensurePublishButton') || !retry.includes('button.disabled = false')) throw new Error('immediate publish runtime missing');
          if (!filter.includes('20260724-social-final-1') || !filter.includes('立即發布可隨時使用')) throw new Error('final schedule UI missing');
          if (!fb.includes('20260724-facebook-health-unlocked-1') || !fb.includes('button.disabled = false') || fb.includes('button.disabled = expired')) throw new Error('Facebook health still locks publish');
          console.log({ok:true, socialPostCount:social.postCount, storage:database.storage});
          NODE
