name: 仙加味正式站上線驗收

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "server.js"
      - "social-server.js"
      - "social-publish-guard.js"
      - "social-publish-guard.test.js"
      - "social-publication-ledger-backfill.js"
      - "social-recommended-schedule.js"
      - "social-final-posts.js"
      - "social-clear-republish-policy.js"
      - "social-corrected-republish-schedule.js"
      - "social-original-asset-override.js"
      - "social-manual-immediate-publish.js"
      - "social-manual-immediate-publish.test.js"
      - "social-final-approved-batch.js"
      - "social-schedule-repair-20260722.js"
      - "social-schedule-policy.js"
      - "social-manual-schedule-override.js"
      - "social-review-center.js"
      - "assets/social-approved/v7-original/**"
      - "facebook-page-token-bridge.js"
      - "facebook-token-health-route.js"
      - "internal-app-client-fix.js"
      - "internal-app-form-controller.js"
      - "internal-app-social-filter.js"
      - "internal-app-social-retry.js"
      - "internal-app-facebook-health.js"
      - "internal-entry.js"
      - "production-deploy-request.json"
      - ".github/workflows/production-health.yml"

permissions:
  contents: write

concurrency:
  group: xianjiawei-production-health
  cancel-in-progress: true

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and test
        run: |
          npm ci
          npm test

      - name: Wait for Render deployment and verify public health
        shell: bash
        env:
          BASE_URL: https://ts-line.onrender.com
        run: |
          set -euo pipefail
          mkdir -p /tmp/xjw-production
          success=0
          for attempt in $(seq 1 56); do
            echo "Production check $attempt/56"
            social_ok=0
            assets_ok=0

            if curl --connect-timeout 10 --max-time 25 --fail --silent --show-error \
              "$BASE_URL/social/healthz?t=$(date +%s)" -o /tmp/xjw-production/social.json; then
              if node - <<'NODE'
          const fs = require('fs');
          const social = JSON.parse(fs.readFileSync('/tmp/xjw-production/social.json', 'utf8'));
          if (social.ok !== true) process.exit(1);
          if (social.socialVersion !== '1.3.0') process.exit(1);
          if (Number(social.postCount) !== 11) process.exit(1);
          if (social.publishGuardVersion !== '2.0.0') process.exit(1);
          if (social.persistentDuplicateProtection !== true) process.exit(1);
          NODE
              then social_ok=1; fi
            fi

            if curl --connect-timeout 10 --max-time 60 --fail --silent --show-error \
              "$BASE_URL/social-approved-assets/healthz?t=$(date +%s)" -o /tmp/xjw-production/assets.json; then
              if node - <<'NODE'
          const fs = require('fs');
          const assets = JSON.parse(fs.readFileSync('/tmp/xjw-production/assets.json', 'utf8'));
          const clear = Array.isArray(assets.assets) ? assets.assets.find((item) => item.name === 'care-work-rest-clear.jpg') : null;
          if (assets.ok !== true) process.exit(1);
          if (assets.version !== '1.2.0') process.exit(1);
          if (assets.contentVersion !== 'approved-original-1254-v10') process.exit(1);
          if (Number(assets.targetSize) !== 1254) process.exit(1);
          if (!Array.isArray(assets.assets) || assets.assets.length !== 6) process.exit(1);
          if (!clear || clear.ok !== true || Number(clear.width) !== 1254 || Number(clear.height) !== 1254) process.exit(1);
          if (clear.exactOriginalSource !== true) process.exit(1);
          NODE
              then assets_ok=1; fi
            fi

            if [ "$social_ok" -eq 1 ] && [ "$assets_ok" -eq 1 ]; then
              success=1
              break
            fi
            sleep 15
          done

          if [ "$success" -ne 1 ]; then
            echo "Render production did not become healthy with the clear 1254 artwork in time" > /tmp/xjw-production/error.txt
            exit 1
          fi

          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/" -o /tmp/xjw-production/root.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/healthz" -o /tmp/xjw-production/health.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/social/facebook-healthz?refresh=1" -o /tmp/xjw-production/facebook.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/healthz" -o /tmp/xjw-production/internal.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/db-healthz" -o /tmp/xjw-production/database.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/app-runtime.js?t=$(date +%s)" -o /tmp/xjw-production/app-runtime.js
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/app-social-filter.js?t=$(date +%s)" -o /tmp/xjw-production/social-ui.js
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/app-social-retry.js?t=$(date +%s)" -o /tmp/xjw-production/social-retry.js

          node - <<'NODE'
          const fs = require('fs');
          const read = (name) => JSON.parse(fs.readFileSync(`/tmp/xjw-production/${name}.json`, 'utf8'));
          const root = read('root');
          const health = read('health');
          const social = read('social');
          const assets = read('assets');
          const facebook = read('facebook');
          const internal = read('internal');
          const database = read('database');
          const appRuntime = fs.readFileSync('/tmp/xjw-production/app-runtime.js', 'utf8');
          const socialUi = fs.readFileSync('/tmp/xjw-production/social-ui.js', 'utf8');
          const socialRetry = fs.readFileSync('/tmp/xjw-production/social-retry.js', 'utf8');

          if (root.ok !== true || root.service !== '仙加味 LINE OA') throw new Error('LINE OA root failed');
          if (health.ok !== true || health.version !== 'v401.6' || health.productCount !== 6) throw new Error('LINE OA health failed');
          if (social.ok !== true || social.socialVersion !== '1.3.0' || Number(social.postCount) !== 11) throw new Error('Social health failed');
          if (social.instagramConfigured !== true || social.facebookConfigured !== true) throw new Error('Social platforms are not configured');
          if (social.publishGuardVersion !== '2.0.0' || social.persistentDuplicateProtection !== true) throw new Error('Duplicate protection is not active');

          if (assets.ok !== true || assets.version !== '1.2.0') throw new Error('Clear social asset health failed');
          if (assets.contentVersion !== 'approved-original-1254-v10' || Number(assets.targetSize) !== 1254) throw new Error('Clear asset version or target size is wrong');
          if (!Array.isArray(assets.assets) || assets.assets.length !== 6) throw new Error('Social asset details missing');
          for (const asset of assets.assets) {
            if (asset.ok !== true || Number(asset.width) !== 1254 || Number(asset.height) !== 1254 || Number(asset.bytes) <= 40000) {
              throw new Error(`Social asset quality failed: ${asset.name}`);
            }
          }
          const clear = assets.assets.find((asset) => asset.name === 'care-work-rest-clear.jpg');
          if (!clear || clear.exactOriginalSource !== true) throw new Error('Work-rest post is not using the verified clear original');

          if (facebook.service !== '仙加味 Facebook 發布連線') throw new Error('Facebook token health endpoint failed');
          if (internal.ok !== true || internal.app !== '仙加味內部管理 App') throw new Error('Internal App health failed');
          if (database.ok !== true || database.storage !== 'supabase') throw new Error('Supabase storage is not healthy');
          if (!appRuntime.includes('data-social-action')) throw new Error('Internal App social button runtime missing');
          if (!socialUi.includes('20260722-social-review-3')) throw new Error('Social review UI missing');
          if (!socialRetry.includes('20260722-social-retry-4')) throw new Error('Social image/button repair script missing');

          const status = {
            ok: true,
            checkedAt: new Date().toISOString(),
            commit: process.env.GITHUB_SHA,
            productionUrl: 'https://ts-line.onrender.com',
            lineVersion: health.version,
            productCount: health.productCount,
            socialVersion: social.socialVersion,
            socialPostCount: social.postCount,
            publishGuardVersion: social.publishGuardVersion,
            persistentDuplicateProtection: social.persistentDuplicateProtection,
            publicationLedgerCount: social.publicationLedgerCount,
            approvedAssetVersion: assets.version,
            approvedAssetContentVersion: assets.contentVersion,
            approvedAssetTargetSize: assets.targetSize,
            approvedAssetCount: assets.assets.length,
            approvedAssetExactOriginalSourceCount: assets.exactOriginalSourceCount,
            approvedAssetCrispFallbackCount: assets.crispVectorFallbackCount,
            approvedAssetQualityOk: assets.assets.every((asset) => asset.ok),
            clearRepublishExactOriginal: clear.exactOriginalSource === true,
            clearRepublishOutputDimensions: `${clear.width}x${clear.height}`,
            clearRepublishScheduledAtTaipei: '2026-07-24 19:30',
            clearRepublishOriginalCompositionLocked: true,
            clearRepublishOriginalCharactersLocked: true,
            manualImmediatePublishUnlocked: true,
            internalRuntimeVersion: '20260723-social-8',
            socialUiVersion: '20260722-social-review-3',
            socialRetryVersion: '20260722-social-retry-4',
            socialUiScheduleRule: '清晰原圖於2026/7/24 19:30單次重發；後續週三19:30關心、週五20:00產品、氣候10:00例外加發',
            instagramConfigured: social.instagramConfigured,
            facebookConfigured: social.facebookConfigured,
            facebookTokenConfigured: facebook.configured,
            facebookTokenUsable: facebook.usable,
            facebookTokenExpired: facebook.expired === true,
            facebookTokenSource: facebook.source || '',
            facebookTokenCheckedAt: facebook.checkedAt || '',
            facebookTokenError: facebook.error || '',
            warning: facebook.expired === true ? 'facebook-token-expired' : (facebook.usable === false ? 'facebook-token-unusable' : ''),
            internalApp: internal.app,
            storage: database.storage,
          };
          fs.writeFileSync('production-status.json', JSON.stringify(status, null, 2) + '\n');
          console.log(status);
          NODE

      - name: Save successful production proof
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "仙加味正式站驗收"
          git config user.email "actions@users.noreply.github.com"
          git add production-status.json
          if git diff --cached --quiet; then
            echo "Production proof already current"
            exit 0
          fi
          git commit -m "chore: record healthy clear-social deployment"
          git pull --rebase origin main
          git push origin main
