name: 仙加味正式站上線驗收

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "server.js"
      - "social-server.js"
      - "social-recommended-schedule.js"
      - "social-final-posts.js"
      - "social-final-approved-batch.js"
      - "social-final-approved-batch.test.js"
      - "social-schedule-repair-20260722.js"
      - "social-schedule-repair-20260722.test.js"
      - "social-schedule-policy.js"
      - "social-schedule-policy.test.js"
      - "social-manual-schedule-override.js"
      - "social-review-center.js"
      - "facebook-page-token-bridge.js"
      - "facebook-token-health-route.js"
      - "internal-app-client-fix.js"
      - "internal-app-form-controller.js"
      - "internal-app-social-filter.js"
      - "internal-app-social-retry.js"
      - "internal-app-facebook-health.js"
      - "internal-entry.js"
      - "tools/release_check.js"
      - "production-deploy-request.json"
      - ".github/workflows/production-health.yml"

permissions:
  contents: write

concurrency:
  group: xianjiawei-production-health
  cancel-in-progress: true

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Wait for Render deployment and verify public health
        shell: bash
        env:
          BASE_URL: https://ts-line.onrender.com
        run: |
          set -euo pipefail
          mkdir -p /tmp/xjw-production
          success=0
          for attempt in $(seq 1 48); do
            echo "Production check $attempt/48"
            if curl --connect-timeout 10 --max-time 25 --fail --silent --show-error \
              "$BASE_URL/healthz" -o /tmp/xjw-production/health.json; then
              if node - <<'NODE'
          const fs = require('fs');
          const health = JSON.parse(fs.readFileSync('/tmp/xjw-production/health.json', 'utf8'));
          if (health.ok !== true) process.exit(1);
          if (health.version !== 'v401.6') process.exit(1);
          if (health.productCount !== 6) process.exit(1);
          NODE
              then
                success=1
                break
              fi
            fi
            sleep 15
          done

          if [ "$success" -ne 1 ]; then
            echo "Render production did not become healthy in time" > /tmp/xjw-production/error.txt
            exit 1
          fi

          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/" -o /tmp/xjw-production/root.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/social/healthz" -o /tmp/xjw-production/social.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/social/facebook-healthz?refresh=1" -o /tmp/xjw-production/facebook.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/healthz" -o /tmp/xjw-production/internal.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/db-healthz" -o /tmp/xjw-production/database.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/app-social-filter.js?t=$(date +%s)" -o /tmp/xjw-production/social-ui.js
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/app-form-controller.js?t=$(date +%s)" -o /tmp/xjw-production/social-form.js
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/app-facebook-health.js?t=$(date +%s)" -o /tmp/xjw-production/facebook-ui.js
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/app-shell.js?t=$(date +%s)" -o /tmp/xjw-production/app-shell.js

          node - <<'NODE'
          const fs = require('fs');
          const read = (name) => JSON.parse(fs.readFileSync(`/tmp/xjw-production/${name}.json`, 'utf8'));
          const root = read('root');
          const health = read('health');
          const social = read('social');
          const facebook = read('facebook');
          const internal = read('internal');
          const database = read('database');
          const socialUi = fs.readFileSync('/tmp/xjw-production/social-ui.js', 'utf8');
          const socialForm = fs.readFileSync('/tmp/xjw-production/social-form.js', 'utf8');
          const facebookUi = fs.readFileSync('/tmp/xjw-production/facebook-ui.js', 'utf8');
          if (root.ok !== true || root.service !== '仙加味 LINE OA') throw new Error('LINE OA root failed');
          if (health.ok !== true || health.version !== 'v401.6' || health.productCount !== 6) throw new Error('LINE OA health failed');
          if (social.ok !== true) throw new Error('Social service health failed');
          if (Number(social.postCount) !== 11) throw new Error(`Social post count must be 11, received ${social.postCount}`);
          if (social.instagramConfigured !== true) throw new Error('Instagram is not configured');
          if (social.facebookConfigured !== true) throw new Error('Facebook environment variables are not configured');
          if (facebook.service !== '仙加味 Facebook 發布連線') throw new Error('Facebook token health endpoint failed');
          if (typeof facebook.configured !== 'boolean') throw new Error('Facebook token configured state missing');
          if (![true, false, null].includes(facebook.usable)) throw new Error('Facebook token usable state invalid');
          if (internal.ok !== true || internal.app !== '仙加味內部管理 App') throw new Error('Internal App health failed');
          if (database.ok !== true || database.storage !== 'supabase') throw new Error('Supabase production storage is not healthy');
          for (const text of [
            '20260722-social-review-3',
            '週三 19:30 關心文',
            '週五 20:00 產品文',
            '氣候文符合萬華實際天氣時',
            '不占固定篇數',
            '排程檢查正常',
          ]) {
            if (!socialUi.includes(text)) throw new Error(`Internal social UI missing: ${text}`);
          }
          if (socialUi.includes('週三、週五 20:00')) throw new Error('Internal social UI still contains old schedule rule');
          for (const text of [
            '20260722-form-stable-3',
            'day === 3 ? 19 : 20',
            'day === 3 ? 30 : 0',
          ]) {
            if (!socialForm.includes(text)) throw new Error(`Internal social form missing: ${text}`);
          }
          if (socialForm.includes('Date.now() + 24 * 60 * 60 * 1000')) throw new Error('Internal social form still defaults to arbitrary tomorrow time');
          for (const text of [
            '20260722-facebook-health-2',
            'FB Token 已過期',
            'Instagram 已成功的貼文不會重複發布',
            'META_PAGE_ACCESS_TOKEN',
            '待補發',
          ]) {
            if (!facebookUi.includes(text)) throw new Error(`Facebook health UI missing: ${text}`);
          }
          const status = {
            ok: true,
            checkedAt: new Date().toISOString(),
            commit: process.env.GITHUB_SHA,
            productionUrl: 'https://ts-line.onrender.com',
            lineVersion: health.version,
            productCount: health.productCount,
            socialVersion: social.socialVersion || '',
            socialPostCount: social.postCount,
            internalRuntimeVersion: '20260722-social-6',
            socialUiVersion: '20260722-social-review-3',
            socialFormVersion: '20260722-form-stable-3',
            facebookHealthUiVersion: '20260722-facebook-health-2',
            socialUiScheduleRule: '週三19:30關心、週五20:00產品、氣候10:00例外加發',
            instagramConfigured: social.instagramConfigured,
            facebookConfigured: social.facebookConfigured,
            facebookTokenConfigured: facebook.configured,
            facebookTokenUsable: facebook.usable,
            facebookTokenExpired: facebook.expired === true,
            facebookTokenSource: facebook.source || '',
            facebookTokenCheckedAt: facebook.checkedAt || '',
            facebookTokenError: facebook.error || '',
            warning: facebook.expired === true ? 'facebook-token-expired' : (facebook.usable === false ? 'facebook-token-unusable' : ''),
            internalApp: internal.app,
            storage: database.storage,
          };
          fs.writeFileSync('production-status.json', JSON.stringify(status, null, 2) + '\n');
          console.log(status);
          NODE

      - name: Save successful production proof
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "仙加味正式站驗收"
          git config user.email "actions@users.noreply.github.com"
          git add production-status.json
          if git diff --cached --quiet; then
            echo "Production proof already current"
            exit 0
          fi
          git commit -m "chore: record healthy production deployment"
          git pull --rebase origin main
          git push origin main
