name: 仙加味正式站上線驗收

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "server.js"
      - "social-server.js"
      - "social-publish-guard.js"
      - "social-final-posts.js"
      - "social-clear-republish-policy.js"
      - "social-original-asset-override.js"
      - "social-manual-immediate-publish.js"
      - "social-manual-immediate-publish.test.js"
      - "social-final-approved-batch.js"
      - "social-schedule-policy.js"
      - "internal-app-client-fix.js"
      - "internal-app-social-filter.js"
      - "internal-app-social-retry.js"
      - "internal-app-facebook-health.js"
      - "internal-entry.js"
      - ".github/workflows/production-health.yml"

permissions:
  contents: write

concurrency:
  group: xianjiawei-production-health
  cancel-in-progress: true

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and test
        run: |
          npm ci
          npm test

      - name: Wait for Render and verify
        shell: bash
        env:
          BASE_URL: https://ts-line.onrender.com
        run: |
          set -euo pipefail
          mkdir -p /tmp/xjw-production
          success=0
          for attempt in $(seq 1 64); do
            echo "Production check $attempt/64"
            social_ok=0
            automation_ok=0
            schedule_ok=0

            if curl --connect-timeout 10 --max-time 25 --fail --silent --show-error \
              "$BASE_URL/social/healthz?t=$(date +%s)" -o /tmp/xjw-production/social.json; then
              if node - <<'NODE'
          const s = require('/tmp/xjw-production/social.json');
          if (s.ok !== true || s.socialVersion !== '1.3.0') process.exit(1);
          if (s.publishGuardVersion !== '2.0.0' || s.persistentDuplicateProtection !== true) process.exit(1);
          if (s.instagramConfigured !== true || s.facebookConfigured !== true) process.exit(1);
          NODE
              then social_ok=1; fi
            fi

            if curl --connect-timeout 10 --max-time 120 --fail --silent --show-error \
              "$BASE_URL/social/automation-healthz?t=$(date +%s)" -o /tmp/xjw-production/automation.json; then
              if node - <<'NODE'
          const a = require('/tmp/xjw-production/automation.json');
          if (a.ok !== true || a.version !== '6.0.0') process.exit(1);
          if (Number(a.totalPosts) !== 10 || Number(a.fixedPosts) !== 7 || Number(a.weatherStandbyPosts) !== 3) process.exit(1);
          if (Number(a.targetSize || 1254) !== 1254) process.exit(1);
          if (!Array.isArray(a.assets) || a.assets.length !== 10 || a.assets.some((x) => x.ok !== true || Number(x.width) !== 1254 || Number(x.height) !== 1254)) process.exit(1);
          if (a.appButtonCodeChanged !== false) process.exit(1);
          NODE
              then automation_ok=1; fi
            fi

            code=$(curl --connect-timeout 10 --max-time 25 --silent --show-error \
              -o /tmp/xjw-production/schedule.json -w "%{http_code}" "$BASE_URL/social/schedule-status?t=$(date +%s)" || true)
            if [ "$code" = "200" ]; then
              if node - <<'NODE'
          const s = require('/tmp/xjw-production/schedule.json');
          if (s.ok !== true || s.version !== '2026-07-24-v5') process.exit(1);
          if (Number(s.canonicalCount) !== 10 || Number(s.approvedCount) !== 7 || Number(s.standbyCount) !== 3) process.exit(1);
          if (!Array.isArray(s.issues) || s.issues.length !== 0) process.exit(1);
          const first = s.posts.find((p) => p.id === 'clear-republish-care-work-rest-20260724');
          if (!first || first.scheduledAt !== '2026-07-24T02:00:00.000Z') process.exit(1);
          NODE
              then schedule_ok=1; fi
            fi

            if [ "$social_ok" -eq 1 ] && [ "$automation_ok" -eq 1 ] && [ "$schedule_ok" -eq 1 ]; then
              success=1
              break
            fi
            sleep 15
          done

          if [ "$success" -ne 1 ]; then
            echo "Render production did not become healthy" >&2
            cat /tmp/xjw-production/social.json 2>/dev/null || true
            cat /tmp/xjw-production/automation.json 2>/dev/null || true
            cat /tmp/xjw-production/schedule.json 2>/dev/null || true
            exit 1
          fi

          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/" -o /tmp/xjw-production/root.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/healthz" -o /tmp/xjw-production/health.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/social/facebook-healthz?refresh=1" -o /tmp/xjw-production/facebook.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/healthz" -o /tmp/xjw-production/internal.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/db-healthz" -o /tmp/xjw-production/database.json
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/app-runtime.js?t=$(date +%s)" -o /tmp/xjw-production/app-runtime.js
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/app-social-filter.js?t=$(date +%s)" -o /tmp/xjw-production/social-ui.js
          curl --connect-timeout 10 --max-time 25 --fail --silent --show-error "$BASE_URL/internal/app-social-retry.js?t=$(date +%s)" -o /tmp/xjw-production/social-retry.js

          node - <<'NODE'
          const fs = require('fs');
          const read = (name) => JSON.parse(fs.readFileSync(`/tmp/xjw-production/${name}.json`, 'utf8'));
          const root = read('root');
          const health = read('health');
          const social = read('social');
          const automation = read('automation');
          const schedule = read('schedule');
          const facebook = read('facebook');
          const internal = read('internal');
          const database = read('database');
          const appRuntime = fs.readFileSync('/tmp/xjw-production/app-runtime.js', 'utf8');
          const socialUi = fs.readFileSync('/tmp/xjw-production/social-ui.js', 'utf8');
          const socialRetry = fs.readFileSync('/tmp/xjw-production/social-retry.js', 'utf8');

          if (root.ok !== true || root.service !== '仙加味 LINE OA') throw new Error('root failed');
          if (health.ok !== true || health.version !== 'v401.6' || health.productCount !== 6) throw new Error('health failed');
          if (social.ok !== true || social.publishGuardVersion !== '2.0.0') throw new Error('social failed');
          if (automation.ok !== true || automation.totalPosts !== 10) throw new Error('automation failed');
          if (schedule.ok !== true || schedule.canonicalCount !== 10) throw new Error('schedule failed');
          if (facebook.service !== '仙加味 Facebook 發布連線') throw new Error('facebook health failed');
          if (internal.ok !== true || internal.app !== '仙加味內部管理 App') throw new Error('internal app failed');
          if (database.ok !== true || database.storage !== 'supabase') throw new Error('database failed');
          if (!appRuntime.includes('data-social-action')) throw new Error('button runtime missing');
          if (!socialUi.includes('20260722-social-review-3')) throw new Error('review UI missing');
          if (!socialRetry.includes('20260723-social-ui-fix-2')) throw new Error('image/button repair missing');

          const status = {
            ok: true,
            checkedAt: new Date().toISOString(),
            commit: process.env.GITHUB_SHA,
            productionUrl: 'https://ts-line.onrender.com',
            lineVersion: health.version,
            productCount: health.productCount,
            socialVersion: social.socialVersion,
            socialPostCount: social.postCount,
            firstBatchCanonicalCount: schedule.canonicalCount,
            firstBatchApprovedCount: schedule.approvedCount,
            firstBatchWeatherStandbyCount: schedule.standbyCount,
            approvedAssetVersion: automation.version,
            approvedAssetContentVersion: automation.contentVersion,
            approvedAssetTargetSize: automation.targetSize || 1254,
            approvedAssetCount: automation.assets.length,
            approvedAssetQualityOk: automation.assets.every((asset) => asset.ok),
            firstPublishScheduledAtTaipei: '2026-07-24 10:00',
            fixedSocialRule: '每週三、週五 10:00',
            weatherSocialRule: '依萬華實際氣候於非固定日10:00加發，每週最多1篇',
            copyAndImageDuplicateCheck: schedule.issues.length === 0,
            appButtonRuntimePresent: appRuntime.includes('data-social-action'),
            internalRuntimeVersion: '20260723-social-8',
            socialUiVersion: '20260722-social-review-3',
            socialRetryVersion: '20260723-social-ui-fix-2',
            instagramConfigured: social.instagramConfigured,
            facebookConfigured: social.facebookConfigured,
            facebookTokenUsable: facebook.usable,
            internalApp: internal.app,
            storage: database.storage,
          };
          fs.writeFileSync('production-status.json', JSON.stringify(status, null, 2) + '\n');
          NODE

      - name: Save successful production proof
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "仙加味正式站驗收"
          git config user.email "actions@users.noreply.github.com"
          git add production-status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore: record healthy social automation deployment"
          git pull --rebase origin main
          git push origin main
