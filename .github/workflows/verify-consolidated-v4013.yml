name: Verify consolidated LINE OA v401.3

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  verify:
    if: github.event.issue.title == 'VERIFY_CONSOLIDATED_LINEOA_V4013'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Verify repository
        run: |
          set -euo pipefail
          npm ci
          npm test
          test ! -e start.js
          test ! -e no-collage-runtime.js
          test ! -e deploy-version.json
          test ! -e release-status.json
          test ! -e rich-menu-actions.json
          test ! -e mascot-manifest.json
          test ! -e public/mascot/manifest.json
          test ! -e tools/fix_line_aspectmode.js
          test ! -e tools/fix_mascot_image_urls.js
          grep -q '"version": "4.1.3"' package.json
          grep -q '"version": "401.3"' data.json
          grep -q 'const VERSION = "v401.3"' server.js
      - name: Verify Render with extended retries
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error https://ts-line.onrender.com/healthz > /tmp/health.json; then
              if python3 - <<'PY'
          import json, sys
          h=json.load(open('/tmp/health.json'))
          ok=(h.get('ok') is True and h.get('version')=='v401.3' and h.get('productCount')==6 and h.get('credentialsConfigured') is True and h.get('crmConfigured') is True)
          print(json.dumps(h, ensure_ascii=False, indent=2))
          sys.exit(0 if ok else 1)
          PY
              then
                exit 0
              fi
            fi
            sleep 15
          done
          echo 'Render did not reach v401.3 in time' >&2
          exit 1
      - name: Report success
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'LINEOA_V4013_VERIFY_SUCCESS｜單一 server.js、中央 data.json、重複與舊版 JS/JSON 已移除；完整測試與 Render v401.3、六項產品、LINE 憑證及 CRM 均驗收通過。'
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed
      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'LINEOA_V4013_VERIFY_FAILED｜整合檔案已在 main，但線上驗收尚未通過，未宣告完成。'
