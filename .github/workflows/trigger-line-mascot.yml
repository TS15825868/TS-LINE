name: Trigger LINE mascot finalization

on:
  issues:
    types: [opened]

permissions:
  actions: write
  issues: write

jobs:
  trigger:
    if: github.event.issue.title == 'RUN LINE MASCOT FINALIZE 400.1'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch finalization workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run bootstrap-line-mascot.yml --repo ${{ github.repository }} --ref main
      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }} --comment '已觸發 LINE OA 小老闆正式安裝流程。'
