name: Verify LINE OA v401.1

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  verify:
    if: github.event.issue.title == 'VERIFY_LINEOA_V4011'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Run complete tests
        run: |
          set -euo pipefail
          npm ci
          npm test
      - name: Wait for Render deploy
        run: sleep 35
      - name: Check Render service and mascot files
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --retry 5 --retry-delay 8 https://ts-line.onrender.com/ > /tmp/root.json
          curl --fail --silent --show-error --retry 5 --retry-delay 8 https://ts-line.onrender.com/healthz > /tmp/health.json
          python3 - <<'PY'
          import json
          root=json.load(open('/tmp/root.json'))
          health=json.load(open('/tmp/health.json'))
          assert root['ok'] is True
          assert health['ok'] is True
          assert health['productCount']==6
          assert health['credentialsConfigured'] is True
          assert health['crmConfigured'] is True
          print(json.dumps({'root':root,'healthz':health},ensure_ascii=False,indent=2))
          PY
      - name: Report success
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'LINEOA_V4011_VERIFY_SUCCESS｜完整測試、六項真實產品卡、無拼湊圖片輸出政策、Render、LINE憑證與CRM均驗收通過。'
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed
