name: Fix LINE reply and Flex

on:
  push:
    branches: [main]
    paths:
      - FIX_LINE_REPLY_AND_FLEX.txt

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply fixes
        run: node tools/fix_line_reply_and_flex.js
      - name: Verify
        run: |
          npm ci
          node --check server.js
          npm test
          node - <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('server.js', 'utf8');
          if (source.includes('aspectMode: "contain"')) throw new Error('invalid aspectMode remains');
          if (!source.includes('aspectMode: "fit"')) throw new Error('fit aspectMode missing');
          if (!source.includes('processedWebhookEvents')) throw new Error('webhook de-duplication missing');
          if (!source.includes('Promise.allSettled')) throw new Error('webhook safe acknowledgement missing');
          if (source.includes('console.error(error);')) throw new Error('unsafe full error logging remains');
          console.log('PASS LINE reply and Flex fixes');
          NODE
      - name: Commit fixes
        run: |
          rm -f FIX_LINE_REPLY_AND_FLEX.txt
          rm -f tools/fix_line_reply_and_flex.js
          rm -f .github/workflows/fix-line-reply-and-flex.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '修正 LINE Flex 圖片格式、重送事件與 reply token 問題'
          git pull --rebase origin main
          git push origin main
