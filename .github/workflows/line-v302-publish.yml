name: Publish LINE OA v302

on:
  pull_request:
    branches:
      - main
    paths:
      - LINE_V302_PR_TRIGGER.txt

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply LINE OA contextual mascot update and clean old public data
        run: |
          set +e
          python tools/line_v302_cleanup.py > LINE_V302_RUN.log 2>&1
          status=$?
          cat LINE_V302_RUN.log
          if [ $status -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add LINE_V302_RUN.log
            git commit -m "記錄 LINE OA v302 執行錯誤" || true
            git push origin HEAD:${{ github.head_ref }} || true
            exit $status
          fi

      - name: Validate LINE OA
        run: |
          node --check server.js
          python - <<'PY'
          import json
          from pathlib import Path
          json.loads(Path('data.json').read_text(encoding='utf-8'))
          print('LINE OA data validated')
          PY
          ! grep -RniE 'guilu-drink-180|180cc|180 cc' --include='server.js' --include='data.json' .

      - name: Remove trigger and debug files
        run: |
          rm -f LINE_V302_TRIGGER.txt LINE_V302_PR_TRIGGER.txt LINE_V302_RUN.log

      - name: Commit LINE OA update to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v302：LINE OA 情境小老闆與舊規格清理" || exit 0
          git push origin HEAD:${{ github.head_ref }}
