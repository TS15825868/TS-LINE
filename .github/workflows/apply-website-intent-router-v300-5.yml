name: Apply website intent router v300.5

on:
  push:
    branches: [main]
    paths:
      - WEBSITE_INTENT_ROUTER_TRIGGER.txt

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply website message router
        run: |
          node tools/apply_website_intent_router_v300_5.js
          npm install --package-lock-only --ignore-scripts
      - name: Verify all LINE functions
        run: |
          npm ci
          npm run check:catalog
          npm test
          node --check server.js
          node --check test.js
          node --check catalog.test.js
          node --check security.test.js
          node --check function.test.js
          grep -F 'const VERSION = "v300.5";' server.js >/dev/null
          grep -F 'detectWebsiteIntent' server.js >/dev/null
          grep -F 'channelAccessToken: process.env.CHANNEL_ACCESS_TOKEN || ""' server.js >/dev/null
          grep -F 'channelSecret: process.env.CHANNEL_SECRET || ""' server.js >/dev/null
      - name: HTTP smoke test
        run: |
          node server.js >/tmp/lineoa-v300-5.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl --fail --silent http://127.0.0.1:3000/ | grep '"version":"v300.5"' >/dev/null
          curl --fail --silent http://127.0.0.1:3000/healthz | grep '"crmConfigured":true' >/dev/null
      - name: Commit verified update
        run: |
          rm -f WEBSITE_INTENT_ROUTER_TRIGGER.txt
          rm -f tools/apply_website_intent_router_v300_5.js
          rm -f .github/workflows/apply-website-intent-router-v300-5.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v300.5: align website LINE messages with bot card flows"
          git push origin main
