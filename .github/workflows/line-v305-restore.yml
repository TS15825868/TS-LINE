name: Apply LINE OA v305 restore

on:
  pull_request:
    branches: [main]
    paths:
      - LINE_V305_TRIGGER.txt

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Restore LINE OA product and store information
        run: python tools/line_v305_restore.py
      - name: Validate
        run: |
          node --check server.js
          python - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path('data.json').read_text(encoding='utf-8'))
          assert any(p.get('id')=='guilu-drink-180' for p in data['products'])
          server=Path('server.js').read_text(encoding='utf-8')
          assert '週一至週六 09:30–18:30' in server
          assert 'aspectMode: "contain"' in server
          print('LINE OA v305 validated')
          PY
      - name: Commit branch update
        run: |
          rm -f LINE_V305_TRIGGER.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "LINE OA v305：恢復龜鹿飲180cc與更新門市時間" || exit 0
          git push origin HEAD:${{ github.head_ref }}
