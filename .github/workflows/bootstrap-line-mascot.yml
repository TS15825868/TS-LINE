name: Bootstrap LINE OA mascot assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Copy the approved LINE OA images once into this repository
        run: |
          python3 -m pip install --quiet pillow
          mkdir -p public/mascot
          for name in welcome products recommend combo usage faq service brand cart; do
            curl --fail --location --retry 3 \
              "https://raw.githubusercontent.com/TS15825868/xianjiawei/main/images/line-mascot/xianjiawei-mascot-line-${name}.jpg" \
              --output "public/mascot/${name}.jpg"
          done

          python3 - <<'PY'
          from hashlib import sha256
          from pathlib import Path
          from PIL import Image, ImageStat, ImageFilter
          import json

          names = ['welcome','products','recommend','combo','usage','faq','service','brand','cart']
          manifest = {'version': '400.2', 'scope': 'TS-LINE/main local assets only', 'images': {}}
          hashes = set()
          for name in names:
              path = Path('public/mascot') / f'{name}.jpg'
              if not path.exists() or path.stat().st_size < 100000:
                  raise SystemExit(f'圖片缺少或檔案異常：{path}')
              with Image.open(path) as image:
                  image.verify()
              with Image.open(path) as image:
                  width, height = image.size
                  gray = image.convert('L')
                  edges = gray.filter(ImageFilter.FIND_EDGES)
                  edge_mean = ImageStat.Stat(edges).mean[0]
              if width < 1200 or height < 900:
                  raise SystemExit(f'解析度不足：{path} {width}x{height}')
              if edge_mean < 2.0:
                  raise SystemExit(f'圖片疑似空白或嚴重模糊：{path} edge={edge_mean:.2f}')
              digest = sha256(path.read_bytes()).hexdigest()
              hashes.add(digest)
              manifest['images'][name] = {
                  'file': f'public/mascot/{name}.jpg',
                  'width': width,
                  'height': height,
                  'bytes': path.stat().st_size,
                  'edgeMean': round(edge_mean, 3),
                  'sha256': digest,
              }
          if len(hashes) != len(names):
              raise SystemExit('LINE OA 小老闆圖片有重複內容')
          Path('mascot-manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8'
          )
          PY

      - name: Use local mascot assets directly
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import re

          server_path = Path('server.js')
          source = server_path.read_text(encoding='utf-8')
          source = re.sub(r'const VERSION = "[^"]+";', 'const VERSION = "v400.2";', source, count=1)

          local_block = '''const PUBLIC_BASE_URL = (process.env.PUBLIC_BASE_URL || process.env.RENDER_EXTERNAL_URL || "").replace(/\\/$/, "");
          const MASCOT_VERSION = "400.2";
          const mascotAssetUrl = (name) => PUBLIC_BASE_URL
            ? `${PUBLIC_BASE_URL}/mascot/${name}.jpg?v=${MASCOT_VERSION}`
            : `https://raw.githubusercontent.com/TS15825868/TS-LINE/main/public/mascot/${name}.jpg?v=${MASCOT_VERSION}`;'''

          if 'const PUBLIC_BASE_URL =' not in source:
              source = source.replace(
                  'const app = express();',
                  'const app = express();\n' + local_block + '\napp.use("/mascot", express.static(path.join(__dirname, "public", "mascot"), { maxAge: "7d", immutable: true }));'
              )
          else:
              source = re.sub(r'const PUBLIC_BASE_URL =[\s\S]*?const mascotAssetUrl = \(name\) =>[\s\S]*?;\n', local_block + '\n', source, count=1)

          mascot_block = '''const MASCOT_PATHS = {
            welcome: mascotAssetUrl("welcome"),
            products: mascotAssetUrl("products"),
            recommend: mascotAssetUrl("recommend"),
            combo: mascotAssetUrl("combo"),
            usage: mascotAssetUrl("usage"),
            faq: mascotAssetUrl("faq"),
            service: mascotAssetUrl("service"),
            brand: mascotAssetUrl("brand"),
            cart: mascotAssetUrl("cart"),
          };'''
          source, count = re.subn(r'const MASCOT_PATHS = \{[\s\S]*?\n\};', mascot_block, source, count=1)
          if count != 1:
              raise SystemExit('找不到 MASCOT_PATHS')
          server_path.write_text(source, encoding='utf-8')

          Path('start.js').write_text('''"use strict";\n\nconst { app, VERSION } = require("./server");\nconst port = process.env.PORT || 3000;\napp.listen(port, () => console.log(`仙加味 LINE OA ${VERSION} running on ${port}`));\n''', encoding='utf-8')

          package_path = Path('package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          package['version'] = '4.0.2'
          package['description'] = '仙加味 LINE OA 正式版｜九種本地高解析小老闆、產品卡、價格、購物車、結帳、CRM、品牌故事與使用方式'
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Validate release
        run: |
          npm ci
          node --check server.js
          node --check start.js
          node - <<'JS'
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('mascot-manifest.json', 'utf8'));
          if (Object.keys(manifest.images).length !== 9) throw new Error('小老闆圖片數量不正確');
          for (const item of Object.values(manifest.images)) {
            if (item.width < 1200 || item.height < 900 || item.bytes < 100000 || item.edgeMean < 2) {
              throw new Error('小老闆圖片品質檢查失敗');
            }
          }
          const server = fs.readFileSync('server.js', 'utf8');
          if (!server.includes('express.static(path.join(__dirname, "public", "mascot")')) throw new Error('未使用本地圖片');
          if (server.includes('ts15825868.github.io/xianjiawei/images/line-mascot')) throw new Error('仍引用網站圖片代理');
          console.log('LINE OA 小老闆九張本地圖片品質與引用方式確認完成');
          JS

      - name: Commit directly to main
        run: |
          rm -f .github/workflows/bootstrap-line-mascot.yml
          rm -f .github/workflows/trigger-line-mascot.yml
          rm -f .github/workflows/report-line-mascot-run.yml
          rm -f .github/workflows/report-line-job-tail.yml
          rm -f .github/workflows/fix-and-run-line-mascot.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "完成 LINE OA 專用高解析小老闆正式版"
          git push origin main
