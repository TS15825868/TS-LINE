name: Restore LINE OA cards v300.2

on:
  push:
    branches: [main]
    paths:
      - RESTORE_LINE_CARDS_TRIGGER.txt

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply v300.2 card interface and security fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json
          import re

          crm_url = "https://script.google.com/macros/s/AKfycbwAFBxeROd2ZYGJ_h0O7_H2MMxptOMoj3EXIErZpbKuTYFOzOVwQkrk8X1MoxapkHVGSA/exec"
          p = Path("server.js")
          s = p.read_text(encoding="utf-8")
          s = s.replace("仙加味 LINE OA Bot v300.1", "仙加味 LINE OA Bot v300.2")
          s = s.replace('const VERSION = "v300.1";', 'const VERSION = "v300.2";')
          s = re.sub(r'const CRM_URL = process\.env\.CRM_URL \|\| "[^"]*";', f'const CRM_URL = process.env.CRM_URL || "{crm_url}";', s, count=1)
          s = re.sub(r'const config = \{[\s\S]*?\n\};\n\nconst app = express\(\);', 'const config = {\n  channelAccessToken: process.env.CHANNEL_ACCESS_TOKEN || "",\n  channelSecret: process.env.CHANNEL_SECRET || "",\n};\n\nconst app = express();', s, count=1)
          s, n = re.subn(r'function productMenuReply\(\) \{[\s\S]*?\n\}\n\nfunction priceCarousel', 'function productMenuReply() {\n  return productCarousel();\n}\n\nfunction priceCarousel', s, count=1)
          if n != 1: raise SystemExit("productMenuReply update failed")
          recommend = '''function recommendReply() {
  const cards = [
    flexCard("固定日常安排", "想建立固定日常食補，可從龜鹿膏開始；外出或忙碌時可選龜鹿飲30cc或180cc。", [
      { label: "看龜鹿膏", text: "產品詳情｜guilu-gao" },
      { label: "看30cc", text: "產品詳情｜guilu-drink-30" },
      { label: "看180cc", text: "產品詳情｜guilu-drink-180" },
    ]).contents,
    flexCard("沖泡、燉湯與家庭使用", "想搭配熱水、料理或家庭較大規格使用，可比較龜鹿湯塊與龜鹿膠。", [
      { label: "看龜鹿湯塊", text: "產品詳情｜guilu-tangkuai" },
      { label: "看龜鹿膠", text: "產品詳情｜guilu-jiao" },
      { label: "看搭配方案", text: "搭配組合" },
    ]).contents,
    flexCard("自行搭配飲品", "喜歡依飲食習慣加入溫水、牛奶、豆漿或其他飲品，可查看鹿茸粉。", [
      { label: "看鹿茸粉", text: "產品詳情｜luerong-fen" },
      { label: "怎麼使用", text: "怎麼使用" },
      { label: "人工客服", text: "我要人工客服" },
    ]).contents,
  ];
  return { type: "flex", altText: "仙加味怎麼選", contents: { type: "carousel", contents: cards } };
}

function comboReply'''
          s, n = re.subn(r'function recommendReply\(\) \{[\s\S]*?\n\}\n\nfunction comboReply', recommend, s, count=1)
          if n != 1: raise SystemExit("recommendReply update failed")
          combo = '''function comboMenuReply() {
  const combos = DATA.offers?.comboOffers || [];
  if (!combos.length) return flexCard("搭配方案", "目前搭配方案由客服依需求協助整理。", [
    { label: "看產品", text: "看產品" },
    { label: "人工客服", text: "我要人工客服" },
  ]);
  return {
    type: "flex",
    altText: "仙加味搭配方案",
    contents: {
      type: "carousel",
      contents: combos.slice(0, 10).map((combo, index) => flexCard(
        combo.name,
        (combo.items || []).map((item) => "・" + item).join("\\n") + "\\n\\n" + (combo.desc || "") + "\\n\\n" + (combo.priceNote || "實際價格、庫存與活動由客服確認。"),
        [
          { label: "查看方案", text: "搭配方案｜" + index },
          { label: "查看產品", text: "看產品" },
          { label: "人工客服", text: "我要人工客服" },
        ]
      ).contents),
    },
  };
}

function comboDetailReply'''
          s, n = re.subn(r'function comboMenuReply\(\) \{[\s\S]*?\n\}\n\nfunction comboDetailReply', combo, s, count=1)
          if n != 1: raise SystemExit("comboMenuReply update failed")
          usage = '''function usageChooserReply() {
  return {
    type: "flex",
    altText: "仙加味產品使用方式",
    contents: { type: "carousel", contents: DATA.products.map((product) => usageReply(product).contents) },
  };
}

function usageReply'''
          s, n = re.subn(r'function usageChooserReply\(\) \{[\s\S]*?\n\}\n\nfunction usageReply', usage, s, count=1)
          if n != 1: raise SystemExit("usageChooserReply update failed")
          p.write_text(s, encoding="utf-8")

          tp = Path("test.js")
          t = tp.read_text(encoding="utf-8")
          t = t.replace('assert.strictEqual(VERSION, "v300.1");', 'assert.strictEqual(VERSION, "v300.2");')
          t = t.replace('assert.ok(recommendReply().text.includes("龜鹿飲180cc"));', 'assert.strictEqual(recommendReply().contents.contents.length, 3);')
          t = t.replace('assert.strictEqual(usageChooserReply().quickReply.items.length, 6);', 'assert.strictEqual(usageChooserReply().contents.contents.length, 6);')
          t = t.replace('assert.strictEqual(productMenuReply().quickReply.items.length, 6);', 'assert.strictEqual(productMenuReply().contents.contents.length, 6);')
          t = t.replace('assert.ok(comboMenuReply().text.includes("日常節奏組"));', 'assert.strictEqual(comboMenuReply().contents.contents.length, DATA.offers.comboOffers.length);')
          tp.write_text(t, encoding="utf-8")

          sp = Path("security.test.js")
          sec = sp.read_text(encoding="utf-8").replace('assert.strictEqual(VERSION, "v300.1");', 'assert.strictEqual(VERSION, "v300.2");').replace('PASS security and UX v300.1', 'PASS security and UX v300.2')
          sp.write_text(sec, encoding="utf-8")

          pp = Path("package.json")
          pkg = json.loads(pp.read_text(encoding="utf-8"))
          pkg["version"] = "3.0.2"
          pp.write_text(json.dumps(pkg, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Remove obsolete non-runtime files
        shell: bash
        run: |
          rm -f CHECK_REPORT_v286_LINEOA.json CHECK_REPORT_v287_LINEOA.json LINEOA_v285文案修正說明.md LINEOA_v288全系列上架更新說明.md LINEOA_古籍藥典與正向QA_v286.md LINEOA_正式回覆文案_v280.md LINEOA_正式回覆文案_v286.md LINEOA_正式回覆文案_v287.md LINEOA_龜鹿網路說法安全回覆_v284.md LIVE_STATUS_v288.json LIVE_STATUS_v289.json LIVE_STATUS_v294.json LIVE_STATUS_v295_1.json RUN_SECURITY_V300_1.txt products.json google_script.js REPO_FILE_MANIFEST.txt INVENTORY_TRIGGER.txt

      - name: Install and test
        run: |
          npm install --package-lock-only --ignore-scripts
          npm ci
          npm run check:catalog
          npm test
          node --check server.js
          node --check test.js
          node --check security.test.js
          grep -F 'channelAccessToken: process.env.CHANNEL_ACCESS_TOKEN || ""' server.js >/dev/null
          grep -F 'channelSecret: process.env.CHANNEL_SECRET || ""' server.js >/dev/null
          grep -F 'return productCarousel();' server.js >/dev/null
          grep -F 'altText: "仙加味搭配方案"' server.js >/dev/null
          grep -F 'altText: "仙加味產品使用方式"' server.js >/dev/null

      - name: Commit tested update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v300.2: restore LINE card buttons, remove embedded credentials and clean old files"
          git push origin main
