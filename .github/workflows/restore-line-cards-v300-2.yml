name: Restore LINE OA cards v300.2

on:
  push:
    branches: [main]
    paths:
      - RESTORE_LINE_CARDS_TRIGGER.txt

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply card interface
        run: |
          set -euo pipefail
          node tools/apply_card_ui_v300_2.js
          git checkout -- .github/workflows || true
          npm install --package-lock-only --ignore-scripts

      - name: Remove obsolete non-runtime files
        run: |
          rm -f \
            CHECK_REPORT_v286_LINEOA.json \
            CHECK_REPORT_v287_LINEOA.json \
            LINEOA_v285文案修正說明.md \
            LINEOA_v288全系列上架更新說明.md \
            LINEOA_古籍藥典與正向QA_v286.md \
            LINEOA_正式回覆文案_v280.md \
            LINEOA_正式回覆文案_v286.md \
            LINEOA_正式回覆文案_v287.md \
            LINEOA_龜鹿網路說法安全回覆_v284.md \
            LIVE_STATUS_v288.json \
            LIVE_STATUS_v289.json \
            LIVE_STATUS_v294.json \
            LIVE_STATUS_v295_1.json \
            RUN_SECURITY_V300_1.txt \
            products.json \
            google_script.js \
            REPO_FILE_MANIFEST.txt \
            INVENTORY_TRIGGER.txt

      - name: Install and verify
        run: |
          npm ci
          npm run check:catalog
          npm test
          node --check server.js
          node --check test.js
          node --check security.test.js
          grep -F 'return productCarousel();' server.js >/dev/null
          grep -F 'altText: "仙加味搭配方案"' server.js >/dev/null
          grep -F 'altText: "仙加味產品使用方式"' server.js >/dev/null
          grep -F 'altText: "仙加味怎麼選"' server.js >/dev/null
          grep -F 'channelAccessToken: process.env.CHANNEL_ACCESS_TOKEN || ""' server.js >/dev/null
          grep -F 'channelSecret: process.env.CHANNEL_SECRET || ""' server.js >/dev/null

      - name: HTTP smoke test
        run: |
          set -euo pipefail
          node server.js >/tmp/lineoa-v300-2.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl --fail --silent http://127.0.0.1:3000/ | grep '"version":"v300.2"' >/dev/null
          curl --fail --silent http://127.0.0.1:3000/healthz | grep '"crmConfigured":true' >/dev/null

      - name: Commit tested runtime files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js test.js security.test.js package.json package-lock.json README.md
          git add -u -- ':!*.yml' ':!*.yaml'
          if git diff --cached --quiet; then
            echo "No runtime changes to commit."
          else
            git commit -m "v300.2: restore LINE card buttons and clean obsolete files"
            git pull --rebase origin main
            git push origin main
          fi
