name: Restore LINE OA cards v300.2

on:
  push:
    branches: [main]
    paths:
      - RESTORE_LINE_CARDS_TRIGGER.txt

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore card-based LINE flows
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json
          import re

          crm_url = "https://script.google.com/macros/s/AKfycbwAFBxeROd2ZYGJ_h0O7_H2MMxptOMoj3EXIErZpbKuTYFOzOVwQkrk8X1MoxapkHVGSA/exec"
          server_path = Path("server.js")
          server = server_path.read_text(encoding="utf-8")

          server = server.replace("仙加味 LINE OA Bot v300.1", "仙加味 LINE OA Bot v300.2")
          server = server.replace('const VERSION = "v300.1";', 'const VERSION = "v300.2";')
          server = re.sub(
              r'const CRM_URL = process\.env\.CRM_URL \|\| "[^"]*";',
              f'const CRM_URL = process.env.CRM_URL || "{crm_url}";',
              server,
              count=1,
          )
          server = re.sub(
              r'const config = \{[\s\S]*?\n\};\n\nconst app = express\(\);',
              'const config = {\n  channelAccessToken: process.env.CHANNEL_ACCESS_TOKEN || "",\n  channelSecret: process.env.CHANNEL_SECRET || "",\n};\n\nconst app = express();',
              server,
              count=1,
          )

          product_menu = '''function productMenuReply() {
            return productCarousel();
          }

          function priceCarousel'''
          server, count = re.subn(
              r'function productMenuReply\(\) \{[\s\S]*?\n\}\n\nfunction priceCarousel',
              product_menu,
              server,
              count=1,
          )
          if count != 1:
              raise SystemExit("無法更新 productMenuReply")

          recommend = '''function recommendReply() {
            const cards = [
              flexCard(
                "固定日常安排",
                "想建立固定日常食補，可從龜鹿膏開始；需要外出或忙碌時方便飲用，可選龜鹿飲30cc或180cc。",
                [
                  { label: "看龜鹿膏", text: "產品詳情｜guilu-gao" },
                  { label: "看30cc", text: "產品詳情｜guilu-drink-30" },
                  { label: "看180cc", text: "產品詳情｜guilu-drink-180" },
                ]
              ).contents,
              flexCard(
                "沖泡、燉湯與家庭使用",
                "想搭配熱水、料理或家庭較大規格使用，可比較龜鹿湯塊與龜鹿膠。",
                [
                  { label: "看龜鹿湯塊", text: "產品詳情｜guilu-tangkuai" },
                  { label: "看龜鹿膠", text: "產品詳情｜guilu-jiao" },
                  { label: "看搭配方案", text: "搭配組合" },
                ]
              ).contents,
              flexCard(
                "自行搭配飲品",
                "喜歡依自己的飲食習慣加入溫水、牛奶、豆漿或其他飲品，可查看鹿茸粉。個人體質、疾病與用藥問題會轉介中醫師協助判斷。",
                [
                  { label: "看鹿茸粉", text: "產品詳情｜luerong-fen" },
                  { label: "怎麼使用", text: "怎麼使用" },
                  { label: "人工客服", text: "我要人工客服" },
                ]
              ).contents,
            ];
            return {
              type: "flex",
              altText: "仙加味怎麼選",
              contents: { type: "carousel", contents: cards },
            };
          }

          function comboReply'''
          server, count = re.subn(
              r'function recommendReply\(\) \{[\s\S]*?\n\}\n\nfunction comboReply',
              recommend,
              server,
              count=1,
          )
          if count != 1:
              raise SystemExit("無法更新 recommendReply")

          combo_menu = '''function comboMenuReply() {
            const combos = DATA.offers?.comboOffers || [];
            if (!combos.length) {
              return flexCard("搭配方案", "目前搭配方案由客服依需求協助整理。", [
                { label: "看產品", text: "看產品" },
                { label: "人工客服", text: "我要人工客服" },
              ]);
            }

            return {
              type: "flex",
              altText: "仙加味搭配方案",
              contents: {
                type: "carousel",
                contents: combos.slice(0, 10).map((combo, index) =>
                  flexCard(
                    combo.name,
                    (combo.items || []).map((item) => "・" + item).join("\\n") +
                      "\\n\\n" + (combo.desc || "") +
                      "\\n\\n" + (combo.priceNote || "實際價格、庫存與活動由客服確認。"),
                    [
                      { label: "查看方案", text: "搭配方案｜" + index },
                      { label: "查看產品", text: "看產品" },
                      { label: "人工客服", text: "我要人工客服" },
                    ]
                  ).contents
                ),
              },
            };
          }

          function comboDetailReply'''
          server, count = re.subn(
              r'function comboMenuReply\(\) \{[\s\S]*?\n\}\n\nfunction comboDetailReply',
              combo_menu,
              server,
              count=1,
          )
          if count != 1:
              raise SystemExit("無法更新 comboMenuReply")

          usage_menu = '''function usageChooserReply() {
            return {
              type: "flex",
              altText: "仙加味產品使用方式",
              contents: {
                type: "carousel",
                contents: DATA.products.map((product) => usageReply(product).contents),
              },
            };
          }

          function usageReply'''
          server, count = re.subn(
              r'function usageChooserReply\(\) \{[\s\S]*?\n\}\n\nfunction usageReply',
              usage_menu,
              server,
              count=1,
          )
          if count != 1:
              raise SystemExit("無法更新 usageChooserReply")

          server_path.write_text(server, encoding="utf-8")

          test_path = Path("test.js")
          test = test_path.read_text(encoding="utf-8")
          test = test.replace('assert.strictEqual(VERSION, "v300.1");', 'assert.strictEqual(VERSION, "v300.2");')
          test = test.replace('assert.ok(recommendReply().text.includes("龜鹿飲180cc"));', 'assert.strictEqual(recommendReply().contents.contents.length, 3);')
          test = test.replace('assert.strictEqual(usageChooserReply().quickReply.items.length, 6);', 'assert.strictEqual(usageChooserReply().contents.contents.length, 6);')
          test = test.replace(
              'assert.strictEqual(productMenuReply().quickReply.items.length, 6);\nassert.ok(comboMenuReply().text.includes("日常節奏組"));\nassert.ok(comboDetailReply(0).contents.body.contents[0].text.includes("日常節奏組"));',
              'assert.strictEqual(productMenuReply().contents.contents.length, 6);\nassert.strictEqual(comboMenuReply().contents.contents.length, DATA.offers.comboOffers.length);\nassert.ok(comboMenuReply().contents.contents[0].body.contents[0].text.includes("日常節奏組"));\nassert.ok(comboDetailReply(0).contents.body.contents[0].text.includes("日常節奏組"));'
          )
          test_path.write_text(test, encoding="utf-8")

          security_path = Path("security.test.js")
          security = security_path.read_text(encoding="utf-8").replace('assert.strictEqual(VERSION, "v300.1");', 'assert.strictEqual(VERSION, "v300.2");')
          security = security.replace('PASS security and UX v300.1', 'PASS security and UX v300.2')
          security_path.write_text(security, encoding="utf-8")

          package_path = Path("package.json")
          package_data = json.loads(package_path.read_text(encoding="utf-8"))
          package_data["version"] = "3.0.2"
          package_path.write_text(json.dumps(package_data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          workflow_path = Path(".github/workflows/verify-line-and-website-catalog.yml")
          workflow = workflow_path.read_text(encoding="utf-8").replace('"version":"v300.1"', '"version":"v300.2"')
          workflow_path.write_text(workflow, encoding="utf-8")

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8").replace("# 仙加味 LINE OA v300.1", "# 仙加味 LINE OA v300.2")
          readme = readme.replace('"version": "v300.1"', '"version": "v300.2"')
          if "## 卡片式操作" not in readme:
              readme += "\n## 卡片式操作\n\n- 看產品／直接下單：顯示六項產品圖片卡與按鈕。\n- 幫我推薦：顯示三張使用情境推薦卡。\n- 搭配組合：顯示各組合卡片，可查看方案、產品或轉人工。\n- 怎麼使用：顯示六項產品使用方式卡片。\n"
          readme_path.write_text(readme, encoding="utf-8")
          PY

          grep -F 'return productCarousel();' server.js >/dev/null
          grep -F 'altText: "仙加味搭配方案"' server.js >/dev/null
          grep -F 'altText: "仙加味產品使用方式"' server.js >/dev/null
          grep -F 'altText: "仙加味怎麼選"' server.js >/dev/null
          grep -F 'channelAccessToken: process.env.CHANNEL_ACCESS_TOKEN || ""' server.js >/dev/null
          grep -F 'channelSecret: process.env.CHANNEL_SECRET || ""' server.js >/dev/null

      - name: Remove obsolete files
        shell: bash
        run: |
          rm -f \
            CHECK_REPORT_v286_LINEOA.json \
            CHECK_REPORT_v287_LINEOA.json \
            LINEOA_v285文案修正說明.md \
            LINEOA_v288全系列上架更新說明.md \
            LINEOA_古籍藥典與正向QA_v286.md \
            LINEOA_正式回覆文案_v280.md \
            LINEOA_正式回覆文案_v286.md \
            LINEOA_正式回覆文案_v287.md \
            LINEOA_龜鹿網路說法安全回覆_v284.md \
            LIVE_STATUS_v288.json \
            LIVE_STATUS_v289.json \
            LIVE_STATUS_v294.json \
            LIVE_STATUS_v295_1.json \
            RUN_SECURITY_V300_1.txt \
            products.json \
            google_script.js \
            REPO_FILE_MANIFEST.txt \
            INVENTORY_TRIGGER.txt \
            .github/workflows/repo-inventory.yml

      - name: Install and test
        run: |
          npm install --package-lock-only --ignore-scripts
          npm ci
          npm run check:catalog
          npm test
          node --check server.js
          node --check test.js
          node --check security.test.js

      - name: HTTP smoke test
        shell: bash
        run: |
          set -euo pipefail
          node server.js >/tmp/lineoa-v300-2.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl --fail --silent http://127.0.0.1:3000/ | grep '"version":"v300.2"' >/dev/null
          curl --fail --silent http://127.0.0.1:3000/healthz | grep '"crmConfigured":true' >/dev/null

      - name: Remove one-time files and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f RESTORE_LINE_CARDS_TRIGGER.txt
          rm -f .github/workflows/restore-line-cards-v300-2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v300.2: restore LINE card buttons and remove obsolete files"
          git push origin main
