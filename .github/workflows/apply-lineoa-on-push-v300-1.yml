name: Apply LINE OA v300.1 on branch push

on:
  push:
    branches:
      - security-hardening-v300-1

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: security-hardening-v300-1
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply fixes
        run: |
          set -euo pipefail
          node tools/apply_security_hardening_v300_1.js
          node tools/fix_combo_compat_v300_1.js
          node tools/fix_product_menu_handler_v300_1.js
          git checkout -- .github/workflows/verify-line-and-website-catalog.yml
          npm install --package-lock-only --ignore-scripts

      - name: Install and test
        run: |
          npm ci
          npm run check:catalog
          npm test
          node --check server.js
          node --check test.js
          node --check catalog.test.js
          node --check security.test.js
          grep -F 'return reply(event.replyToken, productMenuReply());' server.js >/dev/null
          grep -F 'return reply(event.replyToken, comboMenuReply());' server.js >/dev/null

      - name: Commit tested files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "v300.1: finalize LINE OA product and combo menus"
            git push origin HEAD:security-hardening-v300-1
          fi
