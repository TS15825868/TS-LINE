name: LINE OA v309 stabilize

on:
  pull_request:
    branches: [main]
    paths:
      - LINEOA_V309_TRIGGER.txt

permissions:
  contents: write

jobs:
  stabilize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply LINE OA v309
        run: python tools/lineoa_v309_stabilize.py

      - name: Install dependencies
        run: npm ci

      - name: Validate syntax and data
        run: |
          node --check server.js
          node --check server-core.js
          node -e "const d=require('./data.json'); if(!d.products.find(p=>p.id==='guilu-drink-180')) throw new Error('missing 180cc'); if(d.store.hours!=='週一至週六 09:30–18:30') throw new Error('wrong hours'); console.log('data ok')"

      - name: Capture LINE OA tests
        run: |
          set +e
          npm test > V309_TEST_OUTPUT.txt 2>&1
          status=$?
          echo "$status" > V309_TEST_STATUS.txt
          cat V309_TEST_OUTPUT.txt
          exit 0

      - name: Commit diagnostic result to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898268+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "LINE OA v309：套用整合並保存測試結果" || exit 0
          git push origin HEAD:${{ github.head_ref }}
