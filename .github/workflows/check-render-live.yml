name: Check Render live

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check:
    if: github.event.issue.title == 'CHECK_RENDER_LINEOA_LIVE'
    runs-on: ubuntu-latest
    steps:
      - name: Check live service
        env:
          BASE: https://ts-line.onrender.com
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          root=$(curl -fsSL --retry 8 --retry-delay 10 --max-time 90 "$BASE/")
          health=$(curl -fsSL --retry 8 --retry-delay 10 --max-time 90 "$BASE/healthz")
          echo "$root" > /tmp/root.json
          echo "$health" > /tmp/health.json
          python3 - <<'PY'
          import json
          root=json.load(open('/tmp/root.json'))
          health=json.load(open('/tmp/health.json'))
          assert root.get('ok') is True, root
          assert root.get('version') == 'v401.0', root
          assert health.get('ok') is True, health
          assert health.get('version') == 'v401.0', health
          assert health.get('catalogVersion') == '408.7', health
          assert health.get('mascotVersion') == '401.0', health
          assert health.get('productCount') == 6, health
          assert health.get('mascotAssetsReady') is True, health
          PY
          for name in welcome products recommend combo usage faq service brand cart; do
            curl -fsSL --retry 5 --retry-delay 5 --max-time 60 -D "/tmp/$name.headers" "$BASE/mascot/$name.jpg?v=401.0" -o "/tmp/$name.jpg"
            grep -qi '^content-type: image/jpeg' "/tmp/$name.headers"
            test "$(stat -c%s "/tmp/$name.jpg")" -gt 100000
          done
          python3 - <<'PY' > /tmp/comment.txt
          import json
          root=json.load(open('/tmp/root.json'))
          health=json.load(open('/tmp/health.json'))
          print('RENDER_LINEOA_LIVE_SUCCESS')
          print('```json')
          print(json.dumps({'root':root,'healthz':health,'mascotImages':'9/9 JPEG files loaded and each >100KB'}, ensure_ascii=False, indent=2))
          print('```')
          PY
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file /tmp/comment.txt
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed
