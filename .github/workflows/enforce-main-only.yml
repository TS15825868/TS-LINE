name: Enforce Main Only

on:
  push:
    branches: [main]
  create:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Delete every branch except main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -u
          mapfile -t branches < <(gh api --paginate "repos/${GITHUB_REPOSITORY}/branches?per_page=100" --jq '.[].name')
          for branch in "${branches[@]}"; do
            if [ "$branch" = "main" ]; then
              continue
            fi
            echo "Deleting branch: $branch"
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${branch}" || true
          done

          remaining="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/branches?per_page=100" --jq '.[].name' | grep -v '^main$' || true)"
          if [ -n "$remaining" ]; then
            echo "Branches still remaining:"
            echo "$remaining"
            exit 1
          fi

          echo "Repository now contains only main."
