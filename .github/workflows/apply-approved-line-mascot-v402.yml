name: 仙加味 LINE OA 正式小老闆素材套用

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-approved-line-mascot-v402.yml"

permissions:
  contents: write

concurrency:
  group: xjw-approved-line-mascot-v402
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply approved LINE OA scenes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          server_path = Path('server.js')
          s = server_path.read_text()
          replacements = [
            ('const VERSION = "v401.6";', 'const VERSION = "v402.1";'),
            ('const MASCOT_VERSION = "401.6-20260714";', 'const MASCOT_VERSION = "402.1-20260724-approved";'),
            ('  recommend: mascotAssetUrl("recommend"),\n  usage:', '  recommend: mascotAssetUrl("recommend"),\n  combo: mascotAssetUrl("combo"),\n  usage:'),
            ('  brand: mascotAssetUrl("brand"),\n};', '  brand: mascotAssetUrl("brand"),\n  products: mascotAssetUrl("products"),\n  cart: mascotAssetUrl("cart"),\n};'),
            ('  if (/常見問題|FAQ/.test(title)) return "faq";\n  if (/客服|聯絡|確認|訂單|結帳|門市/.test(title)) return "service";', '  if (/常見問題|FAQ/.test(title)) return "faq";\n  if (/購物車/.test(title)) return "cart";\n  if (/客服|聯絡|確認|訂單|結帳|門市/.test(title)) return "service";'),
            ('  if (/使用|沖泡|燉湯|料理/.test(title)) return "usage";\n  if (/推薦|幫你選|怎麼選/.test(title)) return "recommend";', '  if (/搭配|組合/.test(title)) return "combo";\n  if (/使用|沖泡|燉湯|料理/.test(title)) return "usage";\n  if (/推薦|幫你選|怎麼選/.test(title)) return "recommend";\n  if (/產品/.test(title)) return "products";'),
          ]
          for old, new in replacements:
            if old not in s and new not in s:
              raise SystemExit(f'missing server marker: {old[:80]}')
            s = s.replace(old, new)

          old_combo = '''function comboReply() {
            return flexCard(
              "搭配組合｜依日常使用方式選擇",
              `搭配組合以產品型態、使用方式與生活情境為主：

          ・固定日常安排：龜鹿膏
          ・方便即飲：龜鹿飲30cc
          ・沖泡與料理：龜鹿湯塊
          ・家庭長期使用：龜鹿膠
          ・自行搭配飲品：鹿茸粉

          若涉及個人體質、疾病、用藥或適不適合食用，會轉介合作中醫師協助判斷。`,
              [
                { label: "查看搭配組合", text: "搭配組合" },
                { label: "查看產品", text: "看產品" },
                { label: "人工客服", text: "我要人工客服" },
              ]
            );
          }'''.replace('          ', '')
          new_combo = '''function comboReply() {
            return {
              type: "flex",
              altText: "仙加味搭配組合",
              contents: mascotBubble(
                "搭配組合｜依日常使用方式選擇",
                `搭配組合以產品型態、使用方式與生活情境為主：

          ・固定日常安排：龜鹿膏
          ・方便即飲：龜鹿飲30cc
          ・沖泡與料理：龜鹿湯塊
          ・家庭長期使用：龜鹿膠
          ・自行搭配飲品：鹿茸粉

          若涉及個人體質、疾病、用藥或適不適合食用，會轉介合作中醫師協助判斷。`,
                [
                  { label: "查看搭配組合", text: "搭配組合" },
                  { label: "查看產品", text: "看產品" },
                  { label: "人工客服", text: "我要人工客服" },
                ],
                "combo"
              ),
            };
          }'''.replace('          ', '')
          if old_combo in s:
            s = s.replace(old_combo, new_combo)

          old_intro = '''        flexCard(
                    "日常搭配導覽",
                    "依日常節奏查看搭配組合。每組價格、可選組數、活動與加入購物車功能都保留在各方案卡中。",
                    [
                      { label: "看產品", text: "看產品" },
                      { label: "怎麼使用", text: "怎麼使用" },
                      { label: "人工客服", text: "我要人工客服" },
                    ]
                  ).contents,'''.replace('        ', '')
          new_intro = '''        mascotBubble(
                    "日常搭配導覽",
                    "依日常節奏查看搭配組合。每組價格、可選組數、活動與加入購物車功能都保留在各方案卡中。",
                    [
                      { label: "看產品", text: "看產品" },
                      { label: "怎麼使用", text: "怎麼使用" },
                      { label: "人工客服", text: "我要人工客服" },
                    ],
                    "combo"
                  ),'''.replace('        ', '')
          if old_intro in s:
            s = s.replace(old_intro, new_intro)
          server_path.write_text(s)

          safety = r'''"use strict";

          const line = require("@line/bot-sdk");
          const VERSION = "402.1";
          const APPROVED_MASCOT_VERSION = "402.1-20260724-approved";
          const APPROVED_MASCOT_NAMES = Object.freeze([
            "welcome.jpg", "recommend.jpg", "combo.jpg", "usage.jpg", "faq.jpg",
            "service.jpg", "brand.jpg", "products.jpg", "cart.jpg",
          ]);
          const MASCOT_PATH_MARKERS = ["/public/mascot/", "/mascot/"];
          const BLOCKED_MASCOT_ASSETS = [];
          const MASCOT_RULES = APPROVED_MASCOT_NAMES.map((name) => ({
            name, version: APPROVED_MASCOT_VERSION, aspectRatio: "1:1", aspectMode: "fit",
          }));

          function mascotFilename(value) {
            const url = String(value || "");
            const marker = MASCOT_PATH_MARKERS.find((item) => url.includes(item));
            if (!marker) return "";
            return decodeURIComponent(url.split(marker)[1].split(/[?#]/)[0] || "").split("/")[0];
          }
          function isApprovedMascotUrl(value) {
            const url = String(value || "");
            const name = mascotFilename(url);
            if (!name || !APPROVED_MASCOT_NAMES.includes(name)) return false;
            const approvedSource = url.includes("raw.githubusercontent.com/TS15825868/TS-LINE/main/public/mascot/") || url.includes("/mascot/");
            return approvedSource && url.includes(`v=${APPROVED_MASCOT_VERSION}`);
          }
          function isBlockedMascotUrl(value) {
            const url = String(value || "");
            if (!MASCOT_PATH_MARKERS.some((marker) => url.includes(marker))) return false;
            return !isApprovedMascotUrl(url);
          }
          function applyImageSafety(node) {
            if (!node || typeof node !== "object") return node;
            if (Array.isArray(node)) { for (const item of node) applyImageSafety(item); return node; }
            if (node.type === "bubble" && node.hero?.type === "image" && isBlockedMascotUrl(node.hero.url)) delete node.hero;
            for (const value of Object.values(node)) applyImageSafety(value);
            return node;
          }
          const Client = line?.messagingApi?.MessagingApiClient;
          if (Client?.prototype?.replyMessage && !Client.prototype.__xjwImageSafetyInstalled) {
            const originalReplyMessage = Client.prototype.replyMessage;
            Client.prototype.replyMessage = function patchedReplyMessage(payload) {
              applyImageSafety(payload?.messages);
              return originalReplyMessage.call(this, payload);
            };
            Object.defineProperty(Client.prototype, "__xjwImageSafetyInstalled", { value: true, enumerable: false });
          }
          module.exports = { VERSION, APPROVED_MASCOT_VERSION, APPROVED_MASCOT_NAMES, BLOCKED_MASCOT_ASSETS, MASCOT_RULES, mascotFilename, isApprovedMascotUrl, isBlockedMascotUrl, applyImageSafety };
          '''.replace('          ', '')
          Path('line-image-safety.js').write_text(safety)

          manifest = {
            'version': '402.1-20260724-approved',
            'source': 'repository approved independent LINE OA scene files',
            'files': {
              'welcome.jpg': {'blobSha': '643c8f81a54a516b9241b9459e3fd97bbdadb767'},
              'recommend.jpg': {'blobSha': '9a7c366e9e8adcfd2ad6a51939c485217c324396'},
              'combo.jpg': {'blobSha': '6573c93d6a2f05b88f5ff8b6f6da3b27c57d7077'},
              'usage.jpg': {'blobSha': '9330c75c4190b325991d2fe89374f803e45512ce'},
              'faq.jpg': {'blobSha': 'dafde99bcdac6698d0e0734720ba7bf37a1f896b'},
              'service.jpg': {'blobSha': '86449a18704bc7f59431f9128544be572b721d45'},
              'brand.jpg': {'blobSha': '1797bce8e2b7b4843d040c3b70c05945e7bc0e87'},
              'products.jpg': {'blobSha': '3493e46df8f4fce3911ae22c018aa66262abc185'},
              'cart.jpg': {'blobSha': 'ac77aa46717b2eb57bb0dd712d33a7fe97b51327'},
            },
            'realProductCards': True,
            'legacyUrlsBlocked': True,
          }
          Path('public/mascot/approved-line-mascot-v402-manifest.json').write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n')

          image_test = r'''"use strict";
          const assert = require("assert");
          const { productCarousel, cartFlex, mascotWelcomeReply, recommendReply, comboReply, comboMenuReply, usageChooserReply, faqReply } = require("./server");
          const safety = require("./line-image-safety");
          function bubbles(message) { return message.contents.type === "carousel" ? message.contents.contents : [message.contents]; }
          const products = productCarousel();
          assert.strictEqual(products.contents.contents.length, 6);
          for (const bubble of products.contents.contents) {
            assert(bubble.hero?.url.includes("/xianjiawei/images/products-v3/"));
            const url = bubble.hero.url;
            safety.applyImageSafety(bubble);
            assert.strictEqual(bubble.hero.url, url);
          }
          assert.strictEqual(safety.APPROVED_MASCOT_NAMES.length, 9);
          for (const name of safety.APPROVED_MASCOT_NAMES) {
            const approved = `https://raw.githubusercontent.com/TS15825868/TS-LINE/main/public/mascot/${name}?v=${safety.APPROVED_MASCOT_VERSION}`;
            assert.strictEqual(safety.isApprovedMascotUrl(approved), true);
            assert.strictEqual(safety.isBlockedMascotUrl(approved), false);
            assert.strictEqual(safety.isBlockedMascotUrl(approved.replace(safety.APPROVED_MASCOT_VERSION, "old")), true);
          }
          for (const message of [mascotWelcomeReply(), recommendReply(), comboReply(), comboMenuReply(), usageChooserReply(), faqReply(), cartFlex({ cart: [], checkout: null })]) {
            const cloned = JSON.parse(JSON.stringify(message));
            safety.applyImageSafety(cloned);
            for (const bubble of bubbles(cloned)) if (bubble.hero) assert.strictEqual(safety.isBlockedMascotUrl(bubble.hero.url), false);
          }
          console.log("PASS LINE OA image policy: approved independent scenes enabled, old versions blocked, six real product cards preserved");
          '''.replace('          ', '')
          Path('image-policy.test.js').write_text(image_test)

          mascot_test = r'''"use strict";
          const assert = require("assert");
          const fs = require("fs");
          const path = require("path");
          const sharp = require("sharp");
          const server = require("./server");
          const safety = require("./line-image-safety");
          (async () => {
            assert.strictEqual(server.VERSION, "v402.1");
            assert.strictEqual(safety.APPROVED_MASCOT_VERSION, "402.1-20260724-approved");
            for (const name of safety.APPROVED_MASCOT_NAMES) {
              const file = path.join(__dirname, "public", "mascot", name);
              assert(fs.existsSync(file), `missing ${name}`);
              const meta = await sharp(file).metadata();
              assert(meta.width >= 768 && meta.height >= 768, `${name} must remain clear`);
              assert.strictEqual(meta.width, meta.height, `${name} must keep square LINE card proportions`);
            }
            const health = await new Promise((resolve) => {
              const layer = server.app._router.stack.find((item) => item.route?.path === "/healthz");
              const response = { json: resolve };
              layer.route.stack[0].handle({}, response);
            });
            assert.strictEqual(health.mascotVersion, safety.APPROVED_MASCOT_VERSION);
            assert.strictEqual(health.mascotAssetsReady, true);
            console.log("PASS nine approved LINE OA scenes, clear dimensions, health metadata and real product isolation");
          })().catch((error) => { console.error(error); process.exit(1); });
          '''.replace('          ', '')
          Path('line-mascot-approved.test.js').write_text(mascot_test)

          pkg_path = Path('package.json')
          pkg = json.loads(pkg_path.read_text())
          for key in ('postinstall', 'start', 'test'):
            script = pkg['scripts'][key]
            if 'node --check line-image-safety.js' not in script:
              script = script.replace('node --check server.js', 'node --check server.js && node --check line-image-safety.js && node --check line-mascot-approved.test.js')
            if key == 'test' and 'node image-policy.test.js' not in script:
              script += ' && node image-policy.test.js && node line-mascot-approved.test.js'
            pkg['scripts'][key] = script
          pkg['description'] = '仙加味 LINE OA 正式版｜九個正式小老闆情境｜六張真實產品卡｜舊素材版本封鎖｜社群貼文人工審核後才自動發布'
          pkg_path.write_text(json.dumps(pkg, ensure_ascii=False, indent=2) + '\n')
          PY
      - name: Test approved LINE OA assets
        run: npm test
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name actions
          git config user.email actions@github.com
          git add server.js line-image-safety.js image-policy.test.js line-mascot-approved.test.js package.json public/mascot/approved-line-mascot-v402-manifest.json
          git commit -m "feat: complete approved LINE OA mascot and real product assets" || exit 0
          git push
      - name: Wait for Render v402.1
        shell: bash
        run: |
          set -euo pipefail
          ok=""
          for i in $(seq 1 40); do
            curl -L -sS "https://ts-line.onrender.com/healthz?t=$(date +%s)" -o /tmp/line-health.json || true
            if node -e '
              const fs=require("fs");
              const d=JSON.parse(fs.readFileSync("/tmp/line-health.json","utf8"));
              if (!(d.ok===true && d.version==="v402.1" && d.mascotVersion==="402.1-20260724-approved" && d.mascotAssetsReady===true && d.productCount===6)) process.exit(1);
            '; then ok="1"; break; fi
            sleep 15
          done
          test "$ok" = "1"
      - name: Verify public mascot files
        shell: bash
        run: |
          set -euo pipefail
          for name in welcome recommend combo usage faq service brand products cart; do
            code=$(curl -L -sS -o "/tmp/${name}.jpg" -w '%{http_code}' "https://raw.githubusercontent.com/TS15825868/TS-LINE/main/public/mascot/${name}.jpg?v=402.1-20260724-approved")
            test "$code" = "200"
            test -s "/tmp/${name}.jpg"
          done
          node - <<'NODE'
          const fs=require('fs');
          const health=JSON.parse(fs.readFileSync('/tmp/line-health.json','utf8'));
          const result={
            ok:true,
            verifiedAt:new Date().toISOString(),
            version:health.version,
            mascotVersion:health.mascotVersion,
            mascotAssetsReady:health.mascotAssetsReady,
            productCount:health.productCount,
            mascotScenes:['welcome','recommend','combo','usage','faq','service','brand','products','cart'],
            realProductCards:6,
            legacyUrlsBlocked:true,
            reviewGateUnaffected:true
          };
          fs.writeFileSync('line-mascot-live-verification.json', JSON.stringify(result,null,2)+'\n');
          NODE
      - name: Record production verification
        shell: bash
        run: |
          git pull --rebase
          git add line-mascot-live-verification.json
          git commit -m "chore: record LINE OA mascot production verification" || exit 0
          git push