name: v295.1 LINE image cache fix

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add cache-busting image URLs and bump deployment
        shell: python
        run: |
          from pathlib import Path
          import json, re

          VERSION='295.1'
          data_path=Path('data.json')
          data=json.loads(data_path.read_text(encoding='utf-8'))
          data['version']=VERSION
          for p in data.get('products',[]):
              for key in ('image','dmImage'):
                  value=p.get(key)
                  if value:
                      value=re.sub(r'\?v=[^&\s]+$','',value)
                      p[key]=f'{value}?v={VERSION}'
              if isinstance(p.get('detailImages'),list):
                  fixed=[]
                  for value in p['detailImages']:
                      value=re.sub(r'\?v=[^&\s]+$','',value)
                      fixed.append(f'{value}?v={VERSION}')
                  p['detailImages']=fixed
          data_path.write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')

          package_path=Path('package.json')
          package=json.loads(package_path.read_text(encoding='utf-8'))
          package['name']='xianjiawei-lineoa-v295-1'
          package['version']='2.9.5'
          package['description']='仙加味 LINE OA v295.1｜強制載入最新產品圖並同步產品DM圖片'
          package_path.write_text(json.dumps(package,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')

          server_path=Path('server.js')
          text=server_path.read_text(encoding='utf-8')
          text=text.replace('仙加味 LINE OA Bot v294','仙加味 LINE OA Bot v295.1')
          text=text.replace('const VERSION = "v294";','const VERSION = "v295.1";')
          server_path.write_text(text,encoding='utf-8')

          status={
              'version':'v295.1',
              'productImages':'website images/products-v3 with ?v=295.1',
              'detailDMImages':'website images/dm-v3 with ?v=295.1',
              'deployment':'package version bumped to trigger auto deploy'
          }
          Path('LIVE_STATUS_v295_1.json').write_text(json.dumps(status,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')

      - name: Commit LINE OA fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json package.json server.js LIVE_STATUS_v295_1.json
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "v295.1: force latest product images in LINE OA"
          git push origin main
