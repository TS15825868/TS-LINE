name: Apply LINE OA v305 directly

on:
  push:
    branches: [main]
    paths:
      - LINE_V305_MAIN_TRIGGER.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply LINE OA v305
        run: python tools/line_v305_restore.py
      - name: Validate LINE OA v305
        run: |
          node --check server.js
          python - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path('data.json').read_text(encoding='utf-8'))
          assert any(p.get('id')=='guilu-drink-180' for p in data['products'])
          server=Path('server.js').read_text(encoding='utf-8')
          assert '週一至週六 09:30–18:30' in server
          assert 'aspectMode: "contain"' in server
          print('LINE OA v305 validated')
          PY
      - name: Commit directly to main
        run: |
          rm -f LINE_V305_MAIN_TRIGGER.txt
          rm -f .github/workflows/line-v305-main-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "LINE OA v305：正式恢復龜鹿飲180cc與更新門市時間" || exit 0
          git push origin HEAD:main
