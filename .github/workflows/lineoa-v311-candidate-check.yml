name: LINE OA v311 candidate check

on:
  pull_request:
    branches: [main]
    paths:
      - CANDIDATE_TEST_TRIGGER.txt

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Capture candidate tests
        run: |
          set +e
          {
            node --check server.js
            npm test
            test ! -e server-core.js
            grep -F 'const VERSION = "v311.0";' server.js
            grep -F 'images/line-mascot/xianjiawei-mascot-line-welcome.jpg?v=311.0' server.js
            grep -F 'aspectMode: "contain"' server.js
          } > CANDIDATE_TEST_OUTPUT.txt 2>&1
          status=$?
          echo "$status" > CANDIDATE_TEST_STATUS.txt
          cat CANDIDATE_TEST_OUTPUT.txt
          exit 0
      - name: Commit test result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CANDIDATE_TEST_OUTPUT.txt CANDIDATE_TEST_STATUS.txt
          git commit -m "保存 LINE OA v311 候選版測試結果" || exit 0
          git push origin HEAD:${{ github.head_ref }}
