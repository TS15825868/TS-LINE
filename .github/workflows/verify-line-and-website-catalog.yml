name: Verify LINE OA and website catalog

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-line-and-website-catalog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Synchronize website catalog in verification workspace
        run: |
          npm run sync:catalog
          npm run check:catalog

      - name: JavaScript syntax
        run: |
          node --check server.js
          node --check social-server.js
          node --check facebook-page-token-bridge.js
          node --check social-platform-status.js
          node --check social-official-rebuild.js
          node --check social-approved-zip-import.js
          node --check internal-social-upload-approved-patch.js
          node --check disable-auto-knowledge-cards.js
          node --check internal-app.js
          node --check internal-entry.js
          node --check supabase-state-bridge.js
          node --check persistence-auto-save.js
          node --check line-image-safety.js
          node --check tools/sync_website_catalog.js

      - name: Approved ZIP release contract
        run: node tools/release_check.js

      - name: LINE OA catalog security and image policy
        run: |
          node test.js
          node catalog.test.js
          node security.test.js
          node function.test.js
          node image-policy.test.js

      - name: Facebook token bridge
        run: node facebook-page-token-bridge.test.js

      - name: Social platform status
        run: node social-platform-status.test.js

      - name: Official social schedule rebuild
        run: node social-official-rebuild.test.js

      - name: Approved social ZIP importer
        run: node social-approved-zip-import.test.js

      - name: Internal App core and mobile
        run: |
          node internal-app.test.js
          node internal-app-pro.test.js
          node internal-app-mobile.test.js
          node internal-app-client-fix.test.js
          node internal-app-button-contract.test.js

      - name: Internal App upload and form controllers
        run: |
          node internal-social-upload.test.js
          node internal-app-upload-controller.test.js
          node internal-app-form-controller.test.js

      - name: Orders inventory and operations
        run: |
          node internal-order-pricing.test.js
          node internal-line-order-sync.test.js
          node internal-reservation-rebuild.test.js
          node line-order-cart.test.js
          node internal-operations-suite.test.js

      - name: Supabase and immediate persistence
        run: |
          node supabase-state-bridge.test.js
          node persistence-auto-save.test.js

      - name: Full HTTP smoke tests
        shell: bash
        env:
          PORT: 3000
          INTERNAL_ADMIN_USER: admin
          INTERNAL_APP_PASSWORD: ci-test-password-123
          INTERNAL_APP_SECRET: ci-test-secret-1234567890
          SOCIAL_ADMIN_PIN: ci-test-pin-123
        run: |
          set -euo pipefail
          npm start >/tmp/lineoa.log 2>&1 &
          PID=$!
          trap 'kill $PID 2>/dev/null || true; tail -100 /tmp/lineoa.log' EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3000/healthz >/tmp/health.json; then
              break
            fi
            sleep 1
          done

          curl --fail --silent --show-error http://127.0.0.1:3000/ >/tmp/root.json
          curl --fail --silent --show-error http://127.0.0.1:3000/healthz >/tmp/health.json
          curl --fail --silent --show-error http://127.0.0.1:3000/internal/healthz >/tmp/internal.json
          curl --fail --silent --show-error http://127.0.0.1:3000/internal/db-healthz >/tmp/database.json
          curl --fail --silent --show-error http://127.0.0.1:3000/social/healthz >/tmp/social.json

          node - <<'NODE'
          const fs = require('fs');
          const read = (name) => JSON.parse(fs.readFileSync(`/tmp/${name}.json`, 'utf8'));
          const root = read('root');
          const health = read('health');
          const internal = read('internal');
          const database = read('database');
          const social = read('social');
          if (root.ok !== true || root.service !== '仙加味 LINE OA') throw new Error('LINE OA root failed');
          if (health.ok !== true || health.version !== 'v401.6' || health.productCount !== 6) throw new Error('LINE OA health failed');
          if (internal.ok !== true || internal.app !== '仙加味內部管理 App') throw new Error('Internal app health failed');
          if (database.ok !== true || !['supabase', 'local-json'].includes(database.storage)) throw new Error('Database bridge health failed');
          if (social.ok !== true) throw new Error('Social service health failed');
          console.log({ root, health, internal, database, social });
          NODE
