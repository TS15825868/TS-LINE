name: Verify LINE OA and website catalog

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify website catalog synchronization
        run: npm run check:catalog

      - name: Run all tests
        run: npm test

      - name: JavaScript syntax
        run: |
          node --check server.js
          node --check test.js
          node --check catalog.test.js
          node --check security.test.js
          node --check function.test.js
          node --check tools/sync_website_catalog.js

      - name: HTTP smoke tests without credentials
        shell: bash
        run: |
          set -euo pipefail
          node server.js >/tmp/lineoa.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl --fail --silent --show-error http://127.0.0.1:3000/ | grep '"ok":true' >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:3000/healthz | grep '"version":"v300.3"' >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:3000/healthz | grep '"credentialsConfigured":false' >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:3000/healthz | grep '"crmConfigured":true' >/dev/null
          STATUS=$(curl --silent --output /tmp/webhook.json --write-out '%{http_code}' \
            -X POST -H 'content-type: application/json' -d '{"events":[]}' \
            http://127.0.0.1:3000/webhook)
          test "$STATUS" = "503"
