name: Refresh LINE OA mascot assets

on:
  push:
    branches: [main]
    paths:
      - REFRESH_LINEOA_MASCOTS.txt

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Refresh image cache version
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('server.js')
          s = p.read_text(encoding='utf-8')
          s = s.replace('?v=312.0', '?v=313.0')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Verify
        run: |
          npm ci
          node --check server.js
          npm test
          grep -q 'xianjiawei-mascot-line-products.jpg?v=313.0' server.js
      - name: Commit refresh
        run: |
          rm -f REFRESH_LINEOA_MASCOTS.txt
          rm -f .github/workflows/refresh-lineoa-mascot-assets.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '更新 LINE OA 小老闆圖片快取版本'
          git pull --rebase origin main
          git push origin main
