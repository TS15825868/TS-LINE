name: Apply LINE OA v303 fixes

on:
  pull_request:
    branches: [main]
    paths:
      - LINE_V303_TRIGGER.txt

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fix LINE OA public replies, combo pricing and mascot cards
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          data_path = Path('data.json')
          data = json.loads(data_path.read_text(encoding='utf-8'))
          products = {p['id']: p for p in data.get('products', [])}

          combo_map = {
            'daily-rhythm': [('guilu-gao', 1), ('guilu-drink-30', 5)],
            'daily-convenience': [('guilu-gao', 1), ('guilu-drink-30', 12)],
            'table-pairing': [('guilu-tangkuai', 1), ('luerong-fen', 1)],
            'full-experience': [('guilu-gao', 1), ('guilu-drink-30', 5), ('guilu-tangkuai', 1), ('luerong-fen', 1)],
            'traditional-stew': [('guilu-jiao', 1), ('luerong-fen', 1)],
          }
          item_map = {
            'daily-rhythm': ['龜鹿膏 1 罐', '龜鹿飲30cc 5 瓶'],
            'daily-convenience': ['龜鹿膏 1 罐', '龜鹿飲30cc 12 瓶（買10送2）'],
            'table-pairing': ['龜鹿湯塊75g 1 盒', '鹿茸粉75g 1 罐'],
            'full-experience': ['龜鹿膏 1 罐', '龜鹿飲30cc 5 瓶', '龜鹿湯塊75g 1 盒', '鹿茸粉75g 1 罐'],
            'traditional-stew': ['龜鹿膠600g（一斤裝）1 盒', '鹿茸粉75g 1 罐'],
          }
          for combo in data.get('offers', {}).get('comboOffers', []):
              cid = combo.get('id')
              if cid in combo_map:
                  combo['products'] = [{'productId': pid, 'qty': qty} for pid, qty in combo_map[cid]]
                  combo['items'] = item_map[cid]

          data_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          server_path = Path('server.js')
          server = server_path.read_text(encoding='utf-8')
          server = server.replace('仙加味 LINE OA Bot v302.0', '仙加味 LINE OA Bot v303.0')
          server = server.replace('const VERSION = "v302.0";', 'const VERSION = "v303.0";')
          server = server.replace('?v=302.0"', '?v=303.0"')
          server = server.replace('aspectMode: "contain"', 'aspectMode: "cover"')
          server = server.replace('backgroundColor: "#F7F4ED"', 'backgroundColor: "#EFE4D2"')
          server = server.replace('return flexCard(\n    "搭配組合｜依日常使用方式選擇",', 'return mascotBubble(\n    "搭配組合｜依日常使用方式選擇",')
          server = server.replace('仙加味小老闆歡迎您', '歡迎來到仙加味')
          server = server.replace('全系列已開放詢問與下單；實際庫存與出貨時間由客服確認。', '全系列可詢問與下單；實際庫存、活動與出貨時間由客服確認。')
          server_path.write_text(server, encoding='utf-8')

          if any(pid not in products for combo in data.get('offers', {}).get('comboOffers', []) for pid in [x.get('productId') for x in combo.get('products', [])]):
              raise SystemExit('搭配方案含不存在的產品 ID')
          PY

      - name: Validate LINE OA
        run: |
          node --check server.js
          python - <<'PY'
          import json
          from pathlib import Path
          data=json.loads(Path('data.json').read_text(encoding='utf-8'))
          ids={p['id'] for p in data['products']}
          bad=[]
          for combo in data.get('offers',{}).get('comboOffers',[]):
              if not combo.get('products'): bad.append(combo.get('id','unknown')+':empty')
              for item in combo.get('products',[]):
                  if item.get('productId') not in ids: bad.append(combo.get('id','unknown')+':'+str(item.get('productId')))
          text=Path('server.js').read_text(encoding='utf-8')+Path('data.json').read_text(encoding='utf-8')
          for term in ['180cc','180 cc','guilu-drink-180']:
              if term in text: bad.append(term)
          if bad: raise SystemExit('LINE OA 驗證失敗：'+', '.join(bad))
          print('LINE OA v303 validated')
          PY

      - name: Commit fixes to PR branch
        run: |
          rm -f LINE_V303_TRIGGER.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "LINE OA v303：修正搭配計價與情境角色卡" || exit 0
          git push origin HEAD:${{ github.head_ref }}
