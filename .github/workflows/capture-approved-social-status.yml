name: 擷取正式社群匯入狀態

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/capture-approved-social-status.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Capture current Render import state
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deploy-status
          body="$(curl --location --silent --show-error --max-time 60 https://ts-line.onrender.com/internal/approved-social-one-time-healthz || true)"
          printf '%s\n' "$body" | jq '.' > deploy-status/approved-social-diagnostic.json || printf '{"raw":%s}\n' "$(jq -Rn --arg value "$body" '$value')" > deploy-status/approved-social-diagnostic.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy-status/approved-social-diagnostic.json
          git commit -m "chore: capture approved social import diagnostic" || exit 0
          git push origin HEAD:main
