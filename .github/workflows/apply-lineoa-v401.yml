name: Apply LINE OA v401.0 final

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  actions: read

concurrency:
  group: apply-lineoa-v401-final
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.issue.title == 'APPLY_LINEOA_V401_FINAL2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download verified update script
        run: |
          set -euo pipefail
          python3 -m pip install --quiet gdown
          gdown '1cxoZ8AXdAPqUmZEuEp09Z67GxQA39_li' -O /tmp/apply_lineoa_v401.py
          echo '353aea0fe3f7d699f784acc501d1c746902bedea9c28da364962b326c52c3c6a  /tmp/apply_lineoa_v401.py' | sha256sum -c -

      - name: Apply LINE OA v401.0
        run: |
          set -euo pipefail
          python3 /tmp/apply_lineoa_v401.py

      - name: Install and run complete tests
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts
          npm ci
          npm test
          grep -q 'const VERSION = "v401.0";' server.js
          grep -q 'const MASCOT_VERSION = "401.0";' server.js
          grep -q '"catalogVersion": "408.7"' data.json
          grep -q '"lineBotVersion": "v401.0"' data.json
          grep -q '"lineAssetsVersion": "401.0"' data.json
          test "$(grep -o '?v=408.7' data.json | wc -l)" -ge 12
          test "$(find public/mascot -maxdepth 1 -name '*.jpg' | wc -l)" -eq 9
          python3 - <<'PY'
          from pathlib import Path
          import json
          manifest=json.loads(Path('public/mascot/manifest.json').read_text(encoding='utf-8'))
          assert manifest['version']=='401.0'
          assert len(manifest['images'])==9
          for item in manifest['images'].values():
              path=Path(item['file'])
              assert path.is_file() and path.stat().st_size > 100000, path
          print('九張 LINE OA 專用小老闆圖驗收通過')
          PY

      - name: Commit main
        id: commit
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add server.js data.json package.json package-lock.json README.md tools/release_check.js test.js catalog.test.js security.test.js function.test.js public/mascot/manifest.json
          git commit -m '完成 LINE OA 全面檢查與正式更新 v401.0'
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Report success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'LINEOA_V401_SUCCESS｜六項產品、真實產品圖、正式DM、價格、購物車、結帳、CRM、FAQ、九張LINE OA專用小老闆、健康檢查與完整測試皆已同步官網v408.7並推送main。'
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'LINEOA_V401_FAILURE｜本次更新未完成，不宣稱上線；請查看失敗步驟。'
