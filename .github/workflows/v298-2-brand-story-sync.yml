name: v298.3 brand story sync

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync brand story and secure credentials
        shell: python
        run: |
          from pathlib import Path
          import json, re

          server_path = Path('server.js')
          text = server_path.read_text(encoding='utf-8')

          text = re.sub(r'仙加味 LINE OA Bot v[^\n*]+', '仙加味 LINE OA Bot v298.3', text)
          text = re.sub(r'const VERSION = "[^"]+";', 'const VERSION = "v298.3";', text)
          text = re.sub(r'channelAccessToken:\s*process\.env\.CHANNEL_ACCESS_TOKEN\s*\|\|\s*"[^"]*",', 'channelAccessToken: process.env.CHANNEL_ACCESS_TOKEN || "",', text)
          text = re.sub(r'channelSecret:\s*process\.env\.CHANNEL_SECRET\s*\|\|\s*"[^"]*",', 'channelSecret: process.env.CHANNEL_SECRET || "",', text)

          brand_function = r'''

function brandStoryReply() {
  return flexCard(
    "仙加味｜四代傳承",
    "仙加味的故事從台北萬華開始。\n\n第一代曾祖父從行口與山產買賣起步。\n\n祖父『鹿角伯』為民國28年次，國小畢業後，十幾歲便跟著曾祖父在老店學習山產原料，以及鹿角、鹿茸、鹿鞭等鹿類原料與產品的處理、代工與加工，包含生鮮原料與乾品。\n\n父親出生於1964年，長期在祖父身邊協助相關鹿類原料與產品的生鮮、乾品處理、代工加工與日常營運；約2000年前後鹿角伯辭世後，第三代正式承接。\n\n重要歷程：\n・1974年開始獨立經營\n・1976年正式成立獨立事業\n・1978年完成公司化經營\n\n第四代以仙加味為品牌，將家族累積的原料、工序與使用經驗，整理成更清楚的產品資訊與日常使用方式。",
    [
      { label: "查看完整品牌故事", uri: absoluteUrl("brand.html") },
      { label: "查看產品系列", data: pb("products") },
      { label: "人工客服", text: "我要人工客服" },
    ]
  );
}
'''

          if 'function brandStoryReply()' in text:
            text = re.sub(r'\nfunction brandStoryReply\(\) \{.*?\n\}\n', brand_function, text, count=1, flags=re.S)
          else:
            insert_at = text.find('\nfunction detectProduct(')
            if insert_at == -1:
              raise SystemExit('找不到 detectProduct 插入位置')
            text = text[:insert_at] + brand_function + text[insert_at:]

          brand_route = '  if (/品牌故事|四代|鹿角伯|家族傳承|曾祖父|祖父|第三代|第四代/.test(text)) return reply(event.replyToken, brandStoryReply());\n'
          if brand_route not in text:
            target = '  if (/人工|客服|聯絡/.test(text)) return reply(event.replyToken, textMsg("請直接留下想詢問的內容，我們會由人工協助回覆。", mainQuick()));\n'
            if target not in text:
              raise SystemExit('找不到品牌故事路由插入位置')
            text = text.replace(target, brand_route + target)

          server_path.write_text(text, encoding='utf-8')

          data_path = Path('data.json')
          data = json.loads(data_path.read_text(encoding='utf-8'))
          data['version'] = '298.3'
          data['brandStory'] = {
            'title': '仙加味四代傳承',
            'privacyNote': '對外不顯示公司名稱與家庭分家原因',
            'processingScope': '鹿角、鹿茸、鹿鞭等鹿類原料與產品，包含生鮮原料與乾品的處理、代工與加工',
            'timeline': [
              {'period': '第一代', 'text': '曾祖父從萬華行口與山產買賣起步。'},
              {'period': '民國28年次', 'text': '祖父鹿角伯出生；十幾歲、國小畢業後跟著曾祖父在老店學習鹿類原料與產品的生鮮、乾品處理及代工加工。'},
              {'period': '1964年', 'text': '第三代出生，日後長期協助祖父處理鹿角、鹿茸、鹿鞭等鹿類原料與產品的生鮮、乾品加工及日常營運。'},
              {'period': '1974年', 'text': '開始獨立經營，持續專注代工與加工。'},
              {'period': '1976年', 'text': '正式成立獨立事業。'},
              {'period': '1978年', 'text': '完成公司化經營。'},
              {'period': '約2000年前後', 'text': '鹿角伯辭世，第三代正式承接。'},
              {'period': '第四代', 'text': '以仙加味整理家族經驗、產品資訊與日常使用方式。'}
            ]
          }
          data_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          package_path = Path('package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          package['name'] = 'xianjiawei-lineoa-v298-3'
          package['version'] = '2.9.9'
          package['description'] = '仙加味 LINE OA v298.3｜同步鹿類生鮮與乾品加工歷史及四代傳承'
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

      - name: Remove workflow and commit
        run: |
          rm -f .github/workflows/v298-2-brand-story-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v298.3: sync deer processing history to LINE OA"
          git push origin main
