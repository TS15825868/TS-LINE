name: v298.5 security cleanup

on:
  push:
    paths:
      - TRIGGER_SECURITY_V298_5.txt

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remove public credential fallbacks
        run: |
          node <<'NODE'
          const fs = require('fs');
          let source = fs.readFileSync('server.js', 'utf8');
          source = source
            .replace(/const CRM_URL = process\.env\.CRM_URL \|\| "[^"]*";/, 'const CRM_URL = process.env.CRM_URL || "";')
            .replace(/channelAccessToken:\s*process\.env\.CHANNEL_ACCESS_TOKEN\s*\|\|\s*"[^"]*",/, 'channelAccessToken: process.env.CHANNEL_ACCESS_TOKEN || "",')
            .replace(/channelSecret:\s*process\.env\.CHANNEL_SECRET\s*\|\|\s*"[^"]*",/, 'channelSecret: process.env.CHANNEL_SECRET || "",');
          fs.writeFileSync('server.js', source);
          NODE

      - name: Commit cleanup
        run: |
          rm -f TRIGGER_SECURITY_V298_5.txt
          rm -f .github/workflows/v298-5-security-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "security: remove LINE credentials from public source"
          git push origin main
