name: Apply Social Automation 20260724

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-social-automation-20260724.yml'

permissions:
  contents: write

concurrency:
  group: apply-social-automation-20260724
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Decode approved automation patch
        shell: bash
        run: |
          set -euo pipefail
          cat .automation/social-20260724/part-*.b64 > /tmp/social-automation.tar.gz.b64
          base64 -d /tmp/social-automation.tar.gz.b64 > /tmp/social-automation.tar.gz
          echo '6a8be572fb6611f34b6b64d2c0a556b1b1a76963bdedea76203a9fe8bcc674ba  /tmp/social-automation.tar.gz' | sha256sum -c -
          rm -rf /tmp/social-automation
          mkdir -p /tmp/social-automation
          tar -xzf /tmp/social-automation.tar.gz -C /tmp/social-automation
          cp -a /tmp/social-automation/. .

      - name: Remove temporary and superseded installers
        run: |
          rm -rf .automation/social-20260724
          rm -f .github/workflows/install-qboss-social-batch1.yml
          rm -f .github/workflows/apply-social-automation-20260724.yml
          rm -rf public/social/qboss-batch1

      - name: Protect App controls and validate scope
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | tee /tmp/changed-files.txt
          test -s /tmp/changed-files.txt
          if grep -E '^(internal-app|internal-entry\.js|server\.js|social-server\.js|package\.json|package-lock\.json)' /tmp/changed-files.txt; then
            echo 'Blocked: App/runtime button file changed' >&2
            exit 1
          fi
          node --check social-final-posts.js
          node --check social-schedule-policy.js
          node --check social-final-approved-batch.js
          node --check social-schedule-repair-20260722.js

      - name: Install dependencies
        run: npm ci

      - name: Run complete release checks
        run: npm test

      - name: Commit one production-safe release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: schedule first social batch from 7/24 morning'
          git pull --rebase origin main
          git push origin HEAD:main
