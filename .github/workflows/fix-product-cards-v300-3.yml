name: Fix LINE OA product cards v300.3

on:
  push:
    branches: [main]
    paths:
      - FIX_PRODUCT_CARDS_TRIGGER.txt

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Replace unstable image cards with reliable button cards
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json
          import re

          server_path = Path('server.js')
          server = server_path.read_text(encoding='utf-8')
          server = server.replace('仙加味 LINE OA Bot v300.2', '仙加味 LINE OA Bot v300.3')
          server = server.replace('const VERSION = "v300.2";', 'const VERSION = "v300.3";')

          replacement = r'''function productBubble(product) {
  const priceLine = product.originalPrice && product.originalPrice > product.price
    ? `售價 ${money(product.originalPrice)}\n優惠價 ${money(product.price)}`
    : `售價 ${money(product.price)}`;
  const offers = product.offers.length
    ? `\n${product.offers.map((offer) => `${offer.label}：${money(offer.total)}`).join("\n")}`
    : "";

  return {
    type: "bubble",
    size: "mega",
    body: {
      type: "box",
      layout: "vertical",
      spacing: "md",
      contents: [
        { type: "text", text: product.displayName, weight: "bold", size: "xl", color: "#7B1E1E", wrap: true },
        {
          type: "text",
          text: `規格：${product.spec}\n用途方向：${product.purpose || "日常食補"}\n${priceLine}${offers}`,
          size: "sm",
          color: "#555555",
          wrap: true,
        },
        { type: "text", text: ORDER_NOTICE, size: "sm", color: "#7B1E1E", weight: "bold", wrap: true },
      ],
    },
    footer: {
      type: "box",
      layout: "vertical",
      spacing: "sm",
      contents: [
        {
          type: "button",
          style: "primary",
          color: "#7B1E1E",
          action: { type: "message", label: "選擇數量", text: `選擇數量｜${product.id}` },
        },
        {
          type: "button",
          style: "secondary",
          action: { type: "message", label: "使用方式", text: `使用方式｜${product.id}` },
        },
        {
          type: "button",
          style: "secondary",
          action: { type: "uri", label: "完整介紹", uri: absoluteUrl(product.page || "products.html") },
        },
        {
          type: "button",
          style: "secondary",
          action: { type: "uri", label: "看產品DM", uri: absoluteUrl(product.dmImage || "dm.html") },
        },
      ],
    },
  };
}

function productCarousel'''

          server, count = re.subn(
              r'function productBubble\(product\) \{[\s\S]*?\n\}\n\nfunction productCarousel',
              replacement,
              server,
              count=1,
          )
          if count != 1:
              raise SystemExit('productBubble replacement failed')
          server_path.write_text(server, encoding='utf-8')

          test_path = Path('test.js')
          test = test_path.read_text(encoding='utf-8')
          test = test.replace('assert.strictEqual(VERSION, "v300.2");', 'assert.strictEqual(VERSION, "v300.3");')
          marker = 'assert.strictEqual(productCards.contents.contents.length, 6);'
          addition = marker + '\nassert.ok(productCards.contents.contents.every((card) => !card.hero));\nassert.ok(productCards.contents.contents.every((card) => card.footer.contents.length === 4));'
          if addition not in test:
              test = test.replace(marker, addition)
          test_path.write_text(test, encoding='utf-8')

          security_path = Path('security.test.js')
          security = security_path.read_text(encoding='utf-8')
          security = security.replace('assert.strictEqual(VERSION, "v300.2");', 'assert.strictEqual(VERSION, "v300.3");')
          security = security.replace('PASS security and UX v300.2', 'PASS security and UX v300.3')
          security_path.write_text(security, encoding='utf-8')

          package_path = Path('package.json')
          package_data = json.loads(package_path.read_text(encoding='utf-8'))
          package_data['version'] = '3.0.3'
          package_path.write_text(json.dumps(package_data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          verify_path = Path('.github/workflows/verify-line-and-website-catalog.yml')
          verify = verify_path.read_text(encoding='utf-8').replace('"version":"v300.2"', '"version":"v300.3"')
          verify_path.write_text(verify, encoding='utf-8')
          PY

      - name: Remove obsolete one-time files
        shell: bash
        run: |
          rm -f \
            RESTORE_LINE_CARDS_TRIGGER.txt \
            .github/workflows/restore-line-cards-v300-2.yml \
            FIX_PRODUCT_CARDS_TRIGGER.txt

      - name: Install and verify
        run: |
          npm install --package-lock-only --ignore-scripts
          npm ci
          npm run check:catalog
          npm test
          node --check server.js
          node --check test.js
          node --check security.test.js
          grep -F 'const VERSION = "v300.3";' server.js >/dev/null
          grep -F 'label: "看產品DM"' server.js >/dev/null
          ! grep -A5 'function productBubble' server.js | grep -F 'hero:'

      - name: HTTP smoke test
        shell: bash
        run: |
          set -euo pipefail
          node server.js >/tmp/lineoa-v300-3.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl --fail --silent http://127.0.0.1:3000/ | grep '"version":"v300.3"' >/dev/null
          curl --fail --silent http://127.0.0.1:3000/healthz | grep '"crmConfigured":true' >/dev/null

      - name: Remove workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/fix-product-cards-v300-3.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v300.3: make product and direct-order cards reliable"
          git push origin main
