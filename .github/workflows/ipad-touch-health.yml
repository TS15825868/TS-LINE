name: 仙加味 App iPad 觸控驗收

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "internal-app-shell.js"
      - "internal-app-review-only.js"
      - "internal-app-facebook-health.js"
      - "internal-app-client-fix.js"
      - "tools/release_check.js"
      - ".github/workflows/ipad-touch-health.yml"

permissions:
  contents: write

concurrency:
  group: xjw-ipad-touch-health
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify touch-safe source
        id: source
        run: |
          npm ci
          node --check internal-app-shell.js
          node --check internal-app-review-only.js
          node --check internal-app-facebook-health.js
          grep -q '20260724-shell-ipad-touch-3' internal-app-shell.js
          grep -q 'installTouchFallback' internal-app-shell.js
          grep -q 'state.control.click()' internal-app-shell.js
          grep -q '20260724-review-gate-v5-polling' internal-app-review-only.js
          ! grep -q 'new MutationObserver' internal-app-review-only.js
          grep -q '20260724-facebook-health-polling-2' internal-app-facebook-health.js
          ! grep -q 'new MutationObserver' internal-app-facebook-health.js
          grep -q '20260724-ipad-touch-3' internal-app-client-fix.js
          npm test
      - name: Wait for Render and verify live touch fix
        id: production
        shell: bash
        env:
          BASE_URL: https://ts-line.onrender.com
        run: |
          set -euo pipefail
          success=0
          for attempt in $(seq 1 72); do
            echo "Live touch check $attempt/72"
            if curl --connect-timeout 10 --max-time 40 --fail --silent --show-error \
              "$BASE_URL/internal/app-shell.js?t=$(date +%s)" -o /tmp/shell.js \
              && curl --connect-timeout 10 --max-time 40 --fail --silent --show-error \
              "$BASE_URL/internal/app-review-only.js?t=$(date +%s)" -o /tmp/review.js \
              && curl --connect-timeout 10 --max-time 40 --fail --silent --show-error \
              "$BASE_URL/internal/app-facebook-health.js?t=$(date +%s)" -o /tmp/facebook.js \
              && grep -q '20260724-shell-ipad-touch-3' /tmp/shell.js \
              && grep -q 'state.control.click()' /tmp/shell.js \
              && grep -q '20260724-review-gate-v5-polling' /tmp/review.js \
              && ! grep -q 'new MutationObserver' /tmp/review.js \
              && grep -q '20260724-facebook-health-polling-2' /tmp/facebook.js \
              && ! grep -q 'new MutationObserver' /tmp/facebook.js; then
              success=1
              break
            fi
            sleep 15
          done
          if [ "$success" -ne 1 ]; then
            echo "Render did not deploy the direct iPad touch fix" >&2
            head -20 /tmp/shell.js 2>/dev/null || true
            head -20 /tmp/review.js 2>/dev/null || true
            head -20 /tmp/facebook.js 2>/dev/null || true
            exit 1
          fi
          curl --connect-timeout 10 --max-time 30 --fail --silent --show-error "$BASE_URL/internal/healthz" -o /tmp/internal.json
          node - <<'NODE'
          const health = require('/tmp/internal.json');
          if (health.ok !== true || health.app !== '仙加味內部管理 App') throw new Error('internal App health failed');
          console.log({ ok: true, app: health.app, touchFix: '20260724-shell-ipad-touch-3' });
          NODE
      - name: Record verification result
        if: always()
        env:
          SOURCE_OUTCOME: ${{ steps.source.outcome }}
          PRODUCTION_OUTCOME: ${{ steps.production.outcome }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const source = process.env.SOURCE_OUTCOME || 'unknown';
          const production = process.env.PRODUCTION_OUTCOME || 'unknown';
          fs.writeFileSync('ipad-touch-status.json', JSON.stringify({
            ok: source === 'success' && production === 'success',
            verifiedAt: new Date().toISOString(),
            commit: process.env.COMMIT_SHA,
            sourceOutcome: source,
            productionOutcome: production,
            shellVersion: '20260724-shell-ipad-touch-3',
            reviewVersion: '20260724-review-gate-v5-polling',
            facebookVersion: '20260724-facebook-health-polling-2',
            directTouchFallback: true,
            bodyWideMutationObserversRemoved: true,
            socialReviewRequiredBeforePublish: true
          }, null, 2) + '\n');
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add ipad-touch-status.json
          git diff --cached --quiet || git commit -m "chore: record iPad touch verification"
          git push origin HEAD:main