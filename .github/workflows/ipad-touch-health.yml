name: 仙加味內部系統分流驗收

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "internal-app-client-fix.js"
      - "internal-social-site.js"
      - "internal-social-site/**"
      - "social-static-asset-bridge.js"
      - "social-final-posts.js"
      - "social-review-only-mode.js"
      - "social-schedule-policy.js"
      - "social-publish-guard.js"
      - "package.json"
      - "tools/release_check.js"
      - ".github/workflows/ipad-touch-health.yml"

permissions:
  contents: read

concurrency:
  group: xjw-internal-split-health
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify split architecture and safety rules
        run: |
          set -euo pipefail
          npm ci
          node --check internal-social-site.js
          node --check social-static-asset-bridge.js
          node --check internal-app-client-fix.js
          node --check social-review-only-mode.js
          npm test
          grep -q '20260724-inventory-split-1' internal-app-client-fix.js
          grep -q 'socialSection.remove' internal-app-client-fix.js
          grep -q '/internal/social-center' internal-app-client-fix.js
          grep -q '2026-07-24-social-site-v3' internal-social-site.js
          grep -q 'independent-website' internal-social-site.js
          grep -q 'reviewRequiredBeforePublish: true' internal-social-site.js
          grep -q 'automaticRetryEnabled: false' internal-social-site.js
          grep -q '2026-07-24-raster-tc-v1' social-static-asset-bridge.js
          grep -q 'NotoSansTC-VF.ttf' social-static-asset-bridge.js
          grep -q '/social/raster-healthz' social-static-asset-bridge.js
          ! grep -q 'MutationObserver' <(python3 - <<'PY'
          import gzip,base64
          print(gzip.decompress(base64.b64decode(open('internal-social-site/site.js.gz.b64').read())).decode())
          PY
          )

      - name: Wait for Render and verify both live systems
        shell: bash
        env:
          BASE_URL: https://ts-line.onrender.com
        run: |
          set -euo pipefail
          success=0
          for attempt in $(seq 1 80); do
            echo "Split production check $attempt/80"
            social_ok=0
            raster_ok=0
            app_ok=0

            if curl --connect-timeout 10 --max-time 50 --fail --silent --show-error \
              "$BASE_URL/internal/social-center-healthz?t=$(date +%s)" -o /tmp/social-health.json; then
              node - <<'NODE' && social_ok=1 || true
          const h = require('/tmp/social-health.json');
          if (h.ok !== true) throw new Error('social site health not ok');
          if (h.mode !== 'independent-website') throw new Error('social site is not independent');
          if (h.reviewRequiredBeforePublish !== true) throw new Error('review gate not required');
          if (h.automaticRetryEnabled !== false) throw new Error('automatic retry must be disabled');
          if (h.inventoryApp !== '/internal/app' || h.socialWebsite !== '/internal/social-center') throw new Error('split routes mismatch');
          NODE
            fi

            if curl --connect-timeout 10 --max-time 90 --fail --silent --show-error \
              "$BASE_URL/social/raster-healthz?t=$(date +%s)" -o /tmp/raster-health.json; then
              node - <<'NODE' && raster_ok=1 || true
          const h = require('/tmp/raster-health.json');
          if (h.ok !== true || h.rasterText !== true || h.preventsGibberish !== true) throw new Error('raster health not ok');
          if (h.contentVersion !== 'social-raster-tc-v1') throw new Error('wrong raster version');
          if (!String(h.sampleText || '').includes('繁體中文測試')) throw new Error('Traditional Chinese sample missing');
          if (Number(h.fontBytes || 0) < 1000000 || Number(h.sampleBytes || 0) < 1000) throw new Error('font or sample too small');
          NODE
            fi

            if curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
              "$BASE_URL/internal/healthz?t=$(date +%s)" -o /tmp/app-health.json; then
              node - <<'NODE' && app_ok=1 || true
          const h = require('/tmp/app-health.json');
          if (h.ok !== true || h.app !== '仙加味內部管理 App') throw new Error('inventory App health not ok');
          NODE
            fi

            if [ "$social_ok" -eq 1 ] && [ "$raster_ok" -eq 1 ] && [ "$app_ok" -eq 1 ]; then
              success=1
              break
            fi
            sleep 15
          done

          if [ "$success" -ne 1 ]; then
            echo "Render did not deploy the split internal systems correctly" >&2
            cat /tmp/social-health.json 2>/dev/null || true
            cat /tmp/raster-health.json 2>/dev/null || true
            cat /tmp/app-health.json 2>/dev/null || true
            exit 1
          fi

          status=$(curl --connect-timeout 10 --max-time 30 --silent --output /tmp/social-login-body \
            --dump-header /tmp/social-login-headers --write-out '%{http_code}' \
            "$BASE_URL/internal/social-center?t=$(date +%s)")
          test "$status" = "302"
          tr -d '\r' < /tmp/social-login-headers | grep -qi '^location: /internal/login'

          curl --connect-timeout 10 --max-time 120 --fail --silent --show-error \
            "$BASE_URL/social-approved-assets/care-work-rest-v7.jpg?v=social-raster-tc-v1&t=$(date +%s)" \
            -o /tmp/care-work-rest.jpg
          node - <<'NODE'
          const sharp = require('sharp');
          (async () => {
            const meta = await sharp('/tmp/care-work-rest.jpg').metadata();
            if (meta.format !== 'jpeg' || meta.width !== 1254 || meta.height !== 1254) {
              throw new Error(`wrong social image ${meta.format} ${meta.width}x${meta.height}`);
            }
            console.log({
              ok: true,
              inventoryApp: '/internal/app',
              socialWebsite: '/internal/social-center',
              image: `${meta.width}x${meta.height}`,
              reviewRequired: true,
              automaticRetry: false,
              rasterVersion: 'social-raster-tc-v1'
            });
          })();
          NODE
