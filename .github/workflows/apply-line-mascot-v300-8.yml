name: Apply LINE OA mascot v300.8

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: startsWith(github.head_ref, 'line-mascot-v300-8')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install and sync catalog
        run: |
          npm ci
          npm run sync:catalog
      - name: Apply mascot cards
        run: |
          node --check tools/apply_mascot_line_v300_8.js
          node tools/apply_mascot_line_v300_8.js
          npm install --package-lock-only --ignore-scripts
      - name: Install updated dependencies
        run: npm ci
      - name: Verify catalog
        run: npm run check:catalog
      - name: Run function tests and capture log
        run: |
          set +e
          npm test > FUNCTION_TEST_LOG.txt 2>&1
          echo $? > FUNCTION_TEST_STATUS.txt
          exit 0
      - name: Upload function test diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: line-mascot-function-test
          path: |
            FUNCTION_TEST_LOG.txt
            FUNCTION_TEST_STATUS.txt
      - name: Fail on function test error
        run: test "$(cat FUNCTION_TEST_STATUS.txt)" = "0"
      - name: Verify JavaScript syntax
        run: |
          node --check server.js
          node --check test.js
          node --check catalog.test.js
          node --check security.test.js
          node --check function.test.js
      - name: Verify mascot source and public image
        run: |
          grep -F 'const VERSION = "v300.8";' server.js >/dev/null
          grep -F 'function mascotWelcomeReply()' server.js >/dev/null
          grep -F 'xianjiawei-mascot.jpg?v=300.5' server.js >/dev/null
          curl --fail --location --silent --show-error --output /dev/null 'https://ts15825868.github.io/xianjiawei/images/brand/xianjiawei-mascot.jpg?v=300.5'
      - name: HTTP smoke test
        run: |
          node server.js >/tmp/line-mascot.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl --fail --silent http://127.0.0.1:3000/ | grep '"version":"v300.8"' >/dev/null
          curl --fail --silent http://127.0.0.1:3000/healthz | grep '"crmConfigured":true' >/dev/null
      - name: Commit verified update
        run: |
          rm -f FUNCTION_TEST_LOG.txt FUNCTION_TEST_STATUS.txt
          rm -f LINE_MASCOT_APPLY.txt LINE_MASCOT_PR_TRIGGER*.txt
          rm -f tools/apply_mascot_line_v300_8.js
          rm -f .github/workflows/apply-line-mascot-v300-8.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add server.js data.json test.js catalog.test.js security.test.js function.test.js package.json package-lock.json README.md .github/workflows/verify-line-and-website-catalog.yml
          git add -u
          git commit -m 'v300.8: add 仙加味小老闆 LINE guide cards'
          git push origin main
