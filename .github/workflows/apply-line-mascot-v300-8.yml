name: Apply LINE OA mascot v300.8

on:
  push:
    branches: [main]
    paths: [LINE_MASCOT_APPLY.txt]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event_name == 'push' || startsWith(github.head_ref, 'line-mascot-v300-8')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and sync website catalog
        run: |
          npm ci
          npm run sync:catalog

      - name: Apply mascot cards
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json

          def replace_required(text, old, new, label):
              if old not in text:
                  raise RuntimeError(f'找不到更新區塊：{label}')
              return text.replace(old, new, 1)

          p = Path('server.js')
          s = p.read_text(encoding='utf-8')
          s = s.replace('仙加味 LINE OA Bot v300.7', '仙加味 LINE OA Bot v300.8')
          s = s.replace('const VERSION = "v300.7";', 'const VERSION = "v300.8";')

          mascot = r'''const MASCOT_PATH = "images/brand/xianjiawei-mascot.jpg?v=300.5";

function mascotBubble(title, description, buttons) {
  const bubble = flexCard(title, description, buttons).contents;
  bubble.hero = {
    type: "image",
    url: absoluteUrl(MASCOT_PATH),
    size: "full",
    aspectRatio: "4:5",
    aspectMode: "contain",
    backgroundColor: "#F7F4ED",
    action: { type: "uri", uri: absoluteUrl("brand.html") },
  };
  return bubble;
}

function mascotWelcomeReply() {
  return {
    type: "flex",
    altText: "仙加味小老闆歡迎您",
    contents: mascotBubble(
      "仙加味小老闆｜歡迎您",
      `您好，歡迎來到仙加味。\n\n我可以帶您查看產品、比較怎麼選、了解搭配組合與使用方式。\n\n${ORDER_NOTICE}`,
      [
        { label: "看產品", text: "看產品" },
        { label: "幫我推薦", text: "幫我推薦" },
        { label: "人工客服", text: "我要人工客服" },
      ]
    ),
  };
}

'''
          s = replace_required(s, 'function recommendReply() {', mascot + 'function recommendReply() {', '小老闆函式')

          s = replace_required(
              s,
              '  const cards = [\n    flexCard(',
              '''  const cards = [
    mascotBubble(
      "仙加味小老闆幫你選",
      "先依固定安排、方便即飲、沖泡燉湯、家庭規格或自行搭配飲品來比較。產品規格與價格仍以正式產品卡為準。",
      [
        { label: "看產品", text: "看產品" },
        { label: "搭配組合", text: "搭配組合" },
        { label: "人工客服", text: "我要人工客服" },
      ]
    ),
    flexCard(''',
              '推薦卡'
          )

          combo_start = s.index('function comboMenuReply()')
          combo_end = s.index('function comboDetailReply', combo_start)
          before, combo, after = s[:combo_start], s[combo_start:combo_end], s[combo_end:]
          combo = replace_required(
              combo,
              '      contents: combos.slice(0, 10).map((combo, index) => {',
              '''      contents: [
        mascotBubble(
          "小老闆搭配導覽",
          "依日常節奏查看搭配組合。每組價格、可選組數、活動與加入購物車功能都保留在各方案卡中。",
          [
            { label: "看產品", text: "看產品" },
            { label: "怎麼使用", text: "怎麼使用" },
            { label: "人工客服", text: "我要人工客服" },
          ]
        ),
        ...combos.slice(0, 9).map((combo, index) => {''',
              '搭配卡開頭'
          )
          combo = replace_required(combo, '      }),\n    },\n  };\n}\n\n', '      }),\n      ],\n    },\n  };\n}\n\n', '搭配卡結尾')
          s = before + combo + after

          s = replace_required(
              s,
              '      contents: DATA.products.map((product) => usageReply(product).contents),',
              '''      contents: [
        mascotBubble(
          "小老闆使用方式導覽",
          "先選擇想了解的產品，再查看正式使用方式、成分、完整介紹與產品DM。",
          [
            { label: "看產品", text: "看產品" },
            { label: "幫我推薦", text: "幫我推薦" },
            { label: "人工客服", text: "我要人工客服" },
          ]
        ),
        ...DATA.products.map((product) => usageReply(product).contents),
      ],''',
              '使用方式卡'
          )

          follow_old = '      textMsg(`您好，歡迎來到仙加味。\\n\\n${ORDER_NOTICE}\\n\\n可以先查看產品、品牌故事，或告訴我們偏好的使用方式。`, mainQuick())'
          s = replace_required(s, follow_old, '      mascotWelcomeReply()', '歡迎訊息')
          s = replace_required(s, '  recommendReply,\n  comboReply,', '  recommendReply,\n  mascotWelcomeReply,\n  mascotBubble,\n  comboReply,', '函式匯出')
          p.write_text(s, encoding='utf-8')

          for name in ['test.js', 'security.test.js', 'function.test.js']:
              q = Path(name)
              q.write_text(q.read_text(encoding='utf-8').replace('v300.7', 'v300.8'), encoding='utf-8')

          q = Path('catalog.test.js')
          q.write_text(q.read_text(encoding='utf-8').replace('"300.4"', '"300.5"'), encoding='utf-8')

          q = Path('function.test.js')
          text = q.read_text(encoding='utf-8')
          text = replace_required(text, 'productMenuReply, priceCarousel, recommendReply,', 'productMenuReply, priceCarousel, recommendReply, mascotWelcomeReply,', '測試匯入')
          text = replace_required(text, 'productMenuReply(), priceCarousel(), recommendReply(),', 'productMenuReply(), priceCarousel(), mascotWelcomeReply(), recommendReply(),', '測試訊息')
          text += r'''

for (const message of [mascotWelcomeReply(), recommendReply(), comboMenuReply(), usageChooserReply()]) {
  const bubble = message.contents.type === "carousel" ? message.contents.contents[0] : message.contents;
  assert.ok(bubble.hero, "小老闆卡缺少圖片");
  assert.ok(bubble.hero.url.includes("/images/brand/xianjiawei-mascot.jpg?v=300.5"));
}
assert.strictEqual(recommendReply().contents.contents.length, 4);
assert.strictEqual(usageChooserReply().contents.contents.length, DATA.products.length + 1);
console.log("PASS LINE OA mascot welcome, recommend, combo and usage cards v300.8");
'''
          q.write_text(text, encoding='utf-8')

          q = Path('package.json')
          pkg = json.loads(q.read_text(encoding='utf-8'))
          pkg['version'] = '3.0.8'
          q.write_text(json.dumps(pkg, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          q = Path('.github/workflows/verify-line-and-website-catalog.yml')
          q.write_text(q.read_text(encoding='utf-8').replace('v300.7', 'v300.8'), encoding='utf-8')

          q = Path('README.md')
          text = q.read_text(encoding='utf-8').replace('LINE OA v300.7', 'LINE OA v300.8').replace('"version": "v300.7"', '"version": "v300.8"')
          if '## v300.8 仙加味小老闆' not in text:
              text += '\n## v300.8 仙加味小老闆\n\n歡迎、幫我推薦、搭配組合與使用方式總覽加入小老闆品牌導覽卡；產品規格、價格、數量、購物車與結帳流程維持原功能。\n'
          q.write_text(text, encoding='utf-8')
          PY
          npm install --package-lock-only --ignore-scripts

      - name: Verify LINE OA functions
        run: |
          npm ci
          npm run check:catalog
          npm test
          node --check server.js
          node --check test.js
          node --check catalog.test.js
          node --check security.test.js
          node --check function.test.js
          grep -F 'const VERSION = "v300.8";' server.js >/dev/null
          grep -F 'function mascotWelcomeReply()' server.js >/dev/null
          grep -F 'xianjiawei-mascot.jpg?v=300.5' server.js >/dev/null
          curl --fail --location --silent --show-error --output /dev/null https://ts15825868.github.io/xianjiawei/images/brand/xianjiawei-mascot.jpg?v=300.5

      - name: HTTP smoke test
        run: |
          node server.js >/tmp/line-mascot.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl --fail --silent http://127.0.0.1:3000/ | grep '"version":"v300.8"' >/dev/null
          curl --fail --silent http://127.0.0.1:3000/healthz | grep '"crmConfigured":true' >/dev/null

      - name: Commit verified update
        run: |
          rm -f LINE_MASCOT_APPLY.txt LINE_MASCOT_PR_TRIGGER.txt
          rm -f .github/workflows/apply-line-mascot-v300-8.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add server.js data.json test.js catalog.test.js security.test.js function.test.js package.json package-lock.json README.md .github/workflows/verify-line-and-website-catalog.yml
          git add -u
          git commit -m 'v300.8: add 仙加味小老闆 LINE guide cards'
          git push origin main
