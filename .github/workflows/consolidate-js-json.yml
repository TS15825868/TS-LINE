name: Consolidate LINE OA JS JSON v2

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: consolidate-lineoa-js-json
  cancel-in-progress: false

jobs:
  consolidate:
    if: github.event.issue.title == 'CONSOLIDATE_LINEOA_JS_JSON_V2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Consolidate files
        run: |
          set -euo pipefail
          python3 tools/consolidate_lineoa.py
          npm install --package-lock-only --ignore-scripts
          npm ci
          npm test

      - name: Remove temporary maintenance files
        run: |
          rm -f tools/consolidate_lineoa.py
          rm -f .github/workflows/consolidate-js-json.yml
          rm -f .github/workflows/audit-js-json.yml
          rm -f .github/workflows/export-repo-audit.yml

      - name: Commit to main
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '整合 LINE OA JS JSON 為單一主程式與中央資料 v401.3'
          git push origin HEAD:main

      - name: Verify Render
        run: |
          sleep 45
          curl --fail --silent --show-error --retry 6 --retry-delay 10 https://ts-line.onrender.com/healthz > /tmp/health.json
          python3 - <<'PY'
          import json
          health=json.load(open('/tmp/health.json'))
          assert health.get('ok') is True
          assert health.get('version') == 'v401.3', health
          assert health.get('productCount') == 6
          assert health.get('credentialsConfigured') is True
          assert health.get('crmConfigured') is True
          print(json.dumps(health, ensure_ascii=False, indent=2))
          PY

      - name: Report success
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'LINEOA_CONSOLIDATE_SUCCESS｜已整合為單一 server.js 與中央 data.json；重複啟動檔、圖片政策補丁、舊版JSON、重複素材清單及一次性修正腳本均已移除。完整測試與Render v401.3驗收通過。'
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'LINEOA_CONSOLIDATE_FAILED｜整合流程未通過，未宣告完成；請查看本次 Actions 紀錄。'
