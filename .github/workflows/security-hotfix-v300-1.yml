name: LINE OA credential security hotfix

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  hotfix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Remove embedded credentials
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('server.js')
          text = path.read_text(encoding='utf-8')
          text = re.sub(
              r'const CRM_URL = process\.env\.CRM_URL \|\| [^;]+;',
              'const CRM_URL = process.env.CRM_URL || "";',
              text,
              count=1,
          )
          text = re.sub(
              r'channelAccessToken: process\.env\.CHANNEL_ACCESS_TOKEN \|\| [^,]+,',
              'channelAccessToken: process.env.CHANNEL_ACCESS_TOKEN || "",',
              text,
              count=1,
          )
          text = re.sub(
              r'channelSecret: process\.env\.CHANNEL_SECRET \|\| [^,]+,',
              'channelSecret: process.env.CHANNEL_SECRET || "",',
              text,
              count=1,
          )
          path.write_text(text, encoding='utf-8')
          PY

      - name: Verify no embedded credentials
        shell: bash
        run: |
          set -euo pipefail
          ! grep -q 'script.google.com/macros/s/' server.js
          ! grep -Eq 'CHANNEL_ACCESS_TOKEN \|\| "[^" ]+' server.js
          ! grep -Eq 'CHANNEL_SECRET \|\| "[^" ]+' server.js
          node --check server.js
          npm ci
          npm test

      - name: HTTP smoke test without credentials
        shell: bash
        run: |
          set -euo pipefail
          node server.js >/tmp/lineoa-hotfix.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl --fail --silent --show-error http://127.0.0.1:3000/ | grep '"ok":true' >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:3000/healthz | grep '"credentialsConfigured":false' >/dev/null
          STATUS=$(curl --silent --output /tmp/webhook.json --write-out '%{http_code}' -X POST -H 'content-type: application/json' -d '{"events":[]}' http://127.0.0.1:3000/webhook)
          test "$STATUS" = "503"

      - name: Commit hotfix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js
          if git diff --cached --quiet; then
            echo "Security hotfix already applied."
          else
            git commit -m "security: remove embedded LINE and CRM credentials"
            git push origin HEAD:main
          fi
