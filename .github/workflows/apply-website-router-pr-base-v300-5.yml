name: Apply website router v300.5

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'website-intent-router-final-v300-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply website message router
        run: |
          node tools/apply_website_intent_router_v300_5.js
          npm install --package-lock-only --ignore-scripts
      - name: Verify
        run: |
          npm ci
          npm run check:catalog
          npm test
          node --check server.js
          node --check test.js
          node --check catalog.test.js
          node --check security.test.js
          node --check function.test.js
      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js test.js security.test.js function.test.js package.json package-lock.json README.md .github/workflows/verify-line-and-website-catalog.yml
          git commit -m "v300.5: route website messages to correct LINE card flows"
          git pull --rebase origin ${{ github.head_ref }}
          git push origin HEAD:${{ github.head_ref }}
