name: 仙加味正式社群排程驗收

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "social-final-release-20260724.js"
      - "social-final-release-remote-assets.js"
      - "disable-official-social-rebuild.js"
      - "internal-app-social-filter.js"
      - ".github/workflows/production-schedule-status.yml"

permissions:
  contents: read

concurrency:
  group: xianjiawei-production-schedule-status
  cancel-in-progress: true

jobs:
  verify-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 22
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify schedule definitions
        run: |
          npm ci
          node -r ./social-final-approved-batch.js -r ./social-final-release-20260724.js -r ./social-final-release-remote-assets.js -r ./disable-official-social-rebuild.js - <<'NODE'
          const release = require('./social-final-release-20260724');
          const assets = require('./social-final-release-remote-assets');
          const fixed = release.POSTS.filter((post) => !post.conditionalWeather);
          const weather = release.POSTS.filter((post) => post.conditionalWeather);
          if (!release.validateDefinitions() || fixed.length !== 7 || weather.length !== 3) process.exit(1);
          if (fixed[0].scheduledAt !== '2026-07-24T02:00:00.000Z') process.exit(1);
          if (new Set(release.POSTS.map((post) => post.imageName)).size !== 10) process.exit(1);
          if (new Set(release.POSTS.map((post) => post.title)).size !== 10) process.exit(1);
          if (Object.keys(assets.ALIASES).length !== 10) process.exit(1);
          console.log({fixed:fixed.map((p)=>[p.title,p.scheduledAt]), weather:weather.map((p)=>p.weatherTrigger)});
          NODE
      - name: Verify live schedule release
        shell: bash
        run: |
          set -euo pipefail
          success=0
          for attempt in $(seq 1 72); do
            if curl --connect-timeout 10 --max-time 45 --fail --silent --show-error \
              "https://ts-line.onrender.com/social/final-release-healthz?t=$(date +%s)" -o /tmp/release.json; then
              if node - <<'NODE'
          const r = require('/tmp/release.json');
          if (r.ok !== true || r.version !== '2026-07-24-final-v1') process.exit(1);
          if (r.assetVersion !== '2026-07-24-remote-assets-v1') process.exit(1);
          if (r.firstScheduledAt !== '2026-07-24T02:00:00.000Z') process.exit(1);
          if (r.fixedRule !== '每週三、週五上午10:00') process.exit(1);
          if (r.immediatePublishUnlocked !== true) process.exit(1);
          if (Number(r.totalPosts) !== 10 || Number(r.fixedPosts) !== 7 || Number(r.weatherStandbyPosts) !== 3) process.exit(1);
          if (!Array.isArray(r.assets) || r.assets.length !== 10 || r.assets.some((asset) => asset.ok !== true)) process.exit(1);
          NODE
              then success=1; break; fi
            fi
            sleep 15
          done
          test "$success" -eq 1
