name: 仙加味正式排程狀態驗收

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "social-recommended-schedule.js"
      - "social-corrected-republish-schedule.js"
      - "social-final-posts.js"
      - "social-clear-republish-policy.js"
      - "social-final-approved-batch.js"
      - "social-final-approved-batch.test.js"
      - "social-schedule-repair-20260722.js"
      - "social-schedule-repair-20260722.test.js"
      - "social-schedule-policy.js"
      - "social-schedule-policy.test.js"
      - "social-manual-schedule-override.js"
      - "tools/release_check.js"
      - ".github/workflows/production-schedule-status.yml"

permissions:
  contents: write

concurrency:
  group: xianjiawei-production-schedule-status
  cancel-in-progress: true

jobs:
  verify-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and test schedule contract
        run: |
          npm ci
          node social-clear-republish-policy.test.js
          node social-final-approved-batch.test.js
          node social-schedule-repair-20260722.test.js
          node -r ./social-recommended-schedule.js -r ./social-clear-republish-policy.js -r ./social-corrected-republish-schedule.js social-schedule-policy.test.js
          node tools/release_check.js

      - name: Wait for Render and read actual production schedule
        shell: bash
        env:
          STATUS_URL: https://ts-line.onrender.com/social/schedule-status
        run: |
          set -euo pipefail
          success=0
          for attempt in $(seq 1 56); do
            echo "Schedule check $attempt/56"
            code=$(curl --connect-timeout 10 --max-time 25 --silent --show-error \
              -o /tmp/production-schedule.json -w "%{http_code}" "$STATUS_URL?t=$(date +%s)" || true)
            if [ "$code" = "200" ]; then
              if node - <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('/tmp/production-schedule.json', 'utf8'));
          if (data.ok !== true) process.exit(1);
          if (data.version !== '2026-07-23-v4' || data.repairVersion !== '2026-07-23-v4') process.exit(1);
          if (Number(data.canonicalCount) !== 11 || Number(data.approvedCount) !== 8 || Number(data.standbyCount) !== 3) process.exit(1);
          if (!Array.isArray(data.issues) || data.issues.length !== 0 || !Array.isArray(data.posts) || data.posts.length !== 11) process.exit(1);
          if (data.posts.some((post) => post.manualContentOverride)) process.exit(1);

          const manual = data.posts.filter((post) => post.manualScheduleOverride === true);
          const work = data.posts.find((post) => post.id === 'clear-republish-care-work-rest-20260724');
          if (manual.length !== 1 || !work || work.scheduledAt !== '2026-07-24T11:30:00.000Z' || work.status !== 'approved') process.exit(1);
          if (work.manualScheduleOverride !== true || work.scheduleTimePolicy !== 'manual-override') process.exit(1);

          const gao = data.posts.find((post) => post.id === 'first-batch-v2-product-guilu-gao-20260724');
          const family = data.posts.find((post) => post.id === 'first-batch-v2-care-family-20260805');
          const drink30 = data.posts.find((post) => post.id === 'first-batch-v2-product-guilu-yin-30cc-20260731');
          const drink180 = data.posts.find((post) => post.id === 'first-batch-v2-product-guilu-yin-180cc-20260828');
          if (!gao || gao.scheduledAt !== '2026-07-31T12:00:00.000Z') process.exit(1);
          if (!family || family.scheduledAt !== '2026-08-05T11:30:00.000Z') process.exit(1);
          if (!drink30 || drink30.scheduledAt !== '2026-08-07T12:00:00.000Z') process.exit(1);
          if (!drink180 || drink180.scheduledAt !== '2026-09-04T12:00:00.000Z') process.exit(1);
          if (String(drink30.title).includes('180cc') || String(drink180.title).includes('30cc')) process.exit(1);

          const weather = data.posts.filter((post) => post.automationStandby === true);
          if (weather.length !== 3 || weather.some((post) => post.status !== 'paused' || post.scheduledAt)) process.exit(1);
          NODE
              then
                success=1
                break
              fi
            fi
            sleep 15
          done

          if [ "$success" -ne 1 ]; then
            echo "Production schedule did not become healthy in time"
            cat /tmp/production-schedule.json 2>/dev/null || true
            exit 1
          fi

          node - <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('/tmp/production-schedule.json', 'utf8'));
          data.verifiedCommit = process.env.GITHUB_SHA;
          data.productionUrl = 'https://ts-line.onrender.com/social/schedule-status';
          data.clearRepublishScheduledAtTaipei = '2026-07-24 19:30';
          data.manualImmediatePublishUnlocked = true;
          fs.writeFileSync('production-schedule-status.json', JSON.stringify(data, null, 2) + '\n');
          console.log(data);
          NODE

      - name: Save production schedule proof
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "仙加味排程驗收"
          git config user.email "actions@users.noreply.github.com"
          git add production-schedule-status.json
          if git diff --cached --quiet; then
            echo "Production schedule proof already current"
            exit 0
          fi
          git commit -m "chore: record healthy production social schedule"
          git pull --rebase origin main
          git push origin main
