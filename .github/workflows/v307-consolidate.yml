name: LINE OA v307 consolidate

on:
  push:
    branches: [main]
    paths:
      - V307_LINE_TRIGGER.txt

permissions:
  contents: write

jobs:
  consolidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Consolidate runtime and catalog
        run: python tools/v307_consolidate.py

      - name: Install and validate
        run: |
          npm ci
          node --check server.js
          npm test
          python - <<'PY'
          from pathlib import Path
          import json
          data=json.loads(Path('data.json').read_text(encoding='utf-8'))
          assert not Path('server-core.js').exists()
          assert any(p.get('id')=='guilu-drink-180' for p in data['products'])
          assert data['store']['hours']=='週一至週六 09:30–18:30'
          server=Path('server.js').read_text(encoding='utf-8')
          assert 'runtime wrapper' not in server
          assert 'v307.0' in server
          print('LINE OA v307 validated')
          PY

      - name: Remove one-time files
        run: |
          rm -f V307_LINE_TRIGGER.txt
          rm -f tools/v307_consolidate.py
          rm -f .github/workflows/v307-consolidate.yml

      - name: Commit LINE OA v307
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "LINE OA v307：整合單一主程式、原生180cc資料與清晰小老闆圖" || exit 0
          git push origin HEAD:main
