name: Report LINE OA v401 exact failure

on:
  issues:
    types: [opened]

permissions:
  actions: read
  issues: write

jobs:
  report:
    if: github.event.issue.title == 'REPORT_LINEOA_V401_EXACT'
    runs-on: ubuntu-latest
    steps:
      - name: Collect exact job log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh api -H 'Accept: application/vnd.github+json' /repos/${{ github.repository }}/actions/jobs/86814751499/logs > /tmp/joblog.zip
          file /tmp/joblog.zip > /tmp/filetype.txt
          if unzip -t /tmp/joblog.zip >/dev/null 2>&1; then
            unzip -p /tmp/joblog.zip > /tmp/joblog.txt
          else
            cp /tmp/joblog.zip /tmp/joblog.txt
          fi
          {
            echo 'LINEOA_V401_EXACT_FAILURE'
            echo '```text'
            cat /tmp/filetype.txt
            tail -220 /tmp/joblog.txt
            echo '```'
          } > /tmp/comment.txt
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file /tmp/comment.txt
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed
