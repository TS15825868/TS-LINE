name: Apply LINE OA mascot v400 by PR

on:
  pull_request:
    branches: [main]
    paths:
      - APPLY_LINE_MASCOT_V400_PR.txt

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Apply LINE OA v400
        run: python3 tools/apply_line_mascot_v400.py

      - name: Install dependencies
        run: npm ci

      - name: Validate LINE OA v400
        run: |
          node --check server.js
          npm test
          grep -q 'const VERSION = "v400.0"' server.js
          grep -q 'xianjiawei-mascot-line-cart.jpg?v=400.0' server.js
          grep -q '價格方案｜小老闆幫你整理' server.js
          grep -q '購物車｜確認購買清單' server.js
          grep -q '"version": "4.0.0"' package.json

      - name: Commit LINE OA v400 to PR branch
        run: |
          rm -f APPLY_LINE_MASCOT_V400_PR.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add server.js function.test.js package.json package-lock.json release-status.json APPLY_LINE_MASCOT_V400_PR.txt
          git diff --cached --quiet || git commit -m '正式上線 LINE OA 專用小老闆 v400'
          git push origin HEAD:${{ github.head_ref }}
