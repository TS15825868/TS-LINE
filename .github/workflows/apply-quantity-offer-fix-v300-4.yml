name: Apply quantity and offer fix v300.4

on:
  push:
    branches: [main]
    paths:
      - QUANTITY_OFFER_FIX_TRIGGER.txt

permissions:
  contents: write

jobs:
  fix-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply update
        run: |
          node tools/apply_quantity_offer_fix_v300_4.js
          npm install --package-lock-only --ignore-scripts
      - name: Verify all functions
        run: |
          npm ci
          npm run check:catalog
          npm test
          node --check server.js
          node --check test.js
          node --check catalog.test.js
          node --check security.test.js
          node --check function.test.js
          grep -F 'const VERSION = "v300.4";' server.js >/dev/null
          grep -F 'quantityOptions' server.js >/dev/null
          grep -F '買10送2' server.js >/dev/null
          grep -F 'channelAccessToken: process.env.CHANNEL_ACCESS_TOKEN || ""' server.js >/dev/null
          grep -F 'channelSecret: process.env.CHANNEL_SECRET || ""' server.js >/dev/null
      - name: HTTP smoke test
        run: |
          node server.js >/tmp/lineoa-v300-4.log 2>&1 &
          PID=$!
          trap 'kill $PID' EXIT
          sleep 2
          curl --fail --silent http://127.0.0.1:3000/ | grep '"version":"v300.4"' >/dev/null
          curl --fail --silent http://127.0.0.1:3000/healthz | grep '"crmConfigured":true' >/dev/null
      - name: Commit verified result
        run: |
          rm -f QUANTITY_OFFER_FIX_TRIGGER.txt
          rm -f tools/apply_quantity_offer_fix_v300_4.js
          rm -f .github/workflows/apply-quantity-offer-fix-v300-4.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v300.4: restore quantity choices and verify prices and promotions"
          git push origin main
