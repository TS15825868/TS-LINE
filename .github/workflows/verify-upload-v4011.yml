name: Verify uploaded LINE OA v401.1

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  verify:
    if: github.event.issue.title == 'VERIFY_UPLOADED_LINEOA_V4011'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Test repository
        run: |
          set -euo pipefail
          npm ci
          npm test
          python3 -m json.tool deploy-version.json >/dev/null
          grep -q '"version": "401.1"' deploy-version.json
          grep -q 'require("./no-collage-runtime")' start.js
      - name: Wait for Render auto deploy
        run: sleep 40
      - name: Verify Render
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --retry 6 --retry-delay 10 https://ts-line.onrender.com/ > /tmp/root.json
          curl --fail --silent --show-error --retry 6 --retry-delay 10 https://ts-line.onrender.com/healthz > /tmp/health.json
          python3 - <<'PY'
          import json
          root=json.load(open('/tmp/root.json'))
          health=json.load(open('/tmp/health.json'))
          assert root.get('ok') is True
          assert health.get('ok') is True
          assert health.get('productCount') == 6
          assert health.get('credentialsConfigured') is True
          assert health.get('crmConfigured') is True
          print(json.dumps({'root':root,'healthz':health},ensure_ascii=False,indent=2))
          PY
      - name: Report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'UPLOAD_LINEOA_V4011_SUCCESS｜main已上傳，完整測試通過，Render服務、六項產品、LINE憑證與CRM均正常。'
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed
