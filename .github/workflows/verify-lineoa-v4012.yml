name: Verify LINE OA v401.2

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  verify:
    if: github.event.issue.title == 'VERIFY_LINEOA_V4012'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Test
        run: |
          set -euo pipefail
          npm ci
          npm test
          python3 -m json.tool deploy-version.json >/dev/null
          grep -q '"version": "401.2"' deploy-version.json
          grep -q 'image-policy-v401.2' start.js
      - name: Wait for Render
        run: sleep 40
      - name: Verify Render
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --retry 6 --retry-delay 10 https://ts-line.onrender.com/healthz > /tmp/health.json
          python3 - <<'PY'
          import json
          h=json.load(open('/tmp/health.json'))
          assert h.get('ok') is True
          assert h.get('productCount') == 6
          assert h.get('credentialsConfigured') is True
          assert h.get('crmConfigured') is True
          print(json.dumps(h,ensure_ascii=False,indent=2))
          PY
      - name: Report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body 'LINEOA_V4012_SUCCESS｜歡迎、推薦、使用方式保留一張獨立小老闆圖；產品卡維持六張真實產品圖；搭配與空購物車維持文字卡；完整測試與Render驗收通過。'
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed
