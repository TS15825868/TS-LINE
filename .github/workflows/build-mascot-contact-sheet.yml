name: Build mascot contact sheet

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  sheet:
    if: github.event.issue.title == 'BUILD_MASCOT_CONTACT_SHEET'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Build sheet
        run: |
          python3 - <<'PY'
          from PIL import Image, ImageOps, ImageDraw
          from pathlib import Path
          files=['welcome','products','recommend','combo','usage','faq','service','brand','cart']
          cards=[]
          for name in files:
              p=Path('public/mascot')/f'{name}.jpg'
              im=Image.open(p).convert('RGB')
              im.thumbnail((500,500))
              canvas=Image.new('RGB',(520,560),'white')
              x=(520-im.width)//2; y=10+(500-im.height)//2
              canvas.paste(im,(x,y))
              d=ImageDraw.Draw(canvas)
              d.text((20,525),name,fill='black')
              cards.append(canvas)
          sheet=Image.new('RGB',(520*3,560*3),'white')
          for i,c in enumerate(cards):
              sheet.paste(c,((i%3)*520,(i//3)*560))
          sheet.save('mascot-contact-sheet.jpg',quality=90)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: mascot-contact-sheet
          path: mascot-contact-sheet.jpg
      - name: Report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "MASCOT_SHEET_READY run_id=${{ github.run_id }}"
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed
